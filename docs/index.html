<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>加盟品牌監測 Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #F1F5F9;
      --card:      #FFFFFF;
      --border:    #E2E8F0;
      --text:      #0F172A;
      --muted:     #64748B;
      --dcard:     #2563EB;
      --threads:   #7C3AED;
      --ptt:       #EA580C;
      --facebook:  #1877F2;
      --accent:    #0EA5E9;
      --radius:    12px;
      --shadow:    0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.05);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    header h1 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -.3px;
    }
    header .date {
      font-size: 14px;
      color: var(--muted);
    }

    /* ── Layout ── */
    main { max-width: 1280px; margin: 0 auto; padding: 28px 24px; }

    /* ── Section title ── */
    .section-title {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .6px;
      color: var(--muted);
      margin-bottom: 12px;
      margin-top: 28px;
    }

    /* ── Stat cards ── */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }
    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 22px;
      box-shadow: var(--shadow);
    }
    .stat-card .label {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-bottom: 8px;
    }
    .stat-card .value {
      font-size: 34px;
      font-weight: 800;
      line-height: 1;
      color: var(--text);
    }
    .stat-card .sub {
      font-size: 12px;
      color: var(--muted);
      margin-top: 6px;
    }

    /* ── Chart grid ── */
    .chart-grid-2 {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 16px;
    }
    .chart-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px;
      box-shadow: var(--shadow);
    }
    .chart-card h2 {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 18px;
      color: var(--text);
    }
    .chart-wrap { position: relative; }

    /* ── Article list ── */
    .article-list {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .article-list-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .article-list-header span {
      font-size: 12px;
      color: var(--muted);
      font-weight: 400;
    }
    .article-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 13px 20px;
      border-bottom: 1px solid var(--border);
      text-decoration: none;
      color: inherit;
      transition: background .15s;
    }
    .article-item:last-child { border-bottom: none; }
    .article-item:hover { background: #F8FAFC; }

    .platform-badge {
      flex-shrink: 0;
      font-size: 10px;
      font-weight: 700;
      padding: 3px 7px;
      border-radius: 4px;
      letter-spacing: .3px;
      margin-top: 2px;
      color: #fff;
    }
    .badge-dcard    { background: var(--dcard); }
    .badge-threads  { background: var(--threads); }
    .badge-ptt      { background: var(--ptt); }
    .badge-facebook { background: var(--facebook); }

    .article-body { flex: 1; min-width: 0; }
    .article-title {
      font-size: 14px;
      line-height: 1.5;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .article-meta {
      font-size: 12px;
      color: var(--muted);
      margin-top: 3px;
      display: flex;
      gap: 12px;
    }

    /* ── Loading / error ── */
    #loading {
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
      font-size: 15px;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── RWD ── */
    @media (max-width: 900px) {
      .chart-grid-2 { grid-template-columns: 1fr; }
    }
    @media (max-width: 640px) {
      main { padding: 16px 14px; }
      .stat-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
      .stat-card .value { font-size: 26px; }
      header h1 { font-size: 15px; }
    }
  </style>

間好吃的美食 希望大家會喜歡 給去台南玩或不知道吃什麼的人提供參考 台南的食物真的好好吃 下次要多去玩幾天，📍懷舊小棧杏仁豆腐冰，第一間是位於台南大學五妃街的一間冰"},{"keyword":"Q Burger","id":252938793,"title":"Q Burger 的蔥抓餅加蛋長這樣？","url":"https://www.dcard.tw/f/food/p/252938793","created_at":"2023-08-11T02:53:45.057Z","comment_count":86,"like_count":77,"forum_alias":"food","forum_name":"美食","summary":"更，謝謝大家的回答，原來是我見識淺薄，因為餐點送來時與心裡的期待不符有點失望，我還是喜歡蔥抓餅是整塊，外面脆脆裡面微軟的口感，可以抓鬆但不能整塊都破壞掉，我當然也有吃過蔥油餅，一直以來我覺得蔥抓餅跟蔥"},{"keyword":"Q Burger","id":240974963,"title":"感覺被Q burger詐騙 舒肥雞大沙拉…","url":"https://www.dcard.tw/f/food/p/240974963","created_at":"2023-01-10T12:28:05.278Z","comment_count":111,"like_count":381,"forum_alias":"food","forum_name":"美食","summary":"中午來吃個早餐店 點了舒肥雞“大”沙拉 100元，一上來我就大傻眼🤯🤯🤯，感覺大被騙，我完全沒動喔，一上菜馬上就拍了，就是只有照片上那樣，快要跟玉米粒一樣小的雞肉，大塊的也不過我的指節大，這樣要 10"},{"keyword":"Q Burger","id":256100230,"title":"Q burger","url":"https://www.dcard.tw/f/persona_amyangelica/p/256100230","created_at":"2024-07-12T23:30:38.720Z","comment_count":7,"like_count":96,"forum_alias":"persona_amyangelica","forum_name":"個人看板","summary":"早餐點了Q burger 的燒肉乳酪三明治配無糖紅茶，這組合很難不好吃啦！燒肉醬偏甜，加上乳酪，完美😍～但價格可以再完美一點🤣"},{"keyword":"Q Burger","id":225339339,"title":"Q burger假日工讀問題","url":"https://www.dcard.tw/f/job/p/225339339","created_at":"2016-12-07T07:16:14.214Z","comment_count":51,"like_count":52,"forum_alias":"job","forum_name":"工作","summary":"因為爬文都沒有看到關於Qburger的問題，所以想請問一下關於假日工讀的問題，大概要做哪些事然後要比較需要注意什麼，麻煩有做過Qburger的同學們可以跟我分享一下工作經驗，謝謝了"},{"keyword":"Q Burger","id":259467899,"title":"#請益 請問Q Burger正職工作福利（南部）","url":"https://www.dcard.tw/f/job/p/259467899","created_at":"2025-08-03T16:12:50.086Z","comment_count":0,"like_count":0,"forum_alias":"job","forum_name":"工作","summary":"最近想從大夜傳產換到早餐店，因為要接送小孩所以只能找這個時段的工作。最近發現Q Burger在高雄狂拓店，福利也打得很誘人～但我爬文2022~2024的文章分享福利跟實際有落差～想請問有Q Burge"},{"keyword":"Q Burger","id":256570778,"title":"Qburger港澳新品開箱✨","url":"https://www.dcard.tw/f/food/p/256570778","created_at":"2024-09-05T12:00:16.214Z","comment_count":12,"like_count":45,"forum_alias":"food","forum_name":"美食","summary":"家裡旁邊開了一間Q Burger，但一直沒時間去吃，今天跟男友都休假，特地早起一起去吃，我們很愛吃茶餐廳，看到這次有出港澳口味新品，想說可以吃吃看，簡單來美食開箱一下～正宗澳門豬扒包（推薦程度4.5分"},{"keyword":"Q Burger","id":240032527,"title":"Q Burger漢堡這麼油？真是謝囉^_^","url":"https://www.dcard.tw/f/food/p/240032527","created_at":"2022-09-19T09:29:17.801Z","comment_count":25,"like_count":65,"forum_alias":"food","forum_name":"美食","summary":"今天不是要分享美食 而是覺得有點踩雷，我自己本身很少去早餐店買早餐吃，因為大部分都是中午才吃第一餐，結果昨天想說蠻早起床就到家附近的QBurger買早餐，對了然後我點的是當天的特餐 卡啦雞腿堡+紅茶，"},{"keyword":"Q Burger","id":234955547,"title":"Q Burger 生日禮金","url":"https://www.dcard.tw/f/job/p/234955547","created_at":"2020-12-10T10:35:20.143Z","comment_count":2,"like_count":12,"forum_alias":"job","forum_name":"工作","summary":"想問一下，今天發薪日有一個問題想問曾經，有在Q burger工作的人，我的生日在11/19，當時我的老闆說會有生日禮金，但是我在11/30離職了，今天發薪日卻說沒有生日禮金，原因跟我說是因為福利金只有"},{"keyword":"Q Burger","id":260543664,"title":"【QBurger】新口味超台！早餐就能吃三杯、鹹酥雞還有黑糖珍奶❤️","url":"https://www.dcard.tw/f/food/p/260543664","created_at":"2025-12-25T13:34:04.251Z","comment_count":0,"like_count":9,"forum_alias":"food","forum_name":"美食","summary":"Q Burger 最近推出一整套超台的新口味，直接把夜市靈魂搬進早餐店🤣，三杯、鹹酥雞、地瓜薯條、黑糖珍珠鮮奶一次吃得到。IG影片詳細介紹底加⬇️，🍔 三杯杏鮑菇雞堡 $95，三杯味道偏淡一點，不是重口"},{"keyword":"Q Burger","id":237704224,"title":"薯餅塔是什麼偉大食物","url":"https://www.dcard.tw/f/food/p/237704224","created_at":"2021-12-19T02:43:10.155Z","comment_count":204,"like_count":2569,"forum_alias":"food","forum_name":"美食","summary":"更，原來薯餅塔如此受歡迎，留言最多人提到的是麥味登、向陽、好食、找餐店、Q burger等等～另外薯餅塔有各種名稱，像是薯餅蛋塔、歐姆蛋薯餅、薯餅起司蛋塔、薯餅起司蛋包（簡稱薯包？？？）、薯餅蛋包起司"},{"keyword":"弘爺","id":236967193,"title":"弘爺早餐🥣","url":"https://www.dcard.tw/f/food/p/236967193","created_at":"2021-09-14T02:45:56.138Z","comment_count":34,"like_count":116,"forum_alias":"food","forum_name":"美食","summary":"很喜歡吃弘爺的早餐，玉米蛋餅、蘿蔔糕、薯條…，但是，我去過好幾間不同分店的弘爺，薯條都不太一樣，有的是細的、有的是粗的，明明是連鎖的 為什麼規格不一樣，（個人偏愛細薯條 但幾乎都遇到粗的🥲"},{"keyword":"弘爺","id":240422028,"title":"弘爺胡椒粉","url":"https://www.dcard.tw/f/talk/p/240422028","created_at":"2022-11-03T22:01:19.525Z","comment_count":9,"like_count":22,"forum_alias":"talk","forum_name":"閒聊","summary":"有沒有人知道弘爺他們的胡椒粉是哪一家的？聞起來有點臭豆腐的味道，但是吃起來超香的，我是胡椒粉愛好者，吃什麼都要加胡椒粉，超喜歡弘爺的胡椒粉，就是找不到是哪家的，有弘爺的員工知道嗎🤣，在此附上我的鮭魚壽"},{"keyword":"弘爺","id":257302427,"title":"弘爺早餐是這個價？","url":"https://www.dcard.tw/f/talk/p/257302427","created_at":"2024-11-22T01:01:28.571Z","comment_count":73,"like_count":195,"forum_alias":"talk","forum_name":"閒聊","summary":"買早餐想說弘爺沒買過好像有點遜，一看菜單嚇一跳！里肌蛋吐司（就豬排蛋）70元！！，它不是跟美而美差不多檔次的早餐店嗎？還是說它有什麼過人之處？請大家賜教，願聞其詳。"},{"keyword":"弘爺","id":241026958,"title":"有一種早餐叫「弘爺」","url":"https://www.dcard.tw/f/food/p/241026958","created_at":"2023-01-17T08:48:21.071Z","comment_count":201,"like_count":508,"forum_alias":"food","forum_name":"美食","summary":"這應該是大家共同的回憶了吧，弘爺就是我們台灣人的血液，一走進來，發現很弘爺，每一家的設計都很簡約風很乾淨，套餐，這是菜單，每次我都有選擇障礙（而且還反光），全部都好想吃，但胃只有一個，（錢包也是），然"},{"keyword":"弘爺","id":227002711,"title":"#問 弘爺奶茶","url":"https://www.dcard.tw/f/food/p/227002711","created_at":"2017-08-15T00:22:11.355Z","comment_count":90,"like_count":371,"forum_alias":"food","forum_name":"美食","summary":"有人知道弘爺奶茶怎麼煮嗎，喝過一次就回不去了啊啊啊啊啊，喝過這麼多早餐店奶茶，我覺得弘爺第一 阿寶第二"},{"keyword":"弘爺","id":260067565,"title":"弘爺漢堡早餐送哎鳳(弘爺抽機車)","url":"https://www.dcard.tw/f/talk/p/260067565","created_at":"2025-10-18T11:18:44.627Z","comment_count":12,"like_count":4,"forum_alias":"talk","forum_name":"閒聊","summary":"最近弘爺漢堡有刮刮樂集字活動，想問看大家都抽到了甚麼字，我目前只抽到 \"早\" \"餐\" 兩個字，分別有兩種，早餐送哎鳳 5 個字，弘爺抽機車 5 個字，兌換時間到2025-12-31"},{"keyword":"弘爺","id":258623336,"title":"弘爺的鮪魚吃起來會酸酸的嗎","url":"https://www.dcard.tw/f/food/p/258623336","created_at":"2025-04-23T00:57:00.982Z","comment_count":1,"like_count":10,"forum_alias":"food","forum_name":"美食","summary":"今天吃弘爺的鮪魚吐司，一開始覺得特別鹹，後來又覺得有點酸，請問是正常的嗎，店員說今年才開的"},{"keyword":"弘爺","id":236092676,"title":"🍔弘爺漢堡正式開幕囉🎉🎉","url":"https://www.dcard.tw/f/cjcu/p/236092676","created_at":"2021-05-26T00:33:27.627Z","comment_count":37,"like_count":68,"forum_alias":"cjcu","forum_name":"長榮大學","summary":"開幕期間優惠～～～️雙層豬肉起司堡套餐原價85（裡面有附贈薯條跟15元飲料）現在只要70元，️四盎司牛肉堡套餐原價110（有附贈一杯15元飲料🥤）現在只要90元，️香煎嫩雞堡套餐原價80（有附贈一杯15元飲"},{"keyword":"弘爺","id":259358953,"title":"想知道晨間廚房的鬆餅(巧克力)牌子><","url":"https://www.dcard.tw/f/food/p/259358953","created_at":"2025-07-20T09:30:14.126Z","comment_count":2,"like_count":15,"forum_alias":"food","forum_name":"美食","summary":"有人知道晨間廚房的巧克力鬆餅是甚麼巧克力牌子嗎！！，（不確定這能不能公開），真的超級好吃！！！！，最愛他吃起來濕濕潤潤的~，但我發現每一家給的醬的多寡都不一樣，我家附近的晨間 鬆餅都塗爆巧克力，滴出來"},{"keyword":"弘爺","id":237307593,"title":"連鎖早餐嫩雞堡試吃心得～","url":"https://www.dcard.tw/f/food/p/237307593","created_at":"2021-10-26T02:13:59.790Z","comment_count":34,"like_count":158,"forum_alias":"food","forum_name":"美食","summary":"大家好，由於本人很愛吃早餐，可以錯過其他餐，但早餐一定不能不吃！！加上又很喜歡吃「堡」類的，很喜歡到各個早餐店吃吃看他們的漢堡～有時候還會用他們的堡評斷早餐店好壞的指標，雖然有點以偏概全，我自己偏好雞"},{"keyword":"弘爺","id":260036794,"title":"失控的宿舍長","url":"https://www.dcard.tw/f/fy/p/260036794","created_at":"2025-10-14T11:05:43.877Z","comment_count":5,"like_count":8,"forum_alias":"fy","forum_name":"輔英科技大學","summary":"之前那個鼎鼎有名的宋先生，怎麼還可以在弘爺漢堡打工，還看到在健美系教書？"},{"keyword":"弘爺","id":253736204,"title":"弘爺集字活動","url":"https://www.dcard.tw/f/talk/p/253736204","created_at":"2023-11-01T02:30:20.588Z","comment_count":2,"like_count":0,"forum_alias":"talk","forum_name":"閒聊","summary":"板上的大家有人有這次弘爺集字活動「送」字嗎？吃了快半個月的弘爺都刮不到哈哈哈，還是有人有需要其他字可以交換，弘爺汽車 餐手機都有🥹🥹🥹"},{"keyword":"弘爺","id":240648163,"title":"早餐店究極濃郁鮮奶茶爭霸大賽","url":"https://www.dcard.tw/f/food/p/240648163","created_at":"2022-11-30T05:00:37.331Z","comment_count":43,"like_count":119,"forum_alias":"food","forum_name":"美食","summary":"不管是學生時期還是成為剛出社會的me，每天早上吃早餐沒配杯奶茶就不對勁（￣∇￣），就算是瀉藥神器還是抵擋不了我對鮮奶茶ㄉ愛…，因為已經試毒過無數家了 小女子在這邊就來做個小評比給大家供參～😜，相信這裡"},{"keyword":"弘爺","id":229698087,"title":"情侶間最特別的暱稱","url":"https://www.dcard.tw/f/funny/p/229698087","created_at":"2018-09-21T10:08:11.460Z","comment_count":210,"like_count":6690,"forum_alias":"funny","forum_name":"有趣","summary":"不想跟一般人一樣，不是叫寶貝就是北鼻之類⋯，過去跟閃我們都隨便叫～他叫我白癡 我說她白目，他叫我笨球 我説她蠢珮，他叫我木頭 我回她竹子，如果她叫我寶貝 我就叫她媽媽，（ps：我媽都叫我小寶貝），如果她叫我北鼻 我就叫她小貓"},{"keyword":"弘爺","id":254906580,"title":"#花蓮 弘爺竟然也有開宵夜場！！","url":"https://www.dcard.tw/f/food/p/254906580","created_at":"2024-03-07T15 keyword":"加盟","id":237645084,"title":"#心得 加盟早餐店","url":"https://www.dcard.tw/f/startup/p/237645084","created_at":"2021-12-11T02:50:10.651Z","comment_count":8,"like_count":12,"forum_alias":"startup","forum_name":"創業","summary":"最近狂問早餐店，想在家附近開，詢問結果如下：加盟金來說，拉亞其實算便宜，基本弄到好大概140搞定，但是重點來了，他的新式裝潢牆是85元大概20*30，那用一面牆假設3m高長5m 大概多花2萬多，以四面"},{"keyword":"加盟","id":260450115,"title":"茶聚加盟店老闆虐狗","url":"https://www.dcard.tw/f/mood/p/260450115","created_at":"2025-12-11T18:10:40.815Z","comment_count":9,"like_count":178,"forum_alias":"mood","forum_name":"心情","summary":"看到一個影片，心情真的很沉重，有個手搖飲加盟店老闆疑似對自家高齡犬施暴，看了真的很心痛，整個社群都在轉發，大家都很擔心那隻狗狗的安全，茶聚總部凌晨也緊急發聲明了，說已經暫停那位加盟主的品牌使用權，台北"},{"keyword":"加盟","id":256378819,"title":"加盟店與直營店","url":"https://www.dcard.tw/f/boba/p/256378819","created_at":"2024-08-14T16:57:36.683Z","comment_count":3,"like_count":6,"forum_alias":"boba","forum_name":"手搖","summary":"想問各位手搖飲的前輩（大大們），店裡的小弟弟早上是在迷客夏的加盟店當工讀，晚上則是在五桐號一樣加盟店當工讀，近日即將收店（五），有在其他地方看到一樣迷客夏缺晚班，但因為是直營店 不知說早上是在加盟店，"},{"keyword":"加盟","id":257753767,"title":"#資訊 創業加盟血淚史","url":"https://www.dcard.tw/f/job/p/257753767","created_at":"2025-01-14T11:12:48.260Z","comment_count":2,"like_count":7,"forum_alias":"job","forum_name":"工作","summary":"‼️‼️‼️‼️‼️呼籲‼️‼️‼️‼️‼️我也是過來人，👉創業加盟契約一定要給專業人士看過，千萬不要衝動。👉呼籲政府和媒體的關心，推動加盟專法及制式合約，避免有下個受害者。🥲想創業的拜託都去臉書的「爆料加盟區」看看！！"},{"keyword":"加盟","id":260988339,"title":"想要轉換跑道，在想要自己創業還是加盟商家比較好","url":"https://www.dcard.tw/f/talk/p/260988339","created_at":"2026-03-02T05:51:17.781Z","comment_count":4,"like_count":6,"forum_alias":"talk","forum_name":"閒聊","summary":"目前快要40歲了，對於日復一日的上班逐漸感到厭倦，一直有想在下班後接觸別的事情，像是運動、學習等等，但每天通勤跟吃飯扣一扣所剩時間就不多了，所以寧願拿那些時間好好休息。而前陣子發現常去的飲料店老闆娘換"},{"keyword":"加盟","id":258607975,"title":"加盟條件請益","url":"https://www.dcard.tw/f/startup/p/258607975","created_at":"2025-04-21T08:04:31.007Z","comment_count":6,"like_count":10,"forum_alias":"startup","forum_name":"創業","summary":"最近為了加盟的事情搞得焦頭爛額，有一個我滿看好的加盟品牌，去了解一下加盟契約，總部提供的權利金是營業額的9%，依據我身邊朋友多數經驗大概8%，感覺稍微偏高，而且身邊有另一個例子，加盟品牌之後朋友有做起"},{"keyword":"加盟"," eyword":"創業","id":261004653,"title":"目前是記帳士事務所的老闆","url":"https://www.dcard.tw/f/startup/p/261004653","created_at":"2026-03-04T08:30:45.941Z","comment_count":4,"like_count":1,"forum_alias":"startup","forum_name":"創業","summary":"台灣的專業人士有非常多痛點，到目前還是無法解決，有沒有軟體工程師想一起創業，聊聊有沒有解決辦法，希望能有流暢的UIUX。"},{"keyword":"創業","id":254094556,"title":"創業","url":"https://www.dcard.tw/f/startup/p/254094556","created_at":"2023-12-08T21:18:48.452Z","comment_count":14,"like_count":4,"forum_alias":"startup","forum_name":"創業","summary":"想請問各位，目前小弟有打算創業 做個炸物小吃攤，但由於啟動資金不足 辦信貸的話有需要什麼條件嗎 利率大約多少才會比較好 因為信貸的部分真的不太瞭解😅，再請各位大家幫我分析一下 小弟會很感謝各位的🙏🙏"},{"keyword":"創業","id":260862181,"title":"#請益 餐廳創業找網紅合作被搞到心累，有推薦的行銷公司嗎？","url":"https://www.dcard.tw/f/startup/p/260862181","created_at":"2026-02-12T08:51:47.817Z","comment_count":19,"like_count":22,"forum_alias":"startup","forum_name":"創業","summary":"創業開餐廳這段路程不好走.....，有很多事情都是做做看才知道.....，從找位置、裝潢、找員工過程真的是痛苦，好不容易一切都好了，開始營業才是最大的挑戰....，開幕第五個月雖然營業額有起來，但營業"},{"keyword":"創業","id":261150882,"title":"女生的年齡焦慮","url":"https://www.dcard.tw/f/mood/p/261150882","created_at":"2026-03-21T18:17:47.409Z","comment_count":15,"like_count":7,"forum_alias":"mood","forum_name":"心情","summary":"大學畢業後做了兩份工作，在一次跟老闆吵架後開始創業。直接一路創業拼到今年35歲了，工作在兩三年前比較穩定，有小公司，也能帶大家員工旅遊，也有幾個很好的夥伴，也終於有錢和時間開始學以前想學的課（舞蹈、品"},{"keyword":"創業","id":259226955,"title":"創業","url":"https://www.dcard.tw/f/startup/p/259226955","created_at":"2025-07-02T14:52:53.003Z","comment_count":4,"like_count":1,"forum_alias":"startup","forum_name":"創業","summary":"自己對做甜點有興趣，有想要創業的心，想要詢問前輩們創業需注意什麼，那需要食品標章之類的嗎？想要先透過市集賣而不是開店的那種。"},{"keyword":"創業","id":260964740,"title":"都要27歲了月收入才32000是不是很失敗？","url":"https://www.dcard.tw/f/mood/p/260964740","created_at":"2026-02-27T05:46:22.351Z","comment_count":171,"like_count":271,"forum_alias":"mood","forum_name":"心情","summary":"在dcard上看到許多人月收入都至少20～30萬，我有些同學畢業後合夥創業，年收分帳每個人收入也有400萬～500萬，反觀我都快27歲了，月收入才32000，這樣的人生是不是很失敗？我私立大學學士、學"},{"keyword":"創業","id":260792798,"title":"青年創業貸款疑問","url":"https://www.dcard.tw/f/startup/p/260792798","created_at":"2026-02-02T03:57:26.470Z","comment_count":4,"like_count":1,"forum_alias":"startup","forum_name":"創業","summary":"我在2025/12辦了營登，雖然還沒有401，但是當初是因為稅務問題才登記，因此有提供給國稅局一年的財務報表，不知這樣是否能申辦貸款呢？另關於兩學分的創業課程，近三年內有在學校修過相關課程，要如何知道"},{"keyword":"創業","id":261105641,"title":"投資建議🙏","url":"https://www.dcard.tw/f/money/p/261105641","created_at":"2026-03-16T16:01:58.416Z","comment_count":7,"like_count":9,"forum_alias":"money","forum_name":"理財","summary":"想請問年薪千萬的各位，因為創業關係 收入都是分散的，平均下來年薪220-250萬，但感覺沒有那麼的有年薪200起的感覺，總感覺資產累積很慢，創業前是月光族，創業後這一年資產：股票38萬、黃金14錢（目"},{"keyword":"創業","id":261050228,"title":"大研生醫董座才 47 歲就這樣走了","url":"https://www.dcard.tw/f/mood/p/261050228","created_at":"2026-03-09T18:55:40.894Z","comment_count":16,"like_count":111,"forum_alias":"mood","forum_name":"心情","summary":"你吃的魚油有幾 %？這句廣告很耳熟，大研生醫創辦人張家銘，海外出差，在睡夢中就這樣走了，享年47歲🙏，他23歲白手起家，愛情公寓也是他創的，後來年過40身體開始亮紅燈，才轉做保健品二次創業，去年大研生"},{"keyword":"創業","id":261008875,"title":"創業心得-「體制外篇」","url":"https://www.dcard.tw/f/persona_marties/p/261008875","created_at":"2026-03-04T18:23:49.755Z","comment_count":0,"like_count":77,"forum_alias":"persona_marties","forum_name":"個人看板","summary":"又是夜裡難眠的時候，雖然眼睛閉上，但腦袋一直說「趕快寫日記」——————————，《代價》前幾年因為一些變故流浪了幾個月，去年再次振作起來，如果你想創造一個夢想，那就先喝杯咖啡想想有哪些代價，「代價」"},{"keyword":"創業","id":260819669,"title":"高中生創業","url":"https://www.dcard.tw/f/startup/p/260819669","created_at":"2026-02-06T01:34:40.621Z","comment_count":14,"like_count":11,"forum_alias":"startup","forum_name":"創業","summary":"一名高中三年級的學生預計投入服飾產業，初期預計選用黑白短T以及我們自己設計的圖案，想要主打物美價廉來進入市場穩定客群，材質的部分不會省我認為舒服比較重要，但目前一直在想我第一批貨沒有穩定客源時該怎麼辦"},{"keyword":"創業","id":255183517,"title":"創業的原因","url":"https://www.dcard.tw/f/tech_job/p/255183517","created_at":"2024-04-06T02:11:06.560Z","comment_count":4,"like_count":5,"forum_alias":"tech_job","forum_name":"科技業","summary":"本文轉自電子設計菁英，很現實的問題是～為何我要創業，我當時為何創業，這是一個很簡單的數字問題～我當時40歲，就是繼續吃人家的飯，我估計我很幸運的可以吃到45歲。在之後即便還有飯吃，大概就是顧問類似的工"},{"keyword":"創業","id":260928601,"title":"年薪300+可以搬出去嗎？","url":"https://www.dcard.tw/f/mood/p/260928601","created_at":"2026-02-23T09:13:22.230Z","comment_count":42,"like_count":23,"forum_alias":"mood","forum_name":"心情","summary":"我先說一下過去狀況，本來是上班族 存到3-400萬的存款，才開始投資股票 結果賠了一半，又裸辭 把剩下的存款投入創業，創業快兩年，從虧損 小賺 虧損 穩定盈利，目前年收=年薪，已扣稅 基本是360萬+"},{"keyword":"創業","id":261003239,"title":"秒認出直銷關鍵字……","url":"https://www.dcard.tw/f/talk/p/261003239","created_at":"2026-03-04T04:59:32.987Z","comment_count":0,"like_count":2,"forum_alias":"talk","forum_name":"閒聊","summary":"剛剛在網路上看到有人發這篇：你絕對不知道的直銷關鍵字，1：溫罐，2：撥筋，3：自媒體「公益課」4：生態圈，5：早餐，7：0成本創業、被動收入，8：養肝，9：財商課，10：大健康，11：淨水器，12：空"},{"keyword":"手搖飲","id":257691770,"title":"🥛小眾手搖飲分享","url":"https://www.dcard.tw/f/boba/p/257691770","created_at":"2025-01-06T15:27:23.211Z","comment_count":24,"like_count":152,"forum_alias":"boba","forum_name":"手搖","summary":"除了喝連鎖的手搖外，發掘小眾飲料也是平常喝手搖的樂趣，以下來分享最近喝到的小眾手搖：1.伊莉莎白紅茶書坊，這間店不知道為什麼官網沒有寫花蓮中山殿（超特別的店名），我喝過林口跟花蓮的，花蓮中山殿真的是我"},{"keyword":"手搖飲","id":252935511,"title":"挽救討厭的手搖飲店","url":"https://www.dcard.tw/f/food/p/252935511","created_at":"2023-08-10T14:29:44.272Z","comment_count":261,"like_count":134,"forum_alias":"food","forum_name":"美食","summary":"以下是我不太喜歡的手搖飲店，1. 清心福全，2. 可不可，3. Coco，4. Comebuy，5. 迷客夏，6. 五銅號，不知道卡友們有沒有推薦的品項來挽救我討厭他們的心，或是推薦的其他手搖飲店～！"},{"keyword":"手搖飲","id":257785286,"title":"求好喝的手搖飲","url":"https://www.dcard.tw/f/boba/p/257785286","created_at":"2025-01-18T11:23:55.278Z","comment_count":16,"like_count":15,"forum_alias":"boba","forum_name":"手搖","summary":"常常喝五十嵐，偶爾想換個品牌但不知道點那個比較好，有哪些好喝的手搖飲可以推薦嗎"},{"keyword":"手搖飲","id":255143499,"title":"求推薦 蘋果手搖飲","url":"https://www.dcard.tw/f/boba/p/255143499","created_at":"2024-04-01T12:21:42.345Z","comment_count":32,"like_count":19,"forum_alias":"boba","forum_name":"手搖","summary":"最近真的超愛蘋果手搖飲料，目前喝到十二韻的特別喜歡，想要問問看大家還有什麼推薦的！希望是裡面有蘋果丁的！comebuy就不用推了，我在台中😭，更，謝謝大家推薦，今天喝了路易莎的愛丁堡紅茶，還不錯但果粒"},{"keyword":"手搖飲","id":254668014,"title":"連鎖手搖飲打工","url":"https://www.dcard.tw/f/boba/p/254668014","created_at":"2024-02-13T15:52:00.055Z","comment_count":10,"like_count":13,"forum_alias":"boba","forum_name":"手搖","summary":"目前在某間名稱有數字的連鎖手搖飲打工，剛進來就發現兩個問題，1.超時工作的薪水，依照勞基法 第9個小時後的時薪要*1.34吧，但這間卻沒有 雖然店長說是公司的問題，但我說我不管啊 前一個月我就算了，之"},{"keyword":"手搖飲","id":258291299,"title":"有推薦的手搖飲奶茶嗎","url":"https://www.dcard.tw/f/boba/p/258291299","created_at":"2025-03-17T12:58:55.314Z","comment_count":11,"like_count":3,"forum_alias":"boba","forum_name":"手搖","summary":"本人是一個奶茶控請問各位有推薦的手搖飲奶茶嗎，例如：七盞茶：夏日奶茶 麻古：蜜桃奶茶 以此類推"},{"keyword":"手搖飲","id":241697775,"title":"手搖飲=一餐","url":"https://www.dcard.tw/f/talk/p/241697775","created_at":"2023-04-07T17:34:54.213Z","comment_count":52,"like_count":176,"forum_alias":"talk","forum_name":"閒聊","summary":"沒有時間吃飯的時候，手搖飲料就是王道～～用拿的也方便，加料放燕麥、珍珠，就很不錯"},{"keyword":"手搖飲","id":259625234,"title":"求手搖飲推薦","url":"https://www.dcard.tw/f/boba/p/259625234","created_at":"2025-08-25T08:31:38.055Z","comment_count":14,"like_count":10,"forum_alias":"boba","forum_name":"手搖","summary":"最近想喝新的口味，希望可以幫忙推薦🤩，附近的店家有：得正，大王茶迷，50嵐，再睡5分鐘，麻古，coco，茶鄰客，茂昌草本茶，尬飲茶，希望可以推薦你們喜歡的飲品，本人很愛有料且不要太甜的（微糖），目前我"},{"keyword":"手搖飲","id":256245667,"title":"分享手搖飲","url":"https://www.dcard.tw/f/food/p/256245667","created_at":"2024-07-30T01:29:44.355Z","comment_count":9,"like_count":38,"forum_alias":"food","forum_name":"美食","summary":"來點外縣市的飲料，會去這些外縣市都是因為友人在那邊唸書和工作，跟著她一起挖掘在地美食，看相簿真的發現不小心累積很多飲料，大家也還是多喝水喔～📍北門綠豆沙，宜蘭的北門綠豆沙，我真的很愛，就是人每次都很多"},{"keyword":"手搖飲","id":260873873,"title":"想詢問一下現在流行手搖飲的推薦","url":"https://www.dcard.tw/f/food/p/260873873","created_at":"2026-02-14T05:01:10.189Z","comment_count":3,"like_count":14,"forum_alias":"food","forum_name":"美食","summary":"剛從國外回來，實在是太久沒喝了，記憶停留在50嵐 圓石 清心之類的，有先做一些研究，但似乎台灣現在流行是一沐日八曜和茶之類的，都比較偏茶佔比比較重，或者沒咖啡因的蕎麥茶的奶茶，老婆喜歡喝奶味重，濃厚一"},{"keyword":"手搖飲","id":261135020,"title":"只有少數手搖飲反對名間鄉設垃圾焚化爐😢","url":"https://www.dcard.tw/f/talk/p/261135020","created_at":"2026-03-20T16:00:02.141Z","comment_count":36,"like_count":194,"forum_alias":"talk","forum_name":"閒聊","summary":"用台灣柴茶葉的應該都會很反對這件事吧，怎麼好多常喝的都沒說話...，網友整理的：（可能有其他新增的），TEA TOP第一味，山焙，烏弄，茶之魔手，慕慕寧，十二韻，原韻茶莊，瀚漟，喜道，津鹿堂，沖泡奶茶"},{"keyword":"手搖飲","id":240367182,"title":"台南必喝手搖飲","url":"https://www.dcard.tw/f/food/p/240367182","created_at":"2022-10-28T13:55:43.980Z","comment_count":60,"like_count":59,"forum_alias":"food","forum_name":"美食","summary":"各位大大們有推薦台南必喝的手搖飲店嗎，本身是珍珠控 飲料一定要加珍珠🥹🥹，茶の魔手的珍珠我就蠻愛的，快推我入坑吧🫣"},{"keyword":"手搖飲","id":255623346,"title":"想詢問好喝的手搖飲","url":"https://www.dcard.tw/f/boba/p/255623346","created_at":"2024-05-22T07:12:40.084Z","comment_count":48,"like_count":33,"forum_alias":"boba","forum_name":"手搖","summary":"最近特別想喝手搖飲，大家可以把自己的口袋名單拿出來給小弟我參考一下嗎"},{"keyword":"手搖飲","id":258394597,"title":"求推薦手搖飲","url":"https://www.dcard.tw/f/talk/p/258394597","created_at":"2025-03-28T12:10:15.710Z","comment_count":8,"like_count":6,"forum_alias":"talk","forum_name":"閒聊","summary":"請問大家知道哪些手搖店有鮮奶類（沒有茶）的飲料嗎🥹，我本身很怕茶的苦味，也完全不喝咖啡。以前覺得奶茶很苦都喝全糖，但我發現這樣還是有茶味，不愛喝，喝起來很勉強，也不健康。而且每次喝奶精的奶茶都會頭暈，"},{"keyword":"手搖飲","id":241842705,"title":"2023手搖飲料店排名！？","url":"https://www.dcard.tw/f/boba/p/241842705","created_at":"2023-04-24T04:06:33.015Z","comment_count":92,"like_count":67,"forum_alias":"boba","forum_name":"手搖","summary":"前幾天陸陸續續看到各平台排序飲料店排行榜，現在手搖品牌越來越多，這一兩年也出現很多新品牌或是最近突然知名度暴增的，現在芒果季節來臨，手搖店也常常爆滿人潮，蠻好奇各位手搖飲料店排名1-10名是哪幾間？歡"},{"keyword":"手搖飲","id":259458673,"title":"手搖飲真的有那麼好喝嗎？","url":"https://www.dcard.tw/f/talk/p/259458673","created_at":"2025-08-02T11:53:06.671Z","comment_count":65,"like_count":41,"forum_alias":"talk","forum_name":"閒聊","summary":"我不愛喝手搖飲，不是不好喝，但也沒有到好喝到不行，而且又超級貴，一般的茶類大概也要35元以上，其他的價格更不用講了，一杯的價格都快跟雞排差不多了~，不懂就一杯水再加點糖，然後加一些可能不太好的茶，就貴"},{"keyword":"手搖飲","id":232337063,"title":"#問 每天都喝手搖飲會怎樣嗎","url":"https://www.dcard.tw/f/boba/p/232337063","created_at":"2019-10-20T11:13:41.688Z","comment_count":59,"like_count":70,"forum_alias":"boba","forum_name":"手搖","summary":"小弟最近不知怎麼的，每天都想喝手搖飲，下班買晚餐 如果沒買手搖飲來配就覺得有點空虛，以至於我一星期大概喝四五次手搖飲吧？我都點微糖微冰，我想請問一下大家你們平常喝手搖飲的頻率大概多常，如果每天喝會怎樣"},{"keyword":"手搖飲","id":255945913,"title":"戒手搖飲之路","url":"https://www.dcard.tw/f/talk/p/255945913","created_at":"2024-06-25T03:37:38.245Z","comment_count":38,"like_count":58,"forum_alias":"talk","forum_name":"閒聊","summary":"最近記帳後發現，自己在手搖飲的方面花太多錢了，這邊就想要戒掉手搖飲！，這邊總共想出了三種方法來幫助自己戒掉手搖飲~，一：多喝水，目前是使用一個叫做「喝水時間」的APP，協助自己養成喝水的習慣，操作起來"},{"keyword":"手搖飲","id":260973222,"title":"#分享 不專業的水果飲品分享","url":"https://www.dcard.tw/f/boba/p/260973222","created_at":"2026-02-28T08:09:26.933Z","comment_count":7,"like_count":37,"forum_alias":"boba","forum_name":"手搖","summary":"一直以來我都是喝純茶比較多，頂多加個鮮奶變拿鐵飲品 不太買其他種類的😝，但前陣子常聽同事說飲料搭配水果喝還不錯，也可以補充維生素（？身為牛馬上班族想想有道理😂😂，能順便吸收維他命非常好哈哈，於是前幾天"},{"keyword":"手搖飲","id":257760058,"title":"手搖飲記錄（持更）🧋","url":"https://www.dcard.tw/f/boba/p/257760058","created_at":"2025-01-15T07:33:01.280Z","comment_count":10,"like_count":23,"forum_alias":"boba","forum_name":"手搖","summary":"開始工作以後喝手搖的頻率越來越高，本來都喝無糖或微糖，漸漸地需要更多糖分🥲，每家糖量的標準都不太一樣，而且有的配料本身會甜，常常買到太甜或不甜嗚嗚，決定來記錄一下，-，【紅茶幫】鮮奶茶加波霸：波霸本身"},{"keyword":"手搖飲","id":238190199,"title":"台中推薦的手搖飲！！","url":"https://www.dcard.tw/f/boba/p/238190199","created_at":"2022-02-23T04:05:36.627Z","comment_count":44,"like_count":28,"forum_alias":"boba","forum_name":"手搖","summary":"台大學讀台中，但本人不是台中人，所以不太曉得台中有哪些厲害的手搖飲店，平常喜歡喝茶類和鮮奶類的，茶不澀.鮮奶濃郁即可"},{"keyword":"手搖飲","id":259654545,"title":"#台南手搖飲評比 不可不喝的 3 家質感手搖飲推薦","url":"https://www.dcard.tw/f/boba/p/259654545","created_at":"2025-08-29T04:19:06.011Z","comment_count":2,"like_count":12,"forum_alias":"boba","forum_name":"手搖","summary":"手搖飲是台灣人留在身體裡一部分的血液！，我們來到美食之都台南，也一定要幫大家找到，不管單喝還是搭配美食，都絕對適合的「百搭質感手搖」精選 3 家品質與口味都在線的手搖飲，來～跟著我們看下去～🥤💗，📍 "},{"keyword":"手搖飲","id":258901347,"title":"芒果季手搖飲","url":"https://www.dcard.tw/f/food/p/258901347","created_at":"2025-05-24T18:23:32.180Z","comment_count":4,"like_count":16,"forum_alias":"food","forum_name":"美食","summary":"最近芒果季來臨，期待好久的芒果季🥹🥹，目前喝到第一名是大苑子芒果冰沙，完完全全的芒果味😍，最近看到很多家手搖飲陸陸續續出芒果飲料，但很怕踩雷，上次喝別家的芒果冰沙但喝起來有化學調味🥲，想問有沒有推薦不"},{"keyword":"手搖飲","id":259466849,"title":"手搖飲跟超商飲料的糖不一樣？","url":"https://www.dcard.tw/f/talk/p/259466849","created_at":"2025-08-03T14:03:47.175Z","comment_count":6,"like_count":9,"forum_alias":"talk","forum_name":"閒聊","summary":"事情發生在前幾天，我喝某家手搖飲荔枝烏龍加珍珠半糖少冰沒喝完放在地上忘記清理，後來昨天又喝了超商純喫茶紅茶喝剩也放在地上，結果今天一早純喫茶紅茶長螞蟻了，但我看手搖飲完全沒有螞蟻（？為什麼呢？我看純喫"},{"keyword":"手搖飲","id":235685952,"title":"手搖飲料聲量排行","url":"https://www.dcard.tw/f/boba/p/235685952","created_at":"2021-04-02T14:17:39.470Z","comment_count":30,"like_count":332,"forum_alias":"boba","forum_name":"手搖","summary":"最近幾年越來越多手搖飲品牌竄出，根據GoogleTrend的聲量比較，五十嵐和清心的聲量一直都是前幾名，沒有被新品牌取代。大家每天必喝的手搖飲有在排行榜上嗎？"},{"keyword":"手搖飲","id":260169291,"title":"民雄手搖飲分享🥤❤️","url":"https://www.dcard.tw/f/boba/p/260169291","created_at":"2025-11-01T17:12:05.186Z","comment_count":5,"like_count":8,"forum_alias":"boba","forum_name":"手搖","summary":"小女子最近被調到民雄工作，身為社畜 每天沒有一杯手搖飲真的活不下去🥹，沒有來之前對民雄的印象就是，鵝肉？肉包？（先跟在地人道歉🙇🏼‍♀️，結果來了發現最多的是手搖飲店🤣，以下是我個人喝過推薦的，（有名連鎖的就"},{"keyword":"手搖飲","id":260859807,"title":"2/14更（居然真的有人做出來了","url":"https://www.dcard.tw/f/boba/p/260859807","created_at":"2026-02-12T00:14:07.786Z","comment_count":30,"like_count":1013,"forum_alias":"boba","forum_name":"手搖","summary":"更新，沒想到分享會受到大家熱情回應，B1有大家的常見問題跟回覆，看到好多人在卡iOS，B29有分享上了，我是安卓的，所以大家可以自己去看看，一直很喜歡喝手搖飲，但真的選項太多，常常忘記好喝的比例到底是"},{"keyword":"手搖飲","id":260920664,"title":"手搖飲店員「2特徵」小心！前稽核員喊：看到請轉頭買別家","url":"https://www.dcard.tw/f/persona_setn54/p/260920664","created_at":"2026-02-22T10:15:01.061Z","comment_count":7,"like_count":88,"forum_alias":"persona_setn54","forum_name":"個人看板","summary":"台灣人熱愛手搖飲，走到哪都可以看到人手一杯，全台飲料店數已突破2.8萬家，且市場規模持續成長。不過愛喝飲料的你要注意了，一名曾經擔任手搖飲店稽核人員的網友就曾提醒，若發現店員手部出現2個特徵「請馬上轉"},{"keyword":"手搖飲","id":255280089,"title":"必喝手搖飲推薦！","url":"https://www.dcard.tw/f/food/p/255280089","created_at":"2024-04-16T05:33:45.684Z","comment_count":26,"like_count":20,"forum_alias":"food","forum_name":"美食","summary":"有人也跟我一樣愛喝飲料嗎？我是一天可以喝4杯飲料，但不吃飯的哪種🤣，有時喝同家飲料也會膩，所以常常換間喝～最近有了一些心得，所以上來跟大家分享交流！，也想問問大家有沒有同感～或是有其他必推也可以跟我說"},{"keyword":"手搖飲","id":239510837,"title":"手搖飲推薦💕💕💕","url":"https://www.dcard.tw/f/food/p/239510837","created_at":"2022-07-22T17:00:59.437Z","comment_count":57,"like_count":60,"forum_alias":"food","forum_name":"美食","summary":"想問看看大家有沒有自己私藏的飲品清單可以分享🥰，我自己最近喜歡（平常都喝微糖），1.翰林茶館—黑熊貓珍珠奶茶🧋半糖去冰，喜歡喝奶茶的朋友，豎起大拇指推，（雖然有點貴🥲但現在憑學生證可以升級成特大杯唷）"},{"keyword":"早午餐","id":260553242,"title":"桃園｜早午餐分享 🥗","url":"https://www.dcard.tw/f/food/p/260553242","created_at":"2025-12-27T05:58:15.929Z","comment_count":0,"like_count":41,"forum_alias":"food","forum_name":"美食","summary":"整理桃園的早午餐集合分享，其實桃園也很多早午餐🥗，🥨 浮島溪 | Söt cafe Rivulet，📍 330桃園市桃園區民光東路312號，法式吐司好胖好罪惡 🍞，早餐只供應到11：30要早來才吃得到"},{"keyword":"早午餐","id":260694341,"title":"我的早午餐","url":"https://www.dcard.tw/f/talk/p/260694341","created_at":"2026-01-18T05:09:50.112Z","comment_count":5,"like_count":9,"forum_alias":"talk","forum_name":"閒聊","summary":"我用線上訂餐在里歐訂了貝果升級套餐，上面有寫含主餐、炸物、水果、飲料任選，總共是165，剛拿到家發現只有貝果跟飲料，打電話去店裡問店員說就說就只有貝果跟飲料阿，想問問到底是我誤會了嗎還是我中文不好了"},{"keyword":"早午餐","id":260969826,"title":"🥗台南｜預約困難人氣早午餐","url":"https://www.dcard.tw/f/food/p/260969826","created_at":"2026-02-27T17:38:00.001Z","comment_count":0,"like_count":17,"forum_alias":"food","forum_name":"美食","summary":"在成大周邊的人氣早午餐，位置不多 會建議提前預約，每個月會開放下個月的預約時段，詳情可以關注店家IG，這裡的早午餐拼盤只有一種可以選擇，‎﹆嶼の早午餐 $260，迷你生吐司外層微微烤到金黃，咬下去柔軟"},{"keyword":"早午餐","id":260850252,"title":"民生早午餐 by 貓下去","url":"https://www.dcard.tw/f/food/p/260850252","created_at":"2026-02-10T12:05:47.023Z","comment_count":7,"like_count":69,"forum_alias":"food","forum_name":"美食","summary":"在網路上鬧得沸沸揚揚的民生早午餐，我原本就真的蠻有興趣的，再加上有人在網路嘴秋說我不去吃就不要酸，沒有，我是真的要去吃。還從高雄特地跑上去吃，-，禮拜五中午，客滿，比想像中還多人，意外的是打開電梯，迎"},{"keyword":"早午餐","id":261096161,"title":"3/15 貳樓（早午餐）","url":"https://www.dcard.tw/f/persona_read355/p/261096161","created_at":"2026-03-15T14:16:30.140Z","comment_count":2,"like_count":91,"forum_alias":"persona_read355","forum_name":"個人看板","summary":"今天吃了這家 貳樓，不在餐廳街，它在巨城百貨創藝廳（最靠近「巨城附中」的那棟😂），特斯拉櫃正對面。關於「貳樓」名稱的由來（參官網說明）：———————————————————，一.候位，是「寵物友善」"},{"keyword":"早午餐","id":261007080,"title":"☕️台南｜餐點超優秀的老宅早午餐","url":"https://www.dcard.tw/f/food/p/261007080","created_at":"2026-03-04T13:54:08.878Z","comment_count":0,"like_count":16,"forum_alias":"food","forum_name":"美食","summary":"終於來吃收藏已久的和喫咖啡，採現場登記候位，也是一間讓我甘願等待一個多小時的早午餐，整體餐點表現出色，從餐點到細節都能感受到滿滿用心，是一間會想再回訪的老宅早午餐，‎﹆香料微辣雞腿排大餐盤 $360，"},{"keyword":"早午餐","id":260630399,"title":"貓下去早午餐爭議","url":"https://www.dcard.tw/f/talk/p/260630399","created_at":"2026-01-08T07:40:13.105Z","comment_count":116,"like_count":259,"forum_alias":"talk","forum_name":"閒聊","summary":"Threads上爆了，早餐盤如下$580，加三顆荷包蛋要$140，我自己是不會去吃啦，考量到他的地段我覺得這盤頂多$450加一成就很頂了，有沒有吃過的人可以分享好吃嗎"},{"keyword":"早午餐","id":260636357,"title":"早午餐都誰在吃的?","url":"https://www.dcard.tw/f/talk/p/260636357","created_at":"2026-01-09T06:42:51.856Z","comment_count":40,"like_count":37,"forum_alias":"talk","forum_name":"閒聊","summary":"民生社區咖啡廳的經典早餐盤定價580元，單點三顆荷包蛋為140元，生長在小康家庭，家裡沒有金山銀山，出社會了解賺錢是多麼不容易，好奇這樣的店都是怎麼樣的人會去，又或是自己不夠享受生活，捨不得花，大家平"},{"keyword":"早午餐","id":261021626,"title":"【板橋早午餐】Second Floor貳樓板橋，人氣早午餐推薦，寵物友善餐廳帶萌寶貝一起吃飯好幸福 -近TPKD大樓","url":"https://www.dcard.tw/f/food/p/261021626","created_at":"2026-03-06T10:01:42.609Z","comment_count":0,"like_count":11,"forum_alias":"food","forum_name":"美食","summary":"說到北部非常有名的早午餐店，貳樓絕對榜上有名。餐點選擇非常豐富，店內餐點種類很多，除了基本的早午餐之外，還有各式各樣的沙拉碗、義大利麵、三明治、漢堡、燉飯，甚至還有烤雞、脆皮豬腳 等比較有份量的主餐。"},{"keyword":"早午餐","id":260630884,"title":"貓下去推出全新品牌「民生早午餐」","url":"https://www.dcard.tw/f/food/p/260630884","created_at":"2026-01-08T08:58:50.869Z","comment_count":12,"like_count":37,"forum_alias":"food","forum_name":"美食","summary":"知名餐酒館「貓下去」開了新品牌「民生早午餐」就在敦北民生路口麥當勞樓上那個位置 以前是双聖的舊址，試營運期間就引發超多討論，雖然真的有點貴，不過畢竟是開在商業地段，而且餐點內容其實還算豐富，有培根、蛋"},{"keyword":"早午餐","id":233811444,"title":"早午餐","url":"https://www.dcard.tw/f/cjc/p/233811444","created_at":"2020-06-04T16:57:39.777Z","comment_count":6,"like_count":14,"forum_alias":"cjc","forum_name":"崇仁醫護管理專科學校","summary":"不知道你們怎麼想，我想知道你們心中的那些好吃早午餐的排行，是什麼食物呢？我個人蠻喜歡 早餐的熱狗加薯餅🤤，午餐是 那個卡拉雞腿堡 🥴"},{"keyword":"早午餐","id":260667881,"title":"在地人激推古早味平價早午餐，必點招牌綜合湯、綜合麵食，料多味美","url":"https://www.dcard.tw/f/food/p/260667881","created_at":"2026-01-14T03:19:18.726Z","comment_count":0,"like_count":16,"forum_alias":"food","forum_name":"美食","summary":"平價古早味早午餐，是許多老饕來到後龍必吃的美食之一，招牌綜合湯、綜合麵類、乾板條、筍絲滷肉飯是人氣餐點，湯頭鮮甜濃郁，粄條Q彈入味。距離白沙屯拱天宮與山邊媽祖宮僅15分鐘車程，前往苗栗海線參拜或路過時"},{"keyword":"早午餐","id":239184039,"title":"菇菇早午餐","url":"https://www.dcard.tw/f/food/p/239184039","created_at":"2022-06-15T11:44:50.881Z","comment_count":3,"like_count":35,"forum_alias":"food","forum_name":"美食","summary":"民宿+早午餐，臉書上名字超長，菇菇早午餐•菇菇雞蛋燒&居易民宿，沒有電話 只能用messenger 訂位，裝潢是古典歐式 室內燈光比較暗，︎菇菇早午餐 起司醬牛肉丸 $220，︎菇菇套餐 義式鄉村炸雞腿 "},{"keyword":"早午餐","id":260777001,"title":"北車南陽街吃到一間會回訪的早午餐＋拌麵（可外送）","url":"https://www.dcard.tw/f/persona_fanfancat99/p/260777001","created_at":"2026-01-30T15:26:08.859Z","comment_count":1,"like_count":101,"forum_alias":"persona_fanfancat99","forum_name":"個人看板","summary":"最近在 台北車站、南陽街 一帶找吃的，剛好要找可以坐下來吃、不用太趕的店，結果吃到一間我覺得滿有記憶點的，想來分享一下。店名是 RHINO 犀牛茶食文化，定位比較像是「早午餐＋拌麵＋飲料」的複合式餐廳"},{"keyword":"早午餐","id":260885322,"title":"《新竹》｜沒看錯！真的是鹽酥雞早午餐🥪","url":"https://www.dcard.tw/f/food/p/260885322","created_at":"2026-02-16T06:02:33.027Z","comment_count":17,"like_count":161,"forum_alias":"food","forum_name":"美食","summary":"經過就被外觀吸引了，就是要這種有裝潢感的早午餐，菜單選擇不多，要趕快下定決心，健康的擺盤和配色，讓我心安裡得的點了，吐司，看起來平凡，結果默默最好吃，軟軟熱熱＋微微奶油香，一不小心兩片直接消失。沙拉🥗"},{"keyword":"早午餐","id":260633229,"title":"食如其名「一人一伴」剛剛好的三明治早午餐🥪","url":"https://www.dcard.tw/f/food/p/260633229","created_at":"2026-01-08T15:18:35.789Z","comment_count":0,"like_count":65,"forum_alias":"food","forum_name":"美食","summary":"哩賀🙌，上週久違去台中看五月天的演唱會（有夠喜歡💙，順便解鎖存了很久的日系早午餐.ᐟ，11：30左右到剛好最後一桌直接入座，他們家不能訂位 都只能現場候位呦，🥪千層豬排玉子燒三明治 $295，就是被這"},{"keyword":"早午餐","id":260773217,"title":"一個人的早午餐分享x3天 #生活打卡計畫","url":"https://www.dcard.tw/f/persona_maumaumau/p/260773217","created_at":"2026-01-30T05:08:27.657Z","comment_count":0,"like_count":70,"forum_alias":"persona_maumaumau","forum_name":"個人看板","summary":"總之就是紀錄這週自己吃掉的早午餐🤩，自己吃飯很悠哉，可以隨意選喜歡的店和品項，而且我是早餐和午餐合併，所以會吃豐盛一點。這禮拜前兩天沒拍照，週一吃了好食間的吐司加套餐，週二外帶及第家的早餐回家吃。週三"},{"keyword":"早午餐","id":260911586,"title":"初五睡飽、吃飽 享受美好的早午餐","url":"https://www.dcard.tw/f/food/p/260911586","created_at" :"2026-01-22T23:00:31.000Z","likes":37,"replies":63},{"keyword":"加盟","id":"3854495820499099994","code":"DV964bZE6Fa","text":"加盟開店兩年多，現在只剩迷茫..\n餐飲生手入坑 🫣🫣🫣\n\n加盟到去年為止 生意量還算穩定，雖然比起周遭店家還是小卡拉米，但最少有照預期在回本，一天能賣200-300個便當\n\n但去年中開始，總部一直找各種理由在漲食材費，半年內漲2次，品牌的分店越開越多，卻說不漲員工連工錢都不夠\n（os 用量越來越大，成本卻壓不下來？）\n\n去年底國稅局要求要開發票，因為我們是加盟品牌，就算配合行動支付也不能延期繼續使用1%，因為是整條路都被檢舉 ，我們從去年底開始使用，但價格調漲後，生意量也下來了，很有感的差距。\n\n現在已經三月了，整條路只有我們家開始開發票…周遭生意更好的同業卻不用，甚至其他區 同品牌 生意很好","author":"sjdnekebdke","url":"https://www.threads.net/@sjdnekebdke/post/DV964bZE6Fa","created_at":"2026-03-17T01:42:10.000Z","likes":35,"replies":29},{"keyword":"加盟","id":"3833963284366783152","code":"DU0-Us-knKw","text":"加盟路易莎8年了,突然想起當初的決定\n\n想問問大家:\n- 加盟前做了哪些評估?\n- 是什麼讓你最後決定加盟?\n- 朋友推薦?財務試算?還是看好品牌?\n\n單純好奇,沒有標準答案~","author":"summer_cocomom","url":"https://www.threads.net/@summer_cocomom/post/DU0-Us-knKw","created_at":"2026-02-16T17:47:41.000Z","likes":12,"replies":6},{"keyword":"加盟","id":"3858311239378878147","code":"DWLeaFIEz7D","text":"大家好，我是紅茶巴士的老闆娘。\n針對我近期在 Threads 上回覆網友留言「青鳥去曬曬太陽」的不當回應，我在此向所有被冒犯的朋友致上最深的歉意。\n我於回覆網友留言的當下，沒有深入了解該詞彙背後的社會涵意與重量，僅以個人的主觀直覺草率回應，這是我的失職與不成熟。\n紅茶巴士的初衷是想把飲品做好，讓消費者再次享受過往紅茶冰的甘醇留香。因此每一家加盟店的夥伴，每天都非常辛苦、認真地在第一線服務客人。身為一個品牌的經營者，我個人的發言不僅代表自己，也影響了每一位正在第一線辛勤工作、熱愛這個品牌的加盟夥伴，我也再次向加盟夥伴致歉。\n我將暫時停止個人社群的發言，將重心回歸我們的產品與服務。未來的發言，將更","author":"ruby_building","url":"https://www.threads.net/@ruby_building/post/DWLeaFIEz7D","created_at":"2026-03-22T08:02:43.000Z","likes":11,"replies":9},{"keyword":"加盟","id":"3838759947211870438","code":"DVGA9VXj5Dm","text":"想請問自創餐飲品牌的老闆們～\n開加盟出去需要注意什麼呢🤔🤔","author":"pin__0531","url":"https://www.threads.net/@pin__0531/post/DVGA9VXj5Dm","created_at":"2026-02-23T08:37:47.000Z","likes":13,"replies":30},{"keyword":"加盟","id":"3843434756399383181","code":"DVWn4wsk0KN","text":"找工作 或者創業 加盟 \n81年次 不想跑船了 \n詐騙勿擾","author":"15tian","url":"https://www.threads.net/@15tian/post/DVWn4wsk0KN","created_at":"2026-03-01T19:25:48.000Z","likes":26,"replies":53},{"keyword":"加盟","id":"3857385568574027481","code":"DWIL7zAkrbZ","text":"原來超商的加盟主\n會需要「囤咖啡數量」可能一次要一千杯\n再慢慢靠自己做活動促銷😱\n賣不完的都是加盟主自己吸收\n壓力還真大….","author":"tsen7625","url":"https://www.threads.net/@tsen7625/post/DWIL7zAkrbZ","created_at":"2026-03-21T01:23:34.000Z","likes":1212,"replies":90},{"keyword":"加盟","id":"3853419165001061975","code":"DV6GFB0khZX","text":"今天去看了加盟展，也在猶豫自己是不是真的要拼一次！！想問問廣大的脆友們及過來人的經驗談，小弟目前看的是飲料店","author":"ryan800308","url":"https://www.threads.net/@ryan800308/post/DV6GFB0khZX","created_at":"2026-03-15T14:03:02.000Z","likes":0,"replies":155},{"keyword":"加盟","id":"3839684901545776656","code":"DVJTRMOERYQ","text":"好奇問問\n餐飲業老闆們\n是怎麼開始繳營業税的😅\n我先説\n因為要開放加盟","author":"zhonghao7302","url":"https://www.threads.net/@zhonghao7302/post/DVJTRMOERYQ","created_at":"2026-02-24T15:15:30.000Z","likes":20,"replies":20},{"keyword":"創業加盟","id":"3662179115970832165","code":"DLSrIC_S6cl","text":"其實蠻多人都會問我加盟飲料店賺不賺錢\n我統一回答：不一定\n一間賺錢的店必須考慮以下\n人事、水電、位置（超級重要）、經營模式、房租、品牌大小⋯⋯等\n如果我一開始說會賺錢，這樣等於給他人信心。\n信心必須是自己給自己的！\n其實顧好品質 控制好人事 基本上小月打平 大月才是開始賺的時候\n很常遇到客人跟我說 咦 你怎麼每天都在 都沒休息嗎？（心理想：我跟我先生在，還有一個跟很久的正職在 就是品質保證😂）\n現在的客人嘴很利 好與不好 走業績會有答案😛\n\n成功 是99的努力+1分的運氣 \n所以是要努力才有機會成功🏆\n可以在下面留言您看法與觀點⋯\n畢竟成功也是需要吸收別人提供經驗與看法！","author":"cingkai0820","url":"https://www.threads.net/@cingkai0820/post/DLSrIC_S6cl","created_at":"2025-06-24T17:23:12.000Z","likes":32,"replies":8},{"keyword":"創業加盟","id":"3705703291886691761","code":"DNtTYKj5uWx","text":"有人會想要加盟鹽水雞嗎？？\n\n創業已經4年了\n\n目前有2間了☺️☺️\n\n想要擴展攤位、曝光品牌\n\n讓更多人吃到不一樣的鹽水雞🐔🐔\n\n前5攤目前不收加盟金，只求品牌曝光\n\n1.我們只綁雞肉、胡椒粉\n 💥💥（必竟，這是最重要的東西）💥💥\n2.我們讓利，讓大家賺更多錢\n3.手把手，教會雞肉去骨、調味、煮菜、選地點\n\n歡迎有興趣創業的小資族，可以討論\n小額創業，大大受惠\n\n❌❌不收加盟金、不收加盟金、不收加盟金❌❌\n\n 🌟🌟真的很重要🌟🌟","author":"twofishboy_0918","url":"https://www.threads.net/@twofishboy_0918/post/DNtTYKj5uWx","created_at":"2025-08-23T18:37:58.000Z","likes":32,"replies":14},{"keyword":"創業加盟","id":"3858192162777966169","code":"DWLDVSZk6ZZ","text":"K大香雞排🔍\n想開雞排店，最怕的不是沒客人，是自己什麼都不懂，設備、技術、流程通通要自己摸，真的很容易繞一大圈。\n如果你也想創業，但不知道怎麼開始，K大香雞排直接幫你把路鋪好！\n技術教到會，沒經驗也免驚\nV 招牌、菜單、包裝，總部幫你準備好\nV 不只加盟，還有總部行銷一起幫你衝業績原加盟金＄88,000，現在限時創業價只要\n$68,000","author":"stellababy0419","url":"https://www.threads.net/@stellababy0419/post/DWLDVSZk6ZZ","created_at":"2026-03-22T04:06:26.000Z","likes":2,"replies":0},{"keyword":"創業加盟","id":"3627248030778456172","code":"DJWkt2yyPhs","text":"望高樓_串串燒 雞蛋仔，\n期待與您攜手共進！\n#望高樓 #串串燒#雞蛋仔\n#加盟招商 #雞蛋糕\n#小本創業好項目 \n#品牌 #開店 #活動邀約\n#市集擺攤  #黑哥 #短影音 \n#夜市人生","author":"boss710413","url":"https://www.threads.net/@boss710413/post/DJWkt2yyPhs","created_at":"2025-05-07T12:41:48.000Z","likes":49,"replies":3},{"keyword":"創業加盟","id":"3852811328084455958","code":"DV3731lEzIW","text":"鹽水雞、鹽水雞、鹽水雞\n\nㄧ把剪刀✂️ㄧ台小攤車🚗\n\n就可以小額創業的好選擇\n\n🎉不需加盟金🎉\n🎉不需加盟金🎉\n\n本身也是加盟別人起家的，因總部給予的品質不穩定，故自身出來自創品牌，也因自身對食品的品質與堅持，這5年來也累積不少的忠實客戶☺️☺️，也想讓自己的鹽水雞品牌，讓更多人看見認識，故今年的目標想積極拓展市場跟加盟🥰🥰\n\n因為深知創業的辛苦與壓力，所以目前我們加盟是採不收加盟金☺️☺️（限前5攤）\n\n只收技術轉移費\n\n🏵️🏵️10000元🏵️🏵️\n\n手把手教到您會\n\n煮菜、去骨、調味、選址\n\n教到會爲止🐓🐓\n\n✅ 免加盟金、免權利金，沒有 \n  壓力的開始\n\n✅ 不用囤貨，賣多少雞肉拿多","author":"twofishboy_0918","url":"https://www.threads.net/@twofishboy_0918/post/DV3731lEzIW","created_at":"2026-03-14T17:55:22.000Z","likes":15,"replies":3},{"keyword":"創業加盟","id":"3854247415553929747","code":"DV9CZqQjzIT","text":"🌟2026春季加盟展\n看看現在市場上的創業模式\n很多品牌的加盟門檻，其實都不低\n\n逛了一圈之後\n反而更深刻體會到～\n品茉兒的創業條件真的很友善❤️\n\n有時候\n人真的要多出來走走、看看\n才會發現，原來自己早就在一個\n很多人想進來的機會裡 ✨\n\n機會一直都在\n只是看我們有沒有看見。\n\n#品茉兒多元通路公司 \n#2026開啟海外市場\n#創業機會 #女性創業","author":"star770411","url":"https://www.threads.net/@star770411/post/DV9CZqQjzIT","created_at":"2026-03-16T17:28:37.000Z","likes":0,"replies":0},{"keyword":"創業加盟","id":"3821988289394641177","code":"DUKbhl1EgkZ","text":"創業大家來聊\n目前走在第九年路上，一家直營，一家（小型加盟）一路上真的好不容易，也有訂單很慘淡，店內沒有任何客人的時候，每個餐飲業會碰到的事情也經歷過了，在這要跟所有創業的老闆們致敬🫡，雖然好幾次真的也要放棄，不過看著默默支持的客人，現在的穩定訂單，就這樣支撐著我到現在\n\n👇👇\n現階段想要招募更多想要創業的夥伴，不管是妳/你想要學技術，或是我的整套流程，歡迎詢問🙋，現在的餐飲規模、兩人創業不是問題，有興趣的可以來店內用餐聊聊，也可以參與其中，真的有熱情我們再來談合作\n聯絡專線：0981807230\n害羞的也可以私訊喔","author":"blackpig716","url":"https://www.threads.net/@blackpig716/post/DUKbhl1EgkZ","created_at":"2026-01-31T05:15:30.000Z","likes":12,"replies":0},{"keyword":"創業加盟","id":"382705757594332 <body>

<header>
  <h1>🔍 加盟品牌監測 Dashboard</h1>
  <div class="date" id="today-date"></div>
</header>

<main>
  <div id="loading">
    <div class="spinner"></div>
    載入資料中…
  </div>

  <div id="content" style="display:none">

    <!-- Stats -->
    <div class="section-title">總覽</div>
    <div class="stat-grid">
      <div class="stat-card">
        <div class="label">總文章數</div>
        <div class="value" id="stat-total">–</div>
        <div class="sub">所有平台合計</div>
      </div>
      <div class="stat-card">
        <div class="label">監測平台數</div>
        <div class="value" id="stat-platforms">–</div>
        <div class="sub">Dcard · Threads · PTT · FB</div>
      </div>
      <div class="stat-card">
        <div class="label">追蹤品牌數</div>
        <div class="value" id="stat-brands">–</div>
        <div class="sub">拉亞 · 麥味登 · Q Burger 等</div>
      </div>
      <div class="stat-card">
        <div class="label">追蹤關鍵字數</div>
        <div class="value" id="stat-keywords">–</div>
        <div class="sub">加盟 · 早餐 · 創業 等</div>
      </div>
    </div>

    <!-- Charts row 1 -->
    <div class="section-title">品牌 & 平台分析</div>
    <div class="chart-grid-2">
      <div class="chart-card">
        <h2>品牌提及次數</h2>
        <div class="chart-wrap" style="height:220px">
          <canvas id="chartBrands"></canvas>
        </div>
      </div>
      <div class="chart-card">
        <h2>平台分佈</h2>
        <div class="chart-wrap" style="height:220px">
          <canvas id="chartPlatforms"></canvas>
        </div>
      </div>
    </div>

    <!-- Chart row 2 -->
    <div class="section-title">關鍵字熱度</div>
    <div class="chart-card">
      <h2>關鍵字文章數</h2>
      <div class="chart-wrap" style="height:200px">
        <canvas id="chartKeywords"></canvas>
      </div>
    </div>

    <!-- Article list -->
    <div class="section-title">最新文章</div>
    <div class="article-list">
      <div class="article-list-header">
        最新 30 篇（所有平台合併）
        <span id="list-updated"></span>
      </div>
      <div id="article-list-body"></div>
    </div>

  </div><!-- #content -->
</main>

<script>
// ── 設定 ──────────────────────────────────────────────────────────────────
const BRANDS   = ['拉亞', '麥味登', 'Q Burger', '弘爺', '晨間廚房', '美而美'];
const KEYWORDS = ['加盟', '早餐', '創業', '手搖飲', '早午餐'];
// DATA_SOURCES: replaced by inline data

// ── 日期 ───────────────────────────────────────────────────────────────────
const today = new Date();
document.getElementById('today-date').textContent =
  today.toLocaleDateString('zh-TW', { year:'numeric', month:'long', day:'numeric', weekday:'short' });

// fetchJSON: replaced by inline data

// ── 正規化：把各平台資料統一成同一格式 ──────────────────────────────────────
function normalize(raw, platform) {
  const posts = raw?.posts ?? [];
  return posts.map(p => {
    const searchText = [
      p.title   ?? '',
      p.text    ?? '',
      p.summary ?? '',
      p.excerpt ?? '',
    ].join(' ');

    return {
      platform,
      title:    (p.title || p.text || p.summary || '（無標題）').slice(0, 120),
      url:      p.url       ?? p.permalinkUrl ?? '',
      date:     p.created_at ?? p.createdAt ?? p.date ?? '',
      comments: p.comment_count ?? p.commentCount ?? p.comments ?? p.replies ?? null,
      source:   p.forum_name ?? p.board ?? p.page_name ?? p.author ?? '',
      _search:  searchText.toLowerCase(),
    };
  });
}

// ── 計算命中次數 ──────────────────────────────────────────────────────────
function countHits(posts, term) {
  return posts.filter(p => p._search.includes(term.toLowerCase())).length;
}

// ── Chart helpers ─────────────────────────────────────────────────────────
const PLATFORM_COLORS = {
  dcard:    '#2563EB',
  threads:  '#7C3AED',
  ptt:      '#EA580C',
  facebook: '#1877F2',
};
const PLATFORM_LABELS = {
  dcard: 'Dcard', threads: 'Threads', ptt: 'PTT', facebook: 'Facebook',
};

function hbar(ctx, labels, data, colors) {
  return new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [{ data, backgroundColor: colors, borderRadius: 5, borderSkipped: false }],
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { color: '#F1F5F9' }, ticks: { font: { size: 12 } } },
        y: { grid: { display: false }, ticks: { font: { size: 13 } } },
      },
    },
  });
}

function doughnut(ctx, labels, data, colors) {
  return new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels,
      datasets: [{ data, backgroundColor: colors, borderWidth: 2, borderColor: '#fff' }],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      cutout: '62%',
      plugins: {
        legend: {
          position: 'bottom',
          labels: { font: { size: 12 }, padding: 12, boxWidth: 12 },
        },
      },
    },
  });
}

// ── 文章列表 ──────────────────────────────────────────────────────────────
function formatDate(str) {
  if (!str) return '';
  try {
    const d = new Date(str);
    if (isNaN(d)) return str.slice(0, 10);
    return d.toLocaleDateString('zh-TW', { month:'numeric', day:'numeric' });
  } catch { return str.slice(0, 10); }
}

function renderList(posts) {
  const top30 = [...posts]
    .filter(p => p.date)
    .sort((a, b) => new Date(b.date) - new Date(a.date))
    .slice(0, 30);

  document.getElementById('list-updated').textContent =
    `共 ${posts.length} 篇，顯示最新 ${top30.length} 篇`;

  const container = document.getElementById('article-list-body');
  container.innerHTML = top30.map(p => {
    const badge   = `<span class="platform-badge badge-${p.platform}">${PLATFORM_LABELS[p.platform]}</span>`;
    const title   = escHtml(p.title.slice(0, 80));
    const date    = formatDate(p.date);
    const comment = p.comments != null ? `💬 ${p.comments}` : '';
    const src     = p.source ? escHtml(p.source) : '';
    const href    = p.url ? `href="${escHtml(p.url)}" target="_blank" rel="noopener"` : '';
    return `
      <a class="article-item" ${href}>
        ${badge}
        <div class="article-body">
          <div class="article-title">${title}</div>
          <div class="article-meta">
            <span>${date}</span>
            ${src     ? `<span>${src}</span>` : ''}
            ${comment ? `<span>${comment}</span>` : ''}
          </div>
        </div>
      </a>`;
  }).join('');
}

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

// ── 主流程 ────────────────────────────────────────────────────────────────
async function init() {
  // 使用 inline 資料（由 build.py 內嵌）
  const raws = [DCARD_DATA, THREADS_DATA, FACEBOOK_DATA, PTT_DATA];

  // 正規化並合併
  let allPosts = [];
  const platformCounts = {};
  raws.forEach((raw, i) => {
    const { platform } = DATA_SOURCES[i];
    const posts = normalize(raw, platform);
    allPosts = allPosts.concat(posts);
    platformCounts[platform] = posts.length;
  });

  // ── Stats
  document.getElementById('stat-total').textContent     = allPosts.length.toLocaleString();
  document.getElementById('stat-platforms').textContent = Object.values(platformCounts).filter(v=>v>0).length;
  document.getElementById('stat-brands').textContent    = BRANDS.length;
  document.getElementById('stat-keywords').textContent  = KEYWORDS.length;

  // ── 品牌提及橫條圖
  const brandCounts  = BRANDS.map(b => countHits(allPosts, b));
  const brandColors  = BRANDS.map((_, i) =>
    ['#3B82F6','#8B5CF6','#EC4899','#F59E0B','#10B981','#EF4444'][i % 6]
  );
  hbar(
    document.getElementById('chartBrands').getContext('2d'),
    BRANDS, brandCounts, brandColors
  );

  // ── 平台分佈圓餅圖
  const activePlatforms = Object.keys(platformCounts).filter(k => platformCounts[k] > 0);
  doughnut(
    document.getElementById('chartPlatforms').getContext('2d'),
    activePlatforms.map(k => PLATFORM_LABELS[k]),
    activePlatforms.map(k => platformCounts[k]),
    activePlatforms.map(k => PLATFORM_COLORS[k])
  );

  // ── 關鍵字熱度橫條圖
  const kwCounts = KEYWORDS.map(k => countHits(allPosts, k));
  const kwColors = KEYWORDS.map((_, i) =>
    ['#0EA5E9','#6366F1','#F97316','#14B8A6','#F43F5E'][i % 5]
  );
  hbar(
    document.getElementById('chartKeywords').getContext('2d'),
    KEYWORDS, kwCounts, kwColors
  );

  // ── 文章列表
  renderList(allPosts);

  // 顯示
  document.getElementById('loading').style.display  = 'none';
  document.getElementById('content').style.display  = 'block';
}

init();
</script>
</body>
</html>
