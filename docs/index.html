70", "created_at": "2024-04-30T01:37:28.177Z", "comment_count": 10, "like_count": 18, "forum_alias": "food", "forum_name": "美食", "summary": "不好意思，想問問麥味登這個古早味拼盤為什麼熱量這麼低啊？原本以為是份量小，但今天買了覺得份量很大呀，實際熱量真的只有221大卡嗎，不過麥味登的蘿蔔糕真的很好吃😋"}, {"keyword": "麥味登", "id": 258763366, "title": "麥味登", "url": "https://www.dcard.tw/f/yzu/p/258763366", "created_at": "2025-05-08T16:20:45.565Z", "comment_count": 5, "like_count": 12, "forum_alias": "yzu", "forum_name": "元智大學", "summary": "覺得學校最雷的店是麥味登，從上學期到下學期吃了有20幾次，光其中有五六次就做錯要不然就是拿錯飲料或少給什麼，而且只要一到中午動線就會變得很亂，排隊點餐跟線上點餐應該也要講好怎麼排隊，一下排一排一下排兩"}, {"keyword": "麥味登", "id": 257538539, "title": "麥味登的鬆餅堡~*", "url": "https://www.dcard.tw/f/food/p/257538539", "created_at": "2024-12-19T02:58:02.523Z", "comment_count": 10, "like_count": 99, "forum_alias": "food", "forum_name": "美食", "summary": "最近看到麥味登還有在賣厚鬆餅堡 今天的早餐就點了它們的超厚雞肉起司蛋鬆餅堡來吃看看 覺得還不錯吃~，麥味登的鬆餅是用薄的鬆餅 上中下三層薄片鬆餅包著蛋、起司、雞肉 這樣疊在一起也是很厚的 因為沒有特别"}, {"keyword": "麥味登", "id": 260661990, "title": "早午餐店好賺嗎？加盟３間麥味登老闆來分享", "url": "https://www.dcard.tw/f/startup/p/260661990", "created_at": "2026-01-13T05:55:02.071Z", "comment_count": 163, "like_count": 1650, "forum_alias": "startup", "forum_name": "創業", "summary": "更新 2026/1/14 15：15，💡補充，這篇文章，主要是想寫給那些「有考慮創業、想開早餐店」的朋友看的。說實話，一般人拿不太到這種財報。 就連很多已經在開店的朋友，也未必有在做。以前的我也沒有這"}, {"keyword": "麥味登", "id": 234650680, "title": "麥味登鐵板湯麵", "url": "https://www.dcard.tw/f/cmu/p/234650680", "created_at": "2020-10-21T02:34:11.470Z", "comment_count": 30, "like_count": 41, "forum_alias": "cmu", "forum_name": "中國醫藥大學", "summary": "好不容易下課了衝去買早餐，甚至排了十分鐘左右，結果買到麥味登特製鐵板湯麵^_^，拿的過程中一直汁一直流出來很不方便就算了，味道也真的是十分母湯，店員這麼多出餐還這麼慢，味道又不好，連喊號的都很小聲⋯薪"}, {"keyword": "麥味登", "id": 239989889, "title": "#麥味登 我的泡菜呢？", "url": "https://www.dcard.tw/f/food/p/239989889", "created_at": "2022-09-15T06:08:44.197Z", "comment_count": 20, "like_count": 107, "forum_alias": "food", "forum_name": "美食", "summary": "9/22更新：今天上課時有經過相同店家的麥味登，於是又點了一個黃金泡菜酥炸餃～我直接和店員是說：「這次記得放泡菜～我上次點沒有放泡菜。」結果店員直接跟我說她補一份給我！，我打開之後看到，天吶，有夠多，"}, {"keyword": "麥味登", , {"keyword": "Q Burger", "id": 257945110, "title": "#閒聊 Q Burger", "url": "https://www.dcard.tw/f/job/p/257945110", "created_at": "2025-02-09T10:08:40.394Z", "comment_count": 8, "like_count": 4, "forum_alias": "job", "forum_name": "工作", "summary": "下個月可能要去QB報到了😰😰，但看完有一些脆之前員工的抱怨，害我有點害怕到底能不能去這家公司耶！，有人能幫我解答這家公司到底能不能去嗎？好的壞的都來😂😂"}, {"keyword": "Q Burger", "id": 254178001, "title": "Q Burger 的鮪魚玉米可朗芙", "url": "https://www.dcard.tw/f/food/p/254178001", "created_at": "2023-12-18T06:14:02.135Z", "comment_count": 35, "like_count": 206, "forum_alias": "food", "forum_name": "美食", "summary": "之前看到很多人推薦吃這個，然後終於來吃吃看，沒想到真的蠻好吃的，口味因為鮪魚裡面的沙拉偏重，但是可朗芙口感很棒，很脆很好吃👍，一個65元，雖然比較小，吃完沒有很飽但是味道上可以，推推"}, {"keyword": "Q Burger", "id": 253031114, "title": "Q burger？", "url": "https://www.dcard.tw/f/talk/p/253031114", "created_at": "2023-08-21T09:02:35.504Z", "comment_count": 21, "like_count": 65, "forum_alias": "talk", "forum_name": "閒聊", "summary": "前幾天跟先生去Q吃早餐，自從漲價以後～大概有半年以上沒有去Q吃早餐了，先生點了一個今日特餐，咔啦雞腿堡+飲料 結果送來時⋯，上下兩片漢堡皮呢？然後馬上拿出點餐明細！，（菜堡）？（菜堡）？（菜堡）？第一"}, {"keyword": "Q Burger", "id": 255365667, "title": "#工作心得 達利早餐 vs Q burger", "url": "https://www.dcard.tw/f/job/p/255365667", "created_at": "2024-04-25T04:16:59.627Z", "comment_count": 6, "like_count": 3, "forum_alias": "job", "forum_name": "工作", "summary": "最近面臨轉職，有想進入早餐店正職或儲備幹部，想請問大家會選擇哪一間呢？達利是正在擴展，Q burger是已經蠻大規模的，有人可以經驗分享工作環境和福利嗎？謝謝大家"}, {"keyword": "Q Burger", "id": 242419036, "title": "#心得 早餐店新品分享📍麥味登、Q Burger", "url": "https://www.dcard.tw/f/food/p/242419036", "created_at": "2023-06-01T02:38:01.590Z", "comment_count": 15, "like_count": 61, "forum_alias": "food", "forum_name": "美食", "summary": "三餐最愛早餐but身為社畜平常上班根本來不及吃早餐⋯⋯，前幾天假日跑去吃了早餐店新品來跟大家分享啦，禮拜六吃 #麥味登，原塊魚排可頌🥐$95＋可可牛奶🥤$40＋薯餅蛋塔$45，可頌麵包烤得酥酥的很加分"}, {"keyword": "Q Burger", "id": 258721411, "title": "Q Burger 一百元能吃到什麼？", "url": "https://www.dcard.tw/f/food/p/258721411", "created_at": "2025-05-04T05:52:45.091Z", "comment_count": 8, "like_count": 14, "forum_alias": "food", "forum_name": "美食", "summary": "每次去Q Burger，品項太多，但每種都想吃😋，一不小心就點太多了啦！😂，到底要怎麼樣才不會讓荷包心血呢？你的心聲讓我們幫你實現，告訴你一個好消息！只要參加《北大創業論壇no.29》加碼抽獎活動，就"}, {"keyword": "Q Burger", "id": 253076170, "title": "Q Burger 港式新品真的笑死", "url": "https://www.dcard.tw/f/food/p/253076170", "created_at": "2023-08-26T02:15:06.406Z", "comment_count": 41, "like_count": 194, "forum_alias": "food", "forum_name": "美食", "summary": "菠蘿油打開真的廢到笑死，豬趴包外面全都是油，這是正常的嗎，真的傻眼"}, {"keyword": "Q Burger", "id": 255129203, "title": "Q Burger變好貴🫨", "url": "https://www.dcard.tw/f/food/p/255129203", "created_at": "2024-03-31T01:59:29.712Z", "comment_count": 43, "like_count": 63, "forum_alias": "food", "forum_name": "美食", "summary": "其實本來就比一般早餐店貴，但我覺得Q Burger有比較好吃，而且可以線上點餐、線上付款，不過一陣子沒來，真的太貴了rrrr，今天點了，里肌吐司+蛋，蘿蔔糕+蛋，期間限定的厚奶茶+大，猜猜這樣多少錢！"}, {"keyword": "Q Burger", "id": 240914612, "title": "Qburger 的薯條份量", "url": "https://www.dcard.tw/f/talk/p/240914612", "created_at": "2023-01-02T23:46:50.028Z", "comment_count": 40, "like_count": 61, "forum_alias": "talk", "forum_name": "閒聊", "summary": "今天早上很餓，去早餐店想說加點 於是花了三十塊，加點紅茶和薯條，沒想到這薯條的份量⋯⋯，阿娘喂"}, {"keyword": "Q Burger", "id": 258091583, "title": "逢甲附近必吃", "url": "https://www.dcard.tw/f/fcu/p/258091583", "created_at": "2025-02-24T17:13:38.977Z", "comment_count": 33, "like_count": 112, "forum_alias": "fcu", "forum_name": "逢甲大學", "summary": "大四老人，想趁最後一學期吃一輪，有人可以推薦嗎，我先推薦吃過且不錯的愛店，1.慶三號，2.幸福廚房，3.Q burger，4.來點什麼，5.養雞場，N貳，7.麻藥飯卷，8.純粹咖哩，9.凰吐司，10."}, {"keyword": "Q Burger", "id": 241790405, "title": "來踩踩看Q Burger韓國風新品", "url": "https://www.dcard.tw/f/food/p/241790405", "created_at": "2023-04-18T06:23:04.555Z", "comment_count": 27, "like_count": 133, "forum_alias": "food", "forum_name": "美食", "summary": "今天路過Q burger，看到最近剛推出的韓國風新品，馬上決定來嚐鮮一下，平常就很喜歡吃韓式炸雞跟辣炒泡麵，看到菜單上面有是一定要點的吧！，因為天氣有點熱，所以另外再點了杯黑糖奶茶，餐點現點現做，大概"}, {"keyword": "Q Burger", "id": 257950324, "title": "#工作心得 Q Burger工作體驗", "url": "https://www.dcard.tw/f/job/p/257950324", "created_at": "2025-02-10T03:33:51.630Z", "comment_count": 1, "like_count": 0, "forum_alias": "job", "forum_name": "工作", "summary": "本人在Qb大約工作一段時間。但是也有半年請了育嬰留停。只能說有家庭想生育的三思再去這間公司。很不友善。本人請育嬰留停居然到第三個月還要自己去跟政府機關詢問才知道公司沒有送件！才返回詢問公司。居然回覆我"}, {"keyword": "Q Burger", "id": 253098419, "title": "#工作心得 Q Burger", "url": "https://www.dcard.tw/f/job/p/253098419", "created_at": "2023-08-28T12:44:10.890Z", "comment_count": 6, "like_count": 7, "forum_alias": "job", "forum_name": "工作", "summary": "關於中壢Q Burger正職，每家福利各不同，底薪29K（含全勤獎金、加班費，及扣除勞健保），月休四天，講好聽會說多給你兩天假，但人手不夠，也只能休四天，（星期一～星期五）平日上班時間05：30～13"}, {"keyword": "Q Burger", "id": 232131326, "title": "Q Burger", "url": "https://www.dcard.tw/f/food/p/232131326", "created_at": "2019-09-20T09:58:34.225Z", "comment_count": 39, "like_count": 59, "forum_alias": "food", "forum_name": "美食", "summary": "不知道有沒有人聽過或吃過Q Burger早午餐店？請問吃過這間早午餐店後的感想是什麼？到底好不好吃？價位大約多少？有沒有推薦的餐點？"}, {"keyword": "Q Burger", "id": 242741464, "title": "分享 Q burger 生菜堡", "url": "https://www.dcard.tw/f/food/p/242741464", "created_at": "2023-07-06T05:08:37.660Z", "comment_count": 13, "like_count": 72, "forum_alias": "food", "forum_name": "美食", "summary": "原本以為只有摩斯有，沒想到連Q burger也推出了，豬肉堡（50）+ 起司（10）+ 蛋（15），沒有加任何醬因為我不愛，豬肉是一般早餐店的那種，一拿到覺得很醜，但沒辦法因為都是生菜，不像摩斯是用奶"}, {"keyword": "Q Burger", "id": 259566199, "title": "臺南人帶我吃好吃的美食", "url": "https://www.dcard.tw/f/food/p/259566199", "created_at": "2025-08-17T07:41:08.749Z", "comment_count": 18, "like_count": 356, "forum_alias": "food", "forum_name": "美食", "summary": "今天要分享的是男友在台南帶我去吃的幾間好吃的美食 希望大家會喜歡 給去台南玩或不知道吃什麼的人提供參考 台南的食物真的好好吃 下次要多去玩幾天，📍懷舊小棧杏仁豆腐冰，第一間是位於台南大學五妃街的一間冰"}, {"keyword": "Q Burger", "id": 252938793, "title": "Q Burger 的蔥抓餅加蛋長這樣？", "url": "https://www.dcard.tw/f/food/p/252938793", "created_at": "2023-08-11T02:53:45.057Z", "comment_count": 86, "like_count": 77, "forum_alias": "food", "forum_name": "美食", "summary": "更，謝謝大家的回答，原來是我見識淺薄，因為餐點送來時與心裡的期待不符有點失望，我還是喜歡蔥抓餅是整塊，外面脆脆裡面微軟的口感，可以抓鬆但不能整塊都破壞掉，我當然也有吃過蔥油餅，一直以來我覺得蔥抓餅跟蔥"}, {"keyword": "Q Burger", "id": 240974963, "title": "感覺被Q burger詐騙 舒肥雞大沙拉…", "url": "https://www.dcard.tw/f/food/p/240974963", "created_at": "2023-01-10T12:28:05.278Z", "comment_count": 111, "like_count": 381, "forum_alias": "food", "forum_name": "美食", "summary": "中午來吃個早餐店 點了舒肥雞“大”沙拉 100元，一上來我就大傻眼🤯🤯🤯，感覺大被騙，我完全沒動喔，一上菜馬上就拍了，就是只有照片上那樣，快要跟玉米粒一樣小的雞肉，大塊的也不過我的指節大，這樣要 10"}, {"keyword": "Q Burger", "id": 256100230, "title": "Q burger", "url": "https://www.dcard.tw/f/persona_amyangelica/p/256100230", "created_at": "2024-07-12T23:30:38.720Z", "comment_count": 7, "like_count": 96, "forum_alias": "persona_amyangelica", "forum_name": "個人看板", "summary": "早餐點了Q burger 的燒肉乳酪三明治配無糖紅茶，這組合很難不好吃啦！燒肉醬偏甜，加上乳酪，完美😍～但價格可以再完美一點🤣"}, {"keyword": "Q Burger", "id": 225339339, "title": "Q burger假日工讀問題", "url": "https://www.dcard.tw/f/job/p/225339339", "created_at": "2016-12-07T07:16:14.214Z", "comment_count": 51, "like_count": 52, "forum_alias": "job", "forum_name": "工作", "summary": "因為爬文都沒有看到關於Qburger的問題，所以想請問一下關於假日工讀的問題，大概要做哪些事然後要比較需要注意什麼，麻煩有做過Qburger的同學們可以跟我分享一下工作經驗，謝謝了"}, {"keyword": "Q Burger", "id": 259467899, "title": "#請益 請問Q Burger正職工作福利（南部）", "url": "https://www.dcard.tw/f/job/p/259467899", "created_at": "2025-08-03T16:12:50.086Z", "comment_count": 0, "like_count": 0, "forum_alias": "job", "forum_name": "工作", "summary": "最近想從大夜傳產換到早餐店，因為要接送小孩所以只能找這個時段的工作。最近發現Q Burger在高雄狂拓店，福利也打得很誘人～但我爬文2022~2024的文章分享福利跟實際有落差～想請問有Q Burge"}, {"keyword": "Q Burger", "id": 256570778, "title": "Qburger港澳新品開箱✨", "url": "https://www.dcard.tw/f/food/p/256570778", "created_at": "2024-09-05T12:00:16.214Z", "comment_count": 12, "like_count": 45, "forum_alias": "food", "forum_name": "美食", "summary": "家裡旁邊開了一間Q Burger，但一直沒時間去吃，今天跟男友都休假，特地早起一起去吃，我們很愛吃茶餐廳，看到這次有出港澳口味新品，想說可以吃吃看，簡單來美食開箱一下～正宗澳門豬扒包（推薦程度4.5分"}, {"keyword": "Q Burger", "id": 240032527, "title": "Q Burger漢堡這麼油？真是謝囉^_^", "url": "https://www.dcard.tw/f/food/p/240032527", "created_at": "2022-09-19T09:29:17.801Z", "comment_count": 25, "like_count": 65, "forum_alias": "food", "forum_name": "美食", "summary": "今天不是要分享美食 而是覺得有點踩雷，我自己本身很少去早餐店買早餐吃，因為大部分都是中午才吃第一餐，結果昨天想說蠻早起床就到家附近的QBurger買早餐，對了然後我點的是當天的特餐 卡啦雞腿堡+紅茶，"}, {"keyword": "Q Burger", "id": 234955547, "title": "Q Burger 生日禮金", "url": "https://www.dcard.tw/f/job/p/234955547", "created_at": "2020-12-10T10:35:20.143Z", "comment_count": 2, "like_count": 12, "forum_alias": "job", "forum_name": "工作", "summary": "想問一下，今天發薪日有一個問題想問曾經，有在Q burger工作的人，我的生日在11/19，當時我的老闆說會有生日禮金，但是我在11/30離職了，今天發薪日卻說沒有生日禮金，原因跟我說是因為福利金只有"}, {"keyword": "Q Burger", "id": 260543664, "title": "【QBurger】新口味超台！早餐就能吃三杯、鹹酥雞還有黑糖珍奶❤️", "url": "https://www.dcard.tw/f/food/p/260543664", "created_at": "2025-12-25T13:34:04.251Z", "comment_count": 0, "like_count": 9, "forum_alias": "food", "forum_name": "美食", "summary": "Q Burger 最近推出一整套超台的新口味，直接把夜市靈魂搬進早餐店🤣，三杯、鹹酥雞、地瓜薯條、黑糖珍珠鮮奶一次吃得到。IG影片詳細介紹底加⬇️，🍔 三杯杏鮑菇雞堡 $95，三杯味道偏淡一點，不是重口"}, {"keyword": "Q Burger", "id": 237704224, "title": "薯餅塔是什麼偉大食物", "url": "https://www.dcard.tw/f/food/p/237704224", "created_at": "2021-12-19T02:43:10.155Z", "comment_count": 204, "like_count": 2569, "forum_alias": "food", "forum_name": "美食", "summary": "更，原來薯餅塔如此受歡迎，留言最多人提到的是麥味登、向陽、好食、找餐店、Q burger等等～另外薯餅塔有各種名稱，像是薯餅蛋塔、歐姆蛋薯餅、薯餅起司蛋塔、薯餅起司蛋包（簡稱薯包？？？）、薯餅蛋包起司"}, {"keyword": "弘爺", "id": 236967193, "title": "弘爺早餐🥣", "url": "https://www.dcard.tw/f/food/p/236967193", "created_at": "2021-09-14T02:45:56.138Z", "comment_count": 34, "like_count": 116, "forum_alias": "food", "forum_name": "美食", "summary": "很喜歡吃弘爺的早餐，玉米蛋餅、蘿蔔糕、薯條…，但是，我去過好幾間不同分店的弘爺，薯條都不太一樣，有的是細的、有的是粗的，明明是連鎖的 為什麼規格不一樣，（個人偏愛細薯條 但幾乎都遇到粗的🥲"}, {"keyword": "弘爺", "id": 240422028, "title": "弘爺胡椒粉", "url": "https://www.dcard.tw/f/talk/p/240422028", "created_at": "2022-11-03T22:01:19.525Z", "comment_count": 9, "like_count": 22, "forum_alias": "talk", "forum_name": "閒聊", "summary": "有沒有人知道弘爺他們的胡椒粉是哪一家的？聞起來有點臭豆腐的味道，但是吃起來超香的，我是胡椒粉愛好者，吃什麼都要加胡椒粉，超喜歡弘爺的胡椒粉，就是找不到是哪家的，有弘爺的員工知道嗎🤣，在此附上我的鮭魚壽"}, {"keyword": "弘爺", "id": 257302427, "title": "弘爺早餐是這個價？", "url": "https://www.dcard.tw/f/talk/p/257302427", "created_at": "2024-11-22T01:01:28.571Z", "comment_count": 73, "like_count": 195, "forum_alias": "talk", "forum_name": "閒聊", "summary": "買早餐想說弘爺沒買過好像有點遜，一看菜單嚇一跳！里肌蛋吐司（就豬排蛋）70元！！，它不是跟美而美差不多檔次的早餐店嗎？還是說它有什麼過人之處？請大家賜教，願聞其詳。"}, {"keyword": "弘爺", "id": 241026958, "title": "有一種早餐叫「弘爺」", "url": "https://www.dcard.tw/f/food/p/241026958", "created_at": "2023-01-17T08:48:21.071Z", "comment_count": 201, "like_count": 508, "forum_alias": "food", "forum_name": "美食", "summary": "這應該是大家共同的回憶了吧，弘爺就是我們台灣人的血液，一走進來，發現很弘爺，每一家的設計都很簡約風很乾淨，套餐，這是菜單，每次我都有選擇障礙（而且還反光），全部都好想吃，但胃只有一個，（錢包也是），然"}, {"keyword": "弘爺", "id": 227002711, "title": "#問 弘爺奶茶", "url": "https://www.dcard.tw/f/food/p/227002711", "created_at": "2017-08-15T00:22:11.355Z", "comment_count": 90, "like_count": 371, "forum_alias": "food", "forum_name": "美食", "summary": "有人知道弘爺奶茶怎麼煮嗎，喝過一次就回不去了啊啊啊啊啊，喝過這麼多早餐店奶茶，我覺得弘爺第一 阿寶第二"}, {"keyword": "弘爺", "id": 260067565, "title": "弘爺漢堡早餐送哎鳳(弘爺抽機車)", "url": "https://www.dcard.tw/f/talk/p/260067565", "created_at": "2025-10-18T11:18:44.627Z", "comment_count": 12, "like_count": 4, "forum_alias": "talk", "forum_name": "閒聊", "summary": "最近弘爺漢堡有刮刮樂集字活動，想問看大家都抽到了甚麼字，我目前只抽到 \"早\" \"餐\" 兩個字，分別有兩種，早餐送哎鳳 5 個字，弘爺抽機車 5 個字，兌換時間到2025-12-31"}, {"keyword": "弘爺", "id": 258623336, "title": "弘爺的鮪魚吃起來會酸酸的嗎", "url": "https://www.dcard.tw/f/food/p/258623336", "created_at": "2025-04-23T00:57:00.982Z", "comment_count": 1, "like_count": 10, "forum_alias": "food", "forum_name": "美食", "summary": "今天吃弘爺的鮪魚吐司，一開始覺得特別鹹，後來又覺得有點酸，請問是正常的嗎，店員說今年才開的"}, {"keyword": "弘爺", "id": 236092676, "title": "🍔弘爺漢堡正式開幕囉🎉🎉", "url": "https://www.dcard.tw/f/cjcu/p/236092676", "created_at": "2021-05-26T00:33:27.627Z", "comment_count": 37, "like_count": 68, "forum_alias": "cjcu", "forum_name": "長榮大學", "summary": "開幕期間優惠～～～️雙層豬肉起司堡套餐原價85（裡面有附贈薯條跟15元飲料）現在只要70元，️四盎司牛肉堡套餐原價110（有附贈一杯15元飲料🥤）現在只要90元，️香煎嫩雞堡套餐原價80（有附贈一杯15元飲"}, {"keyword": "弘爺", "id": 259358953, "title": "想知道晨間廚房的鬆餅(巧克力)牌子><", "url": "https://www.dcard.tw/f/food/p/259358953", "created_at": "2025-07-20T09:30:14.126Z", "comment_count": 2, "like_count": 15, "forum_alias": "food", "forum_n 群猴子吱吱吱叫就算了煙味都飄到店裡了，一點公德心都沒有"}, {"keyword": "美而美", "id": 257027728, "title": "高醫旁美而美！", "url": "https://www.dcard.tw/f/food/p/257027728", "created_at": "2024-10-22T12:14:42.868Z", "comment_count": 1, "like_count": 0, "forum_alias": "food", "forum_name": "美食", "summary": "問一下各位大大，請問高醫旁邊阿姨開的美而美，是不是休息了？後面是甚至連牌子都拆了，想問是不是阿姨搬家了，還是真的退休了，拜託廣大網友協助🥺🙏"}, {"keyword": "美而美", "id": 253657817, "title": "考古 古早的美而美logo", "url": "https://www.dcard.tw/f/food/p/253657817", "created_at": "2023-10-23T16:21:45.784Z", "comment_count": 2, "like_count": 1, "forum_alias": "food", "forum_name": "美食", "summary": "想請問有沒有人記得大概二十年前台北曾經有一個美而美的連鎖店，他的飲料杯是白底紅字塑膠杯，然後logo如附圖，google了好久都查不到美而美類似的logo，想請問有沒有人記得他的切確店名～"}, {"keyword": "美而美", "id": 224245822, "title": "東華 好吃 美而美", "url": "https://www.dcard.tw/f/ndhu/p/224245822", "created_at": "2016-06-23T01:55:52.996Z", "comment_count": 5, "like_count": 26, "forum_alias": "ndhu", "forum_name": "東華大學", "summary": "這家華廈美而美 是在中山路 \n不是在志學街\n我知道這文看起來 是業配文⋯\n那就是吧\n我小時候在這裡待過一段時間\n小時候就很喜歡來這裡吃\n健康 衛生\n好吃是重點！\n便宜！\n不知道有沒有人吃過\n希望大家來"}, {"keyword": "美而美", "id": 231290833, "title": "美而美", "url": "https://www.dcard.tw/f/fy/p/231290833", "created_at": "2019-05-15T01:19:00.717Z", "comment_count": 3, "like_count": 4, "forum_alias": "fy", "forum_name": "輔英科技大學", "summary": "請問輔英的同學，有沒有輔英美而美的電話呢！？？？？？？"}, {"keyword": "美而美", "id": 239911234, "title": "美而美", "url": "https://www.dcard.tw/f/mkc/p/239911234", "created_at": "2022-09-07T09:38:09.716Z", "comment_count": 3, "like_count": 0, "forum_alias": "mkc", "forum_name": "馬偕醫護管理專科學校", "summary": "想問大家吃美而美早餐會拉肚子嗎🫠"}, {"keyword": "美而美", "id": 238942747, "title": "美而美越南店", "url": "https://www.dcard.tw/f/tcust/p/238942747", "created_at": "2022-05-20T11:40:28.476Z", "comment_count": 9, "like_count": 18, "forum_alias": "tcust", "forum_name": "慈濟科技大學", "summary": "不知道有沒有人去吃過三元旁邊那家越南店呢，那家我覺得還不錯，今天我是第三次去到那家，但很可惜我現在五年級了，之後可能沒什麼機會，阿姨跟我們真的是相見恨晚，我們聊了很久🤣。之前沒去那家店的時候，我通常都"}, {"keyword": "美而美", "id": 225098888, "title": "有沒有地餐金盃美而美的掛?", "url": "https://www.dcard.tw/f/asia/p/225098888", "created_at": "2016-10-31T15:04:15.531Z", "comment_count": 14, "like_count": 10, "forum_alias": "asia", "forum_name": "亞洲大學", "summary": "想知道大家覺得地餐金盃美而美好不好吃？，之前看別人都說那家奶茶喝了會烙賽真假？，-小大一路過-"}, {"keyword": "加盟", "id": 258069200, "title": "#心得 第二次創業我選擇加盟", "url": "https://www.dcard.tw/f/startup/p/258069200", "created_at": "2025-02-22T13:01:58.579Z", "comment_count": 63, "like_count": 73, "forum_alias": "startup", "forum_name": "創業", "summary": "謝謝各位的指教，就像大家說的我要學的確實還很多～總結大家的疑問，創業沒有不辛苦的，因為跌過，才想換個方式追夢，另外關於大家對我資金準備的好奇，是我沒有說清楚，這次創業除了我自己出，還有家人投資分擔（一"}, {"keyword": "加盟", "id": 242557630, "title": "加盟早餐店", "url": "https://www.dcard.tw/f/talk/p/242557630", "created_at": "2023-06-15T05:16:29.715Z", "comment_count": 6, "like_count": 5, "forum_alias": "talk", "forum_name": "閒聊", "summary": "最近一直想開早餐店，原本在猶豫是要加盟還是自創，看了很多間，麥味登，城市漢堡，美而美，拉亞，朝氣美濃。朝氣美濃是最近發現的，加上看一芳老闆娘一直在推薦，想說去嘗鮮一下，後來發現其實跟一芳老闆娘創始地的"}, {"keyword": "加盟", "id": 256234530, "title": "五桐號加盟主甘苦談", "url": "https://www.dcard.tw/f/boba/p/256234530", "created_at": "2024-07-28T15:33:10.356Z", "comment_count": 188, "like_count": 2610, "forum_alias": "boba", "forum_name": "手搖", "summary": "最近五桐號與十盛的腥風血雨，到底是不是同個團隊、到底是不是在割韭菜？來！我告訴你們我夢到了什麼🤪，廣告行銷公司加網紅一起打造的新品牌 五X號，確實好喝，產品力強，聯名討喜，客源多多，我們一群人分批投入"}, {"keyword": "加盟", "id": 237942317, "title": "飲料店加盟", "url": "https://www.dcard.tw/f/startup/p/237942317", "created_at": "2022-01-20T14:45:37.275Z", "comment_count": 15, "like_count": 10, "forum_alias": "startup", "forum_name": "創業", "summary": "想問有沒有人知道五桐號的加盟金多少～～～請問版上有人知道嗎🥺🥺🥺，謝謝"}, {"keyword": "加盟", "id": 256592253, "title": "#請益 #加盟 關於可x可的加盟", "url": "https://www.dcard.tw/f/startup/p/256592253", "created_at": "2024-09-07T16:04:28.239Z", "comment_count": 19, "like_count": 18, "forum_alias": "startup", "forum_name": "創業", "summary": "突然想問大家一個問題，今年3、4月的時候我在飲料店上班，老闆有意頂出去，原因是想要另自創品牌，剛好詢問幾個員工想不想加盟。後來我家蠻有意願加盟的，但那家店已經開了快3年，營業額每個月50-70萬，說起"}, {"keyword": "加盟", "id": 238295896, "title": "該加盟什麼樣的店比較好?", "url": "https://www.dcard.tw/f/job/p/238295896", "created_at": "2022-03-07T08:48:52.122Z", "comment_count": 9, "like_count": 12, "forum_alias": "job", "forum_name": "工作", "summary": "如題，今天小妹家裡自己有店面不想租給別人了，我想要自己加盟店家，1樓30坪共有3層樓（90坪），好停車也在商圈附近，目前跟家裡討論自己是想要加盟路易莎，但家人比較偏向超商或者飲料店，加盟金家裡願意出至"}, {"keyword": "加盟", "id": 255738633, "title": "請益50嵐加盟", "url": "https://www.dcard.tw/f/boba/p/255738633", "created_at": "2024-06-03T05:12:16.913Z", "comment_count": 9, "like_count": 9, "forum_alias": "boba", "forum_name": "手搖", "summary": "請益一下，50嵐怎麼加盟，新聞說利潤很低要漲價，但工作地點和上班地點都各新開了1-2間，是新的，不是移店面，想詢問加盟，有機會嗎？"}, {"keyword": "加盟", "id": 257974415, "title": "#討論 加盟 別丟臉做臉", "url": "https://www.dcard.tw/f/startup/p/257974415", "created_at": "2025-02-12T19:29:38.595Z", "comment_count": 5, "like_count": 4, "forum_alias": "startup", "forum_name": "創業", "summary": "請問有人加盟 別丟臉這一間做臉的嗎？想說去年桃園跟板橋開幕，也蠻多分店，自己去體驗的感受不錯，也想加盟看看當老闆 這樣時間比較彈性，因為目前在家顧小孩，之前做餐飲（太辛苦了，所以想加盟投資看看"}, {"keyword": "加盟", "id": 240320221, "title": "#問 小木屋鬆餅加盟", "url": "https://www.dcard.tw/f/job/p/240320221", "created_at": "2022-10-23T08:39:27.780Z", "comment_count": 7, "like_count": 11, "forum_alias": "job", "forum_name": "工作", "summary": "大家好，想請問版上有沒有加盟過小木屋鬆餅的朋友，想說先了解看看狀況，再來去意向諮詢，目前有自己的店面，點的話同個鄉鎮沒有小木屋鬆餅的分店，附近是學區、補習班也很多，想了解加盟金大約多少，包含哪些項目～"}, {"keyword": "加盟", "id": 238149738, "title": "#問題 關於超商加盟", "url": "https://www.dcard.tw/f/cvs/p/238149738", "created_at": "2022-02-18T06:53:43.393Z", "comment_count": 19, "like_count": 10, "forum_alias": "cvs", "forum_name": "超商", "summary": "請問板上各位卡友有加盟超商的夥伴嗎，自身職業為軍人想轉換跑道不知加盟超商出路怎樣，有無卡友自身為加盟者可給些意見利與弊嗎！謝謝！，加盟全家好還是711好？特許加盟跟委託加盟建議？想詢問大家意見！"}, {"keyword": "加盟", "id": 237645084, "title": "#心得 加盟早餐店", "url": "https://www.dcard.tw/f/startup/p/237645084", "created_at": "2021-12-11T02:50:10.651Z", "comment_count": 8, "like_count": 12, "forum_alias": "startup", "forum_name": "創業", "summary": "最近狂問早餐店，想在家附近開，詢問結果如下：加盟金來說，拉亞其實算便宜，基本弄到好大概140搞定，但是重點來了，他的新式裝潢牆是85元大概20*30，那用一面牆假設3m高長5m 大概多花2萬多，以四面"}, {"keyword": "加盟", "id": 260450115, "title": "茶聚加盟店老闆虐狗", "url": "https://www.dcard.tw/f/mood/p/260450115", "created_at": "2025-12-11T18:10:40.815Z", "comment_count": 9, "like_count": 178, "forum_alias": "mood", "forum_name": "心情", "summary": "看到一個影片，心情真的很沉重，有個手搖飲加盟店老闆疑似對自家高齡犬施暴，看了真的很心痛，整個社群都在轉發，大家都很擔心那隻狗狗的安全，茶聚總部凌晨也緊急發聲明了，說已經暫停那位加盟主的品牌使用權，台北"}, {"keyword": "加盟", "id": 256378819, "title": "加盟店與直營店", "url": "https://www.dcard.tw/f/boba/p/256378819", "created_at": "2024-08-14T16:57:36.683Z", "comment_count": 3, "like_count": 6, "forum_alias": "boba", "forum_name": "手搖", "summary": "想問各位手搖飲的前輩（大大們），店裡的小弟弟早上是在迷客夏的加盟店當工讀，晚上則是在五桐號一樣加盟店當工讀，近日即將收店（五），有在其他地方看到一樣迷客夏缺晚班，但因為是直營店 不知說早上是在加盟店，"}, {"keyword": "加盟", "id": 257753767, "title": "#資訊 創業加盟血淚史", "url": "https://www.dcard.tw/f/job/p/257753767", "created_at": "2025-01-14T11:12:48.260Z", "comment_count": 2, "like_count": 7, "forum_alias": "job", "forum_name": "工作", "summary": "‼️‼️‼️‼️‼️呼籲‼️‼️‼️‼️‼️我也是過來人，👉創業加盟契約一定要給專業人士看過，千萬不要衝動。👉呼籲政府和媒體的關心，推動加盟專法及制式合約，避免有下個受害者。🥲想創業的拜託都去臉書的「爆料加盟區」看看！！"}, {"keyword": "加盟", "id": 260988339, "title": "想要轉換跑道，在想要自己創業還是加盟商家比較好", "url": "https://www.dcard.tw/f/talk/p/260988339", "created_at": "2026-03-02T05:51:17.781Z", "comment_count": 4, "like_count": 6, "forum_alias": "talk", "forum_name": "閒聊", "summary": "目前快要40歲了，對於日復一日的上班逐漸感到厭倦，一直有想在下班後接觸別的事情，像是運動、學習等等，但每天通勤跟吃飯扣一扣所剩時間就不多了，所以寧願拿那些時間好好休息。而前陣子發現常去的飲料店老闆娘換"}, {"keyword": "加盟", "id": 258607975, "title": "加盟條件請益", "url": "https://www.dcard.tw/f/startup/p/258607975", "created_at": "2025-04-21T08:04:31.007Z", "comment_count": 6, "like_count": 10, "forum_alias": "startup", "forum_name": "創業", "summary": "最近為了加盟的事情搞得焦頭爛額，有一個我滿看好的加盟品牌，去了解一下加盟契約，總部提供的權利金是營業額的9%，依據我身邊朋友多數經驗大概8%，感覺稍微偏高，而且身邊有另一個例子，加盟品牌之後朋友有做起"}, {"keyword": "加盟", "id": 258194631, "title": "#討論 迷客夏加盟", "url": "https://www.dcard.tw/f/boba/p/258194631", "created_at": "2025-03-07T04:10:40.377Z", "comment_count": 9, "like_count": 4, "forum_alias": "boba", "forum_name": "手搖", "summary": "因為上班沒有很快樂😅，所以想出來創業~~~~~，知道錢一砸下去就沒有回頭路了，原本是五桐號跟迷客夏再選擇，但五桐號的風評有點擔憂，最終想加盟迷客夏，位置在桃竹苗區，知道走這一條路會很辛苦，目前其實也還"}, {"keyword": "加盟", "id": 260774366, "title": "雞蛋糕創業", "url": "https://www.dcard.tw/f/startup/p/260774366", "created_at": "2026-01-30T08:33:14.231Z", "comment_count": 20, "like_count": 40, "forum_alias": "startup", "forum_name": "創業", "summary": "最近來問的人不少，但他們都說什麼太貴，憑什麼認為那些精髓可以花少少錢取得？就包含連加盟都很貴也不一定會穩賺了…，小鳥××司就是個例子了～投資或創業一樣啊，要承擔風險啊，投資股票都要先拿錢出去，沒有那種"}, {"keyword": "加盟", "id": 254267382, "title": "得正加盟", "url": "https://www.dcard.tw/f/startup/p/254267382", "created_at": "2023-12-28T06:30:58.212Z", "comment_count": 21, "like_count": 22, "forum_alias": "startup", "forum_name": "創業", "summary": "請問現在加盟得正飲料店會賺錢嗎！，目前現在還是學生 21歲，加盟金300W 目前存到的錢可以開一間，想問各位大家的想法！"}, {"keyword": "加盟", "id": 241192521, "title": "有1000萬會加盟甚麼？", "url": "https://www.dcard.tw/f/talk/p/241192521", "created_at": "2023-02-10T06:18:59.375Z", "comment_count": 52, "like_count": 41, "forum_alias": "talk", "forum_name": "閒聊", "summary": "今天陪朋友去世貿逛加盟展，主要是自己也想了解一下這個市場，第一天就看到不少人潮，知名品牌蠻多的，像是美廉社、鮮茶道、築間等等，多數還是餐飲居多，比較特別還有看到智能販賣機（還不只一家），真的挺多人，很"}, {"keyword": "加盟", "id": 241790904, "title": "無飲飲料加盟討論", "url": "https://www.dcard.tw/f/boba/p/241790904", "created_at": "2023-04-18T07:20:26.848Z", "comment_count": 20, "like_count": 36, "forum_alias": "boba", "forum_name": "手搖", "summary": "最近有在評估幾間飲料店的加盟問題，有考量到口味、花費$$、制度、口碑。目前各家飲料店加盟，我是有看了幾間，本來有考慮五桐號，這間口味我滿喜歡的，也是網紅風，加盟金有含百萬裝潢配置金，不過加盟金300左"}, {"keyword": "加盟", "id": 234561785, "title": "路易莎直營加盟怎麼分", "url": "https://www.dcard.tw/f/job/p/234561785", "created_at": "2020-10-06T10:57:15.154Z", "comment_count": 27, "like_count": 42, "forum_alias": "job", "forum_name": "工作", "summary": "之前做過星巴克，最近看到我家附近的路易莎有缺正職所以在考慮要不要應徵，但想到直營加盟好像差很多（薪水、時數、工作氣氛、老闆個性等等），請問有人知道怎麼分直營加盟嗎？p.s. 我想去的門市是在逢甲附近，"}, {"keyword": "加盟", "id": 241503785, "title": "李多惠要加盟樂天桃園了！！", "url": "https://www.dcard.tw/f/talk/p/241503785", "created_at": "2023-03-17T01:58:38.494Z", "comment_count": 17, "like_count": 239, "forum_alias": "talk", "forum_name": "閒聊", "summary": "本日最大消息，韓國啦啦隊員李多惠要來台灣了，而且居然是加盟中職，成為中職啦啦隊第一個引進的外援，從今天開始看棒球！"}, {"keyword": "加盟", "id": 261101365, "title": "#請益 美聯社的加盟主我需要您！！", "url": "https://www.dcard.tw/f/job/p/261101365", "created_at": "2026-03-16T04:46:45.389Z", "comment_count": 3, "like_count": 2, "forum_alias": "job", "forum_name": "工作", "summary": "最近家裡想做個小生意，經過多方面的考量想在家裡一樓加盟美聯社，大家覺得美聯社值得投資嗎？有看到路邊的美聯社的壽命都蠻長的，外面客人也都是少少的幾隻，就覺得很神奇，或者是大家有覺得加盟什麼生鮮超市是比較"}, {"keyword": "加盟", "id": 239652692, "title": "關於加盟這件事", "url": "https://www.dcard.tw/f/boba/p/239652692", "created_at": "2022-08-08T18:14:30.561Z", "comment_count": 18, "like_count": 19, "forum_alias": "boba", "forum_name": "手搖", "summary": "我最近正在評估幾家飲料店，其中杜芳子我覺得不錯，飲料也喝過覺得蠻好喝的，也聽完說明會覺得還不錯感覺可以試試，但又聽到朋友的朋友是杜芳子的加盟主，要加盟的話他們都不建議杜芳子但都沒說原因，所以想請問一下"}, {"keyword": "加盟", "id": 257140358, "title": "#心得 加盟真的很後悔", "url": "https://www.dcard.tw/f/startup/p/257140358", "created_at": "2024-11-03T21:56:08.579Z", "comment_count": 13, "like_count": 29, "forum_alias": "startup", "forum_name": "創業", "summary": "加盟了 南部溫度咖啡攤車 才發現真的是一個坑，咖啡豆一直在漲價 本來一杯美式50 現在漲到65，雖然有固定客源 但漲價 客人還是一直抱怨，我也無奈啊！！，總部物料也一直在漲價，已經覺得想收了但是當初花"}, {"keyword": "加盟", "id": 257053946, "title": "#請益 手搖飲加盟", "url": "https://www.dcard.tw/f/job/p/257053946", "created_at": "2024-10-25T06:51:12.863Z", "comment_count": 4, "like_count": 1, "forum_alias": "job", "forum_name": "工作", "summary": "小弟想加盟手搖飲，目前傾向的品牌為1.一沐日 2.大茗 3.龍角 請問大家覺得哪一間比較推薦，覺得哪一間比較好喝呢？"}, {"keyword": "加盟", "id": 228225983, "title": "7-11 直營 加盟", "url": "https://www.dcard.tw/f/job/p/228225983", "created_at": "2018-01-31T16:41:46.552Z", "comment_count": 19, "like_count": 67, "forum_alias": "job", "forum_name": "工作", "summary": "想問問大家，怎麼分辨7-11是直營的還是加盟的，想應徵，可是直營的薪水是公司規定的，加盟的是看老闆，可是又不好意思直接問><"}, {"keyword": "加盟", "id": 255379205, "title": "#閒聊 有人加盟真的賺到錢嗎", "url": "https://www.dcard.tw/f/job/p/255379205", "created_at": "2024-04-26T10:31:06.486Z", "comment_count": 6, "like_count": 5, "forum_alias": "job", "forum_name": "工作", "summary": "小弟我23歲在去年透過自己的存款加與爸媽借的錢加盟了一家連鎖飲料店，但經營一年來冬天根本只能打平夏天賺的根本也只比出去上班多個三四萬，好奇各位有沒有加盟飲料店或早餐店的經驗"}, {"keyword": "早餐", "id": 240687591, "title": "早餐", "url": "https://www.dcard.tw/f/food/p/240687591", "created_at": "2022-12-05T04:26:03.977Z", "comment_count": 22, "like_count": 19, "forum_alias": "food", "forum_name": "美食", "summary": "想問一下大家平常早餐都怎麼點的？我一定會點一份巧克力薄片，蛋餅我也會點一份，通常是火腿、培根或九層塔，我都會點鐵板麵，還會點一份雞塊"}, {"keyword": "早餐", "id": 260895011, "title": "早餐貝果記錄📝（康福先生篇）", "url": "https://www.dcard.tw/f/food/p/260895011", "created_at": "2026-02-18T01:13:40.349Z", "comment_count": 0, "like_count": 11, "forum_alias": "food", "forum_name": "美食", "summary": "起始動機就是好想早餐吃貝果，但是又怕胖，超商的貝果升糖太快超容易餓🥲🥲🥲，所以就轉戰 低熱量、低醣、高蛋白 的貝果們，自己吃的好開心，罪惡感沒那麼重～～總結來說！，三款減醣貝果（原味時代、康福先生、減"}, {"keyword": "早餐", "id": 261026605, "title": "我的早餐😃", "url": "https://www.dcard.tw/f/food/p/261026605", "created_at": "2026-03-07T01:43:09.392Z", "comment_count": 1, "like_count": 9, "forum_alias": "food", "forum_name": "美食", "summary": ""}, {"keyword": "早餐", "id": 261120239, "title": "#心得 減脂期早餐這樣吃！ 一個月居然瘦了3公斤✨", "url": "https://www.dcard.tw/f/weight_loss/p/261120239", "created_at": "2026-03-18T16:23:24.725Z", "comment_count": 1, "like_count": 12, "forum_alias": "weight_loss", "forum_name": "減肥", "summary": "哈囉大家 我是克萊爾Claire，今天要和大家分享的是減脂期的早餐組合，減脂期間不僅要吃飽，更要吃的巧！，早餐我通常會搭配水果補充纖維、水煮蛋和豆漿補充蛋白質，以及一些澱粉增加飽足感，水果的部分可以依"}, {"keyword": "早餐", "id": 261128977, "title": "啥小啦", "url": "https://www.dcard.tw/f/ntu/p/261128977", "created_at": "2026-03-20T02:58:01.088Z", "comment_count": 5, "like_count": 48, "forum_alias": "ntu", "forum_name": "臺灣大學", "summary": "幹 我的體育生男友一大早六點把我從被窩硬拖起來，我他媽眼睛都還沒睜開好嗎，他把我扛起來直接丟進車裡，「你他媽有病喔這麼早」他只笑著摸我頭說「寶貝乖，練完腿才有早餐吃」早餐你媽個頭啦！"}, {"keyword": "早餐", "id": 261151206, "title": "到底誰要5:30起床買早餐", "url": "https://www.dcard.tw/f/mood/p/261151206", "created_at": "2026-03-21T21:52:30.525Z", "comment_count": 13, "like_count": 5, "forum_alias": "mood", "forum_name": "心情", "summary": "被挖起來去買阿公阿婆的早餐，怪誰，阿公阿嬤就餓了啊 其他家人就身體不舒服啊，幫幫我"}, {"keyword": "早餐", "id": 260963631, "title": "避雷逢甲附近這家早餐店", "url": "https://www.dcard.tw/f/food/p/260963631", "created_at": "2026-02-27T02:43:40.838Z", "comment_count": 0, "like_count": 6, "forum_alias": "food", "forum_name": "美食", "summary": "很誇張，我今天早上去買早餐，點他家一號餐，回到家一看，蛋白蛋黃居然都是生的耶！，看google評論這種事發生不是一兩次了😅，大家如果早上很忙的話不要去那家，不然等上完課出來要去理論人早收走了"}, {"keyword": "早餐", "id": 261143304, "title": "有沒有推薦好吃的早餐炒泡麵", "url": "https://www.dcard.tw/f/cycu/p/261143304", "created_at": "2026-03-21T05:58:02.424Z", "comment_count": 7, "like_count": 4, "forum_alias": "cycu", "forum_name": "中原大學", "summary": "如題，想問一下有沒有人有推薦的早餐店炒泡麵，以前都是千陽的7A，但最近漲了5塊🥲🥲🥲有點心痛"}, {"keyword": "早餐", "id": 261034392, "title": "早餐", "url": "https://www.dcard.tw/f/food/p/261034392", "created_at": "2026-03-08T00:47:52.113Z", "comment_count": 1, "like_count": 8, "forum_alias": "food", "forum_name": "美食", "summary": ""}, {"keyword": "早餐", "id": 239818340, "title": "早餐", "url": "https://www.dcard.tw/f/stust/p/239818340", "created_at": "2022-08-28T00:02:54.063Z", "comment_count": 33, "like_count": 13, "forum_alias": "stust", "forum_name": "南臺科大", "summary": "小弟剛搬進來宿舍，想請教附近有推薦什麼走路能到又好吃的早餐店嗎"}, {"keyword": "早餐", "id": 260924725, "title": "吃早餐囉", "url": "https://www.dcard.tw/f/food/p/260924725", "created_at": "2026-02-23T00:09:23.417Z", "comment_count": 0, "like_count": 10, "forum_alias": "food", "forum_name": "美食", "summary": "🥚 今天早餐來個鹹油條加蛋~銅板早餐經典～還有各種配料隨你搭，⚠️ 現煎約5分，趕時間打0921-786229預訂！，📍 阿媛鹹油條，沙鹿區新生街25號（沙鹿媽下紅綠燈轉角），🕖 週一～週六 7：00–"}, {"keyword": "早餐", "id": 261013275, "title": "#請益 早餐店打工要離職怎麼開口", "url": "https://www.dcard.tw/f/job/p/261013275", "created_at": "2026-03-05T10:39:05.115Z", "comment_count": 7, "like_count": 3, "forum_alias": "job", "forum_name": "工作", "summary": "從去年12月開始待業到2月初，後來太怕自己裸辭沒工作，所以找了一家早餐店打工，到目前做了11天，其實在裸辭到現在兼職我都有找正職的工作，當然也有面試上幾家，不過我考慮工作環境沒有很喜歡所以拒絕了，現在"}, {"keyword": "早餐", "id": 240217464, "title": "早餐", "url": "https://www.dcard.tw/f/vtuber/p/240217464", "created_at": "2022-10-11T04:31:34.734Z", "comment_count": 6, "like_count": 140, "forum_alias": "vtuber", "forum_name": "VTuber", "summary": ""}, {"keyword": "早餐", "id": 261100596, "title": "早餐矛盾對決", "url": "https://www.dcard.tw/f/talk/p/261100596", "created_at": "2026-03-16T03:08:06.239Z", "comment_count": 11, "like_count": 12, "forum_alias": "talk", "forum_name": "閒聊", "summary": "超商早餐的神對決，暈碳飯糰vs提神咖啡，兩大高手對決，每次這樣搭都不知道誰會贏，好刺激，週一早上11點我還醒著，看來今天是咖啡更勝一籌"}, {"keyword": "早餐", "id": 261129184, "title": "飲控的快速早餐分享", "url": "https://www.dcard.tw/f/girl/p/261129184", "created_at": "2026-03-20T03:39:58.405Z", "comment_count": 14, "like_count": 35, "forum_alias": "girl", "forum_name": "女孩", "summary": "最近在飲控，但我不太想要吃得超清淡、每天又都差不多，因為太單調真的很容易放棄，目前會用一些相對有飽足感的東西來搭配，讓生活不要太痛苦（笑），平常如果早餐或下午想簡單補充，我會喝韓國的代餐奶昔，優點是方"}, {"keyword": "早餐", "id": 261147015, "title": "人人都能擁有的巴黎世家", "url": "https://www.dcard.tw/f/funny/p/261147015", "created_at": "2026-03-21T11:30:30.873Z", "comment_count": 18, "like_count": 265, "forum_alias": "funny", "forum_name": "有趣", "summary": "如題，這個黃色塑膠袋，噢不 是巴黎世家新推出的黃色塑膠袋，要價 1790 美元 約台幣 50000 多，最近是因為中國女星張婧儀手上提著引發熱議，有人說這是巴黎世家新的五萬黃色塑膠袋，也有人說她拿的是"}, {"keyword": "早餐", "id": 261070444, "title": "#請益 蔬菜吃到飽會胖嗎？", "url": "https://www.dcard.tw/f/weight_loss/p/261070444", "created_at": "2026-03-12T14:48:07.668Z", "comment_count": 73, "like_count": 265, "forum_alias": "weight_loss", "forum_name": "減肥", "summary": "今天42歲166公分63公斤，減了3個月只從64變成63公斤，之前每天在家舉啞鈴太興奮，晚上失眠睡不著，早上又爬不起運動，現在改成每天走路一萬步。可以幫我看一下是不是吃太多菜了？早餐固定無糖豆漿+7-"}, {"keyword": "早餐", "id": 261069675, "title": "中山區｜早餐店推薦", "url": "https://www.dcard.tw/f/persona_kkk126666/p/261069675", "created_at": "2026-03-12T12:54:43.962Z", "comment_count": 0, "like_count": 89, "forum_alias": "persona_kkk126666", "forum_name": "個人看板", "summary": "好久不見🐈‍⬛❄️，最近沒有去探店，都是去過的店再訪，有四間蠻喜歡、也很有名的的早餐店，剛好都在中山區，整理出來跟大家分享🤍，📌良粟商號，最喜歡的一間，他的肉蛋吐司真的超級好吃，炭香味十足！再配上半熟蛋，完"}, {"keyword": "早餐", "id": 260938493, "title": "#開學季分享募集中 台大早餐控必收！早午餐推薦", "url": "https://www.dcard.tw/f/ntu/p/260938493", "created_at": "2026-02-24T10:29:41.856Z", "comment_count": 5, "like_count": 27, "forum_alias": "ntu", "forum_name": "臺灣大學", "summary": "超愛吃早餐！公館早午餐店也不少，整理了幾家給大家參考～☕安好食，📍，餐點質感很好，價格雖然比傳統早餐店貴一點，但份量蠻夠吃的、覺得食材很新鮮，環境舒適，適合跟朋友一起慢慢吃早午餐聊天～☕光一肆號，📍，"}, {"keyword": "早餐", "id": 239871169, "title": "早餐", "url": "https://www.dcard.tw/f/stust/p/239871169", "created_at": "2022-09-03T02:55:16.539Z", "comment_count": 10, "like_count": 4, "forum_alias": "stust", "forum_name": "南臺科大", "summary": "最近看到蠻多早餐店的，但我有選擇障礙🥲通常都先看環境跟態度，上次吃了紅豆跟可口蔥抓餅都覺得不錯，而且可口蔥抓餅好像是最近新開幕的，上次還沒看到，各位還有推薦什麼嗎？我想吃爆整個南台街早餐🤣（午餐也行 "}, {"keyword": "早餐", "id": 260979532, "title": "隱藏版服務？娃子早餐可以外送？！", "url": "https://www.dcard.tw/f/fju/p/260979532", "created_at": "2026-03-01T05:08:49.106Z", "comment_count": 10, "like_count": 24, "forum_alias": "fju", "forum_name": "輔仁大學", "summary": "📢更新更新！號外號外！📢，因應第一天活動太多苦命早八人私訊小組，詢問想喝蛋白粉 但能不能開放更多餐點選項...🥺，所以！主委決定加碼 訂單只要…，💗滿．60元．就．送．蛋．白．粉💗，無論線上線下訂單都"}, {"keyword": "早餐", "id": 260943731, "title": "漢堡店不賣漢堡的在地人氣早餐店，以吐司、厚片為主", "url": "https://www.dcard.tw/f/food/p/260943731", "created_at": "2026-02-25T01:43:06.146Z", "comment_count": 1, "like_count": 20, "forum_alias": "food", "forum_name": "美食", "summary": "妙爸爸漢堡店是一間充滿懷舊氛圍的在地人氣早餐店，儘管店名有漢堡，但現在只供應吐司、厚片及飲品。店面雖然不大，營業時間一波又一波的在地老顧客絡繹不絕，建議可以先打電話訂餐。芋頭厚片，這芋頭厚片先將芋頭泥"}, {"keyword": "早餐", "id": 260894910, "title": "早餐一定要對稱才安心", "url": "https://www.dcard.tw/f/persona_cleo23/p/260894910", "created_at": "2026-02-18T00:27:20.923Z", "comment_count": 0, "like_count": 82, "forum_alias": "persona_cleo23", "forum_name": "個人看板", "summary": "每天早上，我吃早餐都會有種怪癖，像是兩片吐司一定要平行放好，果醬要平均塗，雞蛋要對稱，否則我心裡就怪怪的。朋友笑我「吃飯還這麼計較」，但我自己覺得，這是一種儀式感吧，也算是一種開始一天的安全感。可是，"}, {"keyword": "早餐", "id": 261146963, "title": "#閒聊 達利早餐有人工作過嗎", "url": "https://www.dcard.tw/f/job/p/261146963", "created_at": "2026-03-21T11:26:08.282Z", "comment_count": 1, "like_count": 0, "forum_alias": "job", "forum_name": "工作", "summary": "最近想去達利早餐應徵 想問有人去做過推薦嗎？想順便問新轉戶是哪一間？"}, {"keyword": "早餐", "id": 261113008, "title": "早餐失蹤事件", "url": "https://www.dcard.tw/f/nutc/p/261113008", "created_at": "2026-03-17T16:57:52.668Z", "comment_count": 1, "like_count": 7, "forum_alias": "nutc", "forum_name": "中科大", "summary": "我3/17早上在中商7601上課，原本有帶早餐但因為是電腦教室不可以拿進去，所以我放在鞋櫃上面 ，因為上課一直沒下課，只有11.有一個正常下課我想說也有點餓想吃一下，結果我早餐就消失了⋯⋯，我是不相信"}, {"keyword": "早餐", "id": 261065795, "title": "高雄鹽埕早餐搬家", "url": "https://www.dcard.tw/f/food/p/261065795", "created_at": "2026-03-12T01:52:28.573Z", "comment_count": 0, "like_count": 11, "forum_alias": "food", "forum_name": "美食", "summary": "一直想念高雄鹽埕美食六姐飯糰🍙，原來搬到鹽埕埔2號出口旁邊，新地址 ：新樂街151號，去鹽埕不知道要吃什麼早餐，真的要收藏欸！，大推"}, {"keyword": "早餐", "id": 261109618, "title": "我的傘跟早餐還有杯套不見了", "url": "https://www.dcard.tw/f/ncut/p/261109618", "created_at": "2026-03-17T09:30:05.740Z", "comment_count": 2, "like_count": 7, "forum_alias": "ncut", "forum_name": "勤益科大", "summary": "3/17下午15：10～17：30分上通識課，我帶著我的雨傘跟早餐去上，但因為5樓視聽教室不能帶食物進去，所以我就把我的早餐跟雨傘掛外面，一下課出來東西就不見了。請問一下？今天有下雨？沒下雨你偷什麼意"}, {"keyword": "早餐", "id": 261121648, "title": "萊爾富x肌肉山山。早餐就吃它", "url": "https://www.dcard.tw/f/food/p/261121648", "created_at": "2026-03-19T02:17:03.268Z", "comment_count": 0, "like_count": 12, "forum_alias": "food", "forum_name": "美食", "summary": "上次韓味食堂的便當太精彩，再入手肌肉山山聯名早餐系列👇，🌶️ 韓式辣醬鮪魚夾心吐司 NT40，韓式辣醬搭配鮪魚餡，配上軟軟的湯種吐司。辣度不算高，大概是嘴巴微微感受到的程度，整體鹹香順口。一份 247."}, {"keyword": "早餐", "id": 260986064, "title": "這不是詐騙，是真的幫你送早餐。", "url": "https://www.dcard.tw/f/fju/p/260986064", "created_at": "2026-03-01T23:33:27.512Z", "comment_count": 2, "like_count": 11, "forum_alias": "fju", "forum_name": "輔仁大學", "summary": "鬧鐘剛響第三次的人看這裡。活動今天開始~~，早餐和我們已經在路上準備拯救你🫵🏻，📅 3/2（一）  -  3/4（三），🕢 7：30  -  9：30，輔大校內幫你免費外送到手上，（i人不用擔心 也可以"}, {"keyword": "早餐", "id": 254215566, "title": "早餐", "url": "https://www.dcard.tw/f/cycu/p/254215566", "created_at": "2023-12-22T04:40:36.036Z", "comment_count": 5, "like_count": 20, "forum_alias": "cycu", "forum_name": "中原大學", "summary": "買個早餐竟然在可可熊遇到蛇丸！"}, {"keyword": "創業", "id": 257416779, "title": "想創業", "url": "https://www.dcard.tw/f/talk/p/257416779", "created_at": "2024-12-05T02:18:27.580Z", "comment_count": 21, "like_count": 7, "forum_alias": "talk", "forum_name": "閒聊", "summary": "目前還是個大學生，我不喜歡 那種制式的上班方式，我喜歡比較彈性 自由的，家人一直叫我去考公務員，但我不喜歡那種很穩定的，我喜歡挑戰，我想要創業，但沒有方向，有沒有創業的前輩可以給我一點建議🥺"}, {"keyword": "創業", "id": 260906487, "title": "創業累", "url": "https://www.dcard.tw/f/startup/p/260906487", "created_at": "2026-02-20T04:51:01.137Z", "comment_count": 7, "like_count": 5, "forum_alias": "startup", "forum_name": "創業", "summary": "今年真的真的好累好累，現在創業餐飲真的很不容易 東西都在通膨物價高東西都貴 利潤很薄 賺的真的很少 唉，我真的太累了想找個地方發洩 為了創業犧牲陪伴孩子和家人的時間休假少到可憐每天都12小時的工作時長"}, {"keyword": "創業", "id": 261046120, "title": "#請益 申請青年創業貸款的問題", "url": "https://www.dcard.tw/f/startup/p/261046120", "created_at": "2026-03-09T08:44:09.438Z", "comment_count": 5, "like_count": 2, "forum_alias": "startup", "forum_name": "創業", "summary": "大家好，想請問有人成功申請超過100萬的創業貸款嗎？我的狀況是這樣，有一份穩定的工作，也有一定的存款（大概300左右，但是這一筆都在股市中），最近想要額外開一個副業，也有可以開店的地點（親戚的），但房"}, {"keyword": "創業", "id": 261149953, "title": "社會觀察 頂大畢業後大家各自的發展", "url": "https://www.dcard.tw/f/mood/p/261149953", "created_at": "2026-03-21T15:27:41.858Z", "comment_count": 20, "like_count": 126, "forum_alias": "mood", "forum_name": "心情", "summary": "頭上這間頂大熱門科系畢業快三年，在學期間參加蠻多活動認識不少人，同學們確實要不家裡資本充足、要不很認真努力，更多的是兩者兼具。自己畢業這一小段時間，觀察身邊人的後續發展，努力又家裡有資源的人算是跳得最"}, {"keyword": "創業", "id": 253807306, "title": "談談創業", "url": "https://www.dcard.tw/f/mood/p/253807306", "created_at": "2023-11-08T06:40:09.665Z", "comment_count": 14, "like_count": 7, "forum_alias": "mood", "forum_name": "心情", "summary": "會有人因為創業去貸款700萬嗎？為什麼是這個數字，就是網路上討論火熱的麗x康，對，他就是直銷但我覺得我真的是受惠者；但就像是很多過來人的心路歷程⋯⋯那些需要貸款20萬、50萬就是為了創業當老闆這件事，"}, {"keyword": "創業", "id": 261120420, "title": "大學期間開始創業？大學創業必知的四個計劃", "url": "https://www.dcard.tw/f/persona_lazybear/p/261120420", "created_at": "2026-03-18T16:59:45.718Z", "comment_count": 1, "like_count": 98, "forum_alias": "persona_lazybear", "forum_name": "個人看板", "summary": "從大四的寒假開始 我走上了創業這條路，過程中得到了很多夥伴/業師/學校的幫助，今天想來和大家分享四個計劃，我們可以如何利用「大學生」的身分創業，去拿到初期的輔導資源、資金，1️⃣ 大專院校模擬實戰平台，這"}, {"keyword": "創業", "id": 253861254, "title": "想創業", "url": "https://www.dcard.tw/f/startup/p/253861254", "created_at": "2023-11-13T16:47:20.826Z", "comment_count": 22, "like_count": 11, "forum_alias": "startup", "forum_name": "創業", "summary": "今年22歲，想在逢甲商圈賣看看古早味粉漿蛋餅，因為我也很愛吃古早味粉漿蛋餅，但是有時候想吃的時候不見得吃得到。我之前讀夜校在工廠工作也有6-7年了，我喜歡煮東西，想要闖看看，有人可以提供一些意見嗎？"}, {"keyword": "創業", "id": 261152641, "title": "想找商業競賽夥伴！", "url": "https://www.dcard.tw/f/talk/p/261152641", "created_at": "2026-03-22T06:07:42.785Z", "comment_count": 0, "like_count": 1, "forum_alias": "talk", "forum_name": "閒聊", "summary": "我是文組跨商科的跨考生，目前為了研究所推甄，想找夥伴一起參加商業競賽🙌，跨校、跨系合作都非常歡迎！，🙋‍♀️ 關於我：系排前三，擅長資料統整、邏輯分析與簡報設計，雖然還沒有商業競賽經驗，但做事認真，願意一起"}, {"keyword": "創業", "id": 253701018, "title": "首次創業", "url": "https://www.dcard.tw/f/startup/p/253701018", "created_at": "2023-10-28T06:19:58.434Z", "comment_count": 20, "like_count": 9, "forum_alias": "startup", "forum_name": "創業", "summary": "最近想在社區開一個小吃攤但是店面不大，只能大概放2、3小桌，想請問各位大大帥哥美女，以外帶來說你們更傾向於吃什麼類型的食物，（不考慮炸食），再往下幫我投票感恩🥹"}, {"keyword": "創業", "id": 261143642, "title": "夫妻支出分配", "url": "https://www.dcard.tw/f/mood/p/261143642", "created_at": "2026-03-21T06:27:34.867Z", "comment_count": 33, "like_count": 8, "forum_alias": "mood", "forum_name": "心情", "summary": "我年收約100出頭，先生自己創業收入是我的四五倍，但家用卻要AA，一人一半，我說要按薪資所得比例共同負擔，但他卻覺得憑什麼他要付比較多，他可以獲得什麼…"}, {"keyword": "創業", "id": 260983528, "title": "真的不要浪費錢去算紫微斗數", "url": "https://www.dcard.tw/f/mood/p/260983528", "created_at": "2026-03-01T14:35:29.914Z", "comment_count": 46, "like_count": 86, "forum_alias": "mood", "forum_name": "心情", "summary": "多年前因感情因素踏上算命之路，常見的算命就是紫微斗數。這些年工作家庭雖穩定，但面臨中年想創業，以及婚姻中偶爾的摩擦（沒有第三者、家暴等重大問題），我其實是偏向理性處理，也會考慮諮詢師來釐清雙方想法。但"}, {"keyword": "創業", "id": 260872863, "title": "哪裡是創業（？🤔", "url": "https://www.dcard.tw/f/startup/p/260872863", "created_at": "2026-02-14T00:46:28.854Z", "comment_count": 7, "like_count": 3, "forum_alias": "startup", "forum_name": "創業", "summary": "好奇看到做直銷的朋朋，每天發的各種文章常常強調自己在創業，創業才可以賺大錢，創業才可以翻轉人生，但認真很好奇…為什麼加入直銷是創業？分享的各種東西都是安X的業務，那不就是加入安X這間公司嗎😅，為什麼要"}, {"keyword": "創業", "id": 239630424, "title": "創業", "url": "https://www.dcard.tw/f/mood/p/239630424", "created_at": "2022-08-06T05:29:08.696Z", "comment_count": 6, "like_count": 2, "forum_alias": "mood", "forum_name": "心情", "summary": "請問創業該具備呢？"}, {"keyword": "創業", "id": 257682097, "title": "創業", "url": "https://www.dcard.tw/f/startup/p/257682097", "created_at": "2025-01-05T13:23:53.845Z", "comment_count": 6, "like_count": 0, "forum_alias": "startup", "forum_name": "創業", "summary": "想了很久還是決定上來問問大家，若想開一家早午餐的話大家會怎麼取名呢？或者取名的背後需要有什麼故事或意義嗎？請大家給點建議🙏"}, {"keyword": "創業", "id": 261006422, "title": "創業", "url": "https://www.dcard.tw/f/food/p/261006422", "created_at": "2026-03-04T12:38:13.996Z", "comment_count": 2, "like_count": 24, "forum_alias": "food", "forum_name": "美食", "summary": "從澳門離職回來跟著老公一起在台中做著自創品牌的小生意，默默的經營了快一年也是做的有點口碑，生意真的都是要經營的，客人常常問一句：你們有店休嗎？回覆是：有事才會休，可以看google上營業時間基本上都有"}, {"keyword": "創業", "id": 261004653, "title": "目前是記帳士事務所的老闆", "url": "https://www.dcard.tw/f/startup/p/261004653", "created_at": "2026-03-04T08:30:45.941Z", "comment_count": 4, "like_count": 1, "forum_alias": "startup", "forum_name": "創業", "summary": "台灣的專業人士有非常多痛點，到目前還是無法解決，有沒有軟體工程師想一起創業，聊聊有沒有解決辦法，希望能有流暢的UIUX。"}, {"keyword": "創業", "id": 254094556, "title": "創業", "url": "https://www.dcard.tw/f/startup/p/254094556", "created_at": "2023-12-08T21:18:48.452Z", "comment_count": 14, "like_count": 4, "forum_alias": "startup", "forum_name": "創業", "summary": "想請問各位，目前小弟有打算創業 做個炸物小吃攤，但由於啟動資金不足 辦信貸的話有需要什麼條件嗎 利率大約多少才會比較好 因為信貸的部分真的不太瞭解😅，再請各位大家幫我分析一下 小弟會很感謝各位的🙏🙏"}, {"keyword": "創業", "id": 260862181, "title": "#請益 餐廳創業找網紅合作被搞到心累，有推薦的行銷公司嗎？", "url": "https://www.dcard.tw/f/startup/p/260862181", "created_at": "2026-02-12T08:51:47.817Z", "comment_count": 19, "like_count": 22, "forum_alias": "startup", "forum_name": "創業", "summary": "創業開餐廳這段路程不好走.....，有很多事情都是做做看才知道.....，從找位置、裝潢、找員工過程真的是痛苦，好不容易一切都好了，開始營業才是最大的挑戰....，開幕第五個月雖然營業額有起來，但營業"}, {"keyword": "創業", "id": 261150882, "title": "女生的年齡焦慮", "url": "https://www.dcard.tw/f/mood/p/261150882", "created_at": "2026-03-21T18:17:47.409Z", "comment_count": 15, "like_count": 7, "forum_alias": "mood", "forum_name": "心情", "summary": "大學畢業後做了兩份工作，在一次跟老闆吵架後開始創業。直接一路創業拼到今年35歲了，工作在兩三年前比較穩定，有小公司，也能帶大家員工旅遊，也有幾個很好的夥伴，也終於有錢和時間開始學以前想學的課（舞蹈、品"}, {"keyword": "創業", "id": 259226955, "title": "創業", "url": "https://www.dcard.tw/f/startup/p/259226955", "created_at": "2025-07-02T14:52:53.003Z", "comment_count": 4, "like_count": 1, "forum_alias": "startup", "forum_name": "創業", "summary": "自己對做甜點有興趣，有想要創業的心，想要詢問前輩們創業需注意什麼，那需要食品標章之類的嗎？想要先透過市集賣而不是開店的那種。"}, {"keyword": "創業", "id": 260964740, "title": "都要27歲了月收入才32000是不是很失敗？", "url": "https://www.dcard.tw/f/mood/p/260964740", "created_at": "2026-02-27T05:46:22.351Z", "comment_count": 171, "like_count": 271, "forum_alias": "mood", "forum_name": "心情", "summary": "在dcard上看到許多人月收入都至少20～30萬，我有些同學畢業後合夥創業，年收分帳每個人收入也有400萬～500萬，反觀我都快27歲了，月收入才32000，這樣的人生是不是很失敗？我私立大學學士、學"}, {"keyword": "創業", "id": 260792798, "title": "青年創業貸款疑問", "url": "https://www.dcard.tw/f/startup/p/260792798", "created_at": "2026-02-02T03:57:26.470Z", "comment_count": 4, "like_count": 1, "forum_alias": "startup", "forum_name": "創業", "summary": "我在2025/12辦了營登，雖然還沒有401，但是當初是因為稅務問題才登記，因此有提供給國稅局一年的財務報表，不知這樣是否能申辦貸款呢？另關於兩學分的創業課程，近三年內有在學校修過相關課程，要如何知道"}, {"keyword": "創業", "id": 261105641, "title": "投資建議🙏", "url": "https://www.dcard.tw/f/money/p/261105641", "created_at": "2026-03-16T16:01:58.416Z", "comment_count": 7, "like_count": 9, "forum_alias": "money", "forum_name": "理財", "summary": "想請問年薪千萬的各位，因為創業關係 收入都是分散的，平均下來年薪220-250萬，但感覺沒有那麼的有年薪200起的感覺，總感覺資產累積很慢，創業前是月光族，創業後這一年資產：股票38萬、黃金14錢（目"}, {"keyword": "創業", "id": 261050228, "title": "大研生醫董座才 47 歲就這樣走了", "url": "https://www.dcard.tw/f/mood/p/261050228", "created_at": "2026-03-09T18:55:40.894Z", "comment_count": 16, "like_count": 111, "forum_alias": "mood", "forum_name": "心情", "summary": "你吃的魚油有幾 %？這句廣告很耳熟，大研生醫創辦人張家銘，海外出差，在睡夢中就這樣走了，享年47歲🙏，他23歲白手起家，愛情公寓也是他創的，後來年過40身體開始亮紅燈，才轉做保健品二次創業，去年大研生"}, {"keyword": "創業", "id": 261008875, "title": "創業心得-「體制外篇」", "url": "https://www.dcard.tw/f/persona_marties/p/261008875", "created_at": "2026-03-04T18:23:49.755Z", "comment_count": 0, "like_count": 77, "forum_alias": "persona_marties", "forum_name": "個人看板", "summary": "又是夜裡難眠的時候，雖然眼睛閉上，但腦袋一直說「趕快寫日記」——————————，《代價》前幾年因為一些變故流浪了幾個月，去年再次振作起來，如果你想創造一個夢想，那就先喝杯咖啡想想有哪些代價，「代價」"}, {"keyword": "創業", "id": 260819669, "title": "高中生創業", "url": "https://www.dcard.tw/f/startup/p/260819669", "created_at": "2026-02-06T01:34:40.621Z", "comment_count": 14, "like_count": 11, "forum_alias": "startup", "forum_name": "創業", "summary": "一名高中三年級的學生預計投入服飾產業，初期預計選用黑白短T以及我們自己設計的圖案，想要主打物美價廉來進入市場穩定客群，材質的部分不會省我認為舒服比較重要，但目前一直在想我第一批貨沒有穩定客源時該怎麼辦"}, {"keyword": "創業", "id": 255183517, "title": "創業的原因", "url": "https://www.dcard.tw/f/tech_job/p/255183517", "created_at": "2024-04-06T02:11:06.560Z", "comment_count": 4, "like_count": 5, "forum_alias": "tech_job", "forum_name": "科技業", "summary": "本文轉自電子設計菁英，很現實的問題是～為何我要創業，我當時為何創業，這是一個很簡單的數字問題～我當時40歲，就是繼續吃人家的飯，我估計我很幸運的可以吃到45歲。在之後即便還有飯吃，大概就是顧問類似的工"}, {"keyword": "創業", "id": 260928601, "title": "年薪300+可以搬出去嗎？", "url": "https://www.dcard.tw/f/mood/p/260928601", "created_at": "2026-02-23T09:13:22.230Z", "comment_count": 42, "like_count": 23, "forum_alias": "mood", "forum_name": "心情", "summary": "我先說一下過去狀況，本來是上班族 存到3-400萬的存款，才開始投資股票 結果賠了一半，又裸辭 把剩下的存款投入創業，創業快兩年，從虧損 小賺 虧損 穩定盈利，目前年收=年薪，已扣稅 基本是360萬+"}, {"keyword": "創業", "id": 261003239, "title": "秒認出直銷關鍵字……", "url": "https://www.dcard.tw/f/talk/p/261003239", "created_at": "2026-03-04T04:59:32.987Z", "comment_count": 0, "like_count": 2, "forum_alias": "talk", "forum_name": "閒聊", "summary": "剛剛在網路上看到有人發這篇：你絕對不知道的直銷關鍵字，1：溫罐，2：撥筋，3：自媒體「公益課」4：生態圈，5：早餐，7：0成本創業、被動收入，8：養肝，9：財商課，10：大健康，11：淨水器，12：空"}, {"keyword": "手搖飲", "id": 257691770, "title": "🥛小眾手搖飲分享", "url": "https://www.dcard.tw/f/boba/p/257691770", "created_at": "2025-01-06T15:27:23.211Z", "comment_count": 24, "like_count": 152, "forum_alias": "boba", "forum_name": "手搖", "summary": "除了喝連鎖的手搖外，發掘小眾飲料也是平常喝手搖的樂趣，以下來分享最近喝到的小眾手搖：1.伊莉莎白紅茶書坊，這間店不知道為什麼官網沒有寫花蓮中山殿（超特別的店名），我喝過林口跟花蓮的，花蓮中山殿真的是我"}, {"keyword": "手搖飲", "id": 252935511, "title": "挽救討厭的手搖飲店", "url": "https://www.dcard.tw/f/food/p/252935511", "created_at": "2023-08-10T14:29:44.272Z", "comment_count": 261, "like_count": 134, "forum_alias": "food", "forum_name": "美食", "summary": "以下是我不太喜歡的手搖飲店，1. 清心福全，2. 可不可，3. Coco，4. Comebuy，5. 迷客夏，6. 五銅號，不知道卡友們有沒有推薦的品項來挽救我討厭他們的心，或是推薦的其他手搖飲店～！"}, {"keyword": "手搖飲", "id": 257785286, "title": "求好喝的手搖飲", "url": "https://www.dcard.tw/f/boba/p/257785286", "created_at": "2025-01-18T11:23:55.278Z", "comment_count": 16, "like_count": 15, "forum_alias": "boba", "forum_name": "手搖", "summary": "常常喝五十嵐，偶爾想換個品牌但不知道點那個比較好，有哪些好喝的手搖飲可以推薦嗎"}, {"keyword": "手搖飲", "id": 255143499, "title": "求推薦 蘋果手搖飲", "url": "https://www.dcard.tw/f/boba/p/255143499", "created_at": "2024-04-01T12:21:42.345Z", "comment_count": 32, "like_count": 19, "forum_alias": "boba", "forum_name": "手搖", "summary": "最近真的超愛蘋果手搖飲料，目前喝到十二韻的特別喜歡，想要問問看大家還有什麼推薦的！希望是裡面有蘋果丁的！comebuy就不用推了，我在台中😭，更，謝謝大家推薦，今天喝了路易莎的愛丁堡紅茶，還不錯但果粒"}, {"keyword": "手搖飲", "id": 254668014, "title": "連鎖手搖飲打工", "url": "https://www.dcard.tw/f/boba/p/254668014", "created_at": "2024-02-13T15:52:00.055Z", "comment_count": 10, "like_count": 13, "forum_alias": "boba", "forum_name": "手搖", "summary": "目前在某間名稱有數字的連鎖手搖飲打工，剛進來就發現兩個問題，1.超時工作的薪水，依照勞基法 第9個小時後的時薪要*1.34吧，但這間卻沒有 雖然店長說是公司的問題，但我說我不管啊 前一個月我就算了，之"}, {"keyword": "手搖飲", "id": 258291299, "title": "有推薦的手搖飲奶茶嗎", "url": "https://www.dcard.tw/f/boba/p/258291299", "created_at": "2025-03-17T12:58:55.314Z", "comment_count": 11, "like_count": 3, "forum_alias": "boba", "forum_name": "手搖", "summary": "本人是一個奶茶控請問各位有推薦的手搖飲奶茶嗎，例如：七盞茶：夏日奶茶 麻古：蜜桃奶茶 以此類推"}, {"keyword": "手搖飲", "id": 241697775, "title": "手搖飲=一餐", "url": "https://www.dcard.tw/f/talk/p/241697775", "created_at": "2023-04-07T17:34:54.213Z", "comment_count": 52, "like_count": 176, "forum_alias": "talk", "forum_name": "閒聊", "summary": "沒有時間吃飯的時候，手搖飲料就是王道～～用拿的也方便，加料放燕麥、珍珠，就很不錯"}, {"keyword": "手搖飲", "id": 259625234, "title": "求手搖飲推薦", "url": "https://www.dcard.tw/f/boba/p/259625234", "created_at": "2025-08-25T08:31:38.055Z", "comment_count": 14, "like_count": 10, "forum_alias": "boba", "forum_name": "手搖", "summary": "最近想喝新的口味，希望可以幫忙推薦🤩，附近的店家有：得正，大王茶迷，50嵐，再睡5分鐘，麻古，coco，茶鄰客，茂昌草本茶，尬飲茶，希望可以推薦你們喜歡的飲品，本人很愛有料且不要太甜的（微糖），目前我"}, {"keyword": "手搖飲", "id": 256245667, "title": "分享手搖飲", "url": "https://www.dcard.tw/f/food/p/256245667", "created_at": "2024-07-30T01:29:44.355Z", "comment_count": 9, "like_count": 38, "forum_alias": "food", "forum_name": "美食", "summary": "來點外縣市的飲料，會去這些外縣市都是因為友人在那邊唸書和工作，跟著她一起挖掘在地美食，看相簿真的發現不小心累積很多飲料，大家也還是多喝水喔～📍北門綠豆沙，宜蘭的北門綠豆沙，我真的很愛，就是人每次都很多"}, {"keyword": "手搖飲", "id": 260873873, "title": "想詢問一下現在流行手搖飲的推薦", "url": "https://www.dcard.tw/f/food/p/260873873", "created_at": "2026-02-14T05:01:10.189Z", "comment_count": 3, "like_count": 14, "forum_alias": "food", "forum_name": "美食", "summary": "剛從國外回來，實在是太久沒喝了，記憶停留在50嵐 圓石 清心之類的，有先做一些研究，但似乎台灣現在流行是一沐日八曜和茶之類的，都比較偏茶佔比比較重，或者沒咖啡因的蕎麥茶的奶茶，老婆喜歡喝奶味重，濃厚一"}, {"keyword": "手搖飲", "id": 261135020, "title": "只有少數手搖飲反對名間鄉設垃圾焚化爐😢", "url": "https://www.dcard.tw/f/talk/p/261135020", "created_at": "2026-03-20T16:00:02.141Z", "comment_count": 36, "like_count": 194, "forum_alias": "talk", "forum_name": "閒聊", "summary": "用台灣柴茶葉的應該都會很反對這件事吧，怎麼好多常喝的都沒說話...，網友整理的：（可能有其他新增的），TEA TOP第一味，山焙，烏弄，茶之魔手，慕慕寧，十二韻，原韻茶莊，瀚漟，喜道，津鹿堂，沖泡奶茶"}, {"keyword": "手搖飲", "id": 240367182, "title": "台南必喝手搖飲", "url": "https://www.dcard.tw/f/food/p/240367182", "created_at": "2022-10-28T13:55:43.980Z", "comment_count": 60, "like_count": 59, "forum_alias": "food", "forum_name": "美食", "summary": "各位大大們有推薦台南必喝的手搖飲店嗎，本身是珍珠控 飲料一定要加珍珠🥹🥹，茶の魔手的珍珠我就蠻愛的，快推我入坑吧🫣"}, {"keyword": "手搖飲", "id": 255623346, "title": "想詢問好喝的手搖飲", "url": "https://www.dcard.tw/f/boba/p/255623346", "created_at": "2024-05-22T07:12:40.084Z", "comment_count": 48, "like_count": 33, "forum_alias": "boba", "forum_name": "手搖", "summary": "最近特別想喝手搖飲，大家可以把自己的口袋名單拿出來給小弟我參考一下嗎"}, {"keyword": "手搖飲", "id": 258394597, "title": "求推薦手搖飲", "url": "https://www.dcard.tw/f/talk/p/258394597", "created_at": "2025-03-28T12:10:15.710Z", "comment_count": 8, "like_count": 6, "forum_alias": "talk", "forum_name": "閒聊", "summary": "請問大家知道哪些手搖店有鮮奶類（沒有茶）的飲料嗎🥹，我本身很怕茶的苦味，也完全不喝咖啡。以前覺得奶茶很苦都喝全糖，但我發現這樣還是有茶味，不愛喝，喝起來很勉強，也不健康。而且每次喝奶精的奶茶都會頭暈，"}, {"keyword": "手搖飲", "id": 241842705, "title": "2023手搖飲料店排名！？", "url": "https://www.dcard.tw/f/boba/p/241842705", "created_at": "2023-04-24T04:06:33.015Z", "comment_count": 92, "like_count": 67, "forum_alias": "boba", "forum_name": "手搖", "summary": "前幾天陸陸續續看到各平台排序飲料店排行榜，現在手搖品牌越來越多，這一兩年也出現很多新品牌或是最近突然知名度暴增的，現在芒果季節來臨，手搖店也常常爆滿人潮，蠻好奇各位手搖飲料店排名1-10名是哪幾間？歡"}, {"keyword": "手搖飲", "id": 259458673, "title": "手搖飲真的有那麼好喝嗎？", "url": "https://www.dcard.tw/f/talk/p/259458673", "created_at": "2025-08-02T11:53:06.671Z", "comment_count": 65, "like_count": 41, "forum_alias": "talk", "forum_name": "閒聊", "summary": "我不愛喝手搖飲，不是不好喝，但也沒有到好喝到不行，而且又超級貴，一般的茶類大概也要35元以上，其他的價格更不用講了，一杯的價格都快跟雞排差不多了~，不懂就一杯水再加點糖，然後加一些可能不太好的茶，就貴"}, {"keyword": "手搖飲", "id": 232337063, "title": "#問 每天都喝手搖飲會怎樣嗎", "url": "https://www.dcard.tw/f/boba/p/232337063", "created_at": "2019-10-20T11:13:41.688Z", "comment_count": 59, "like_count": 70, "forum_alias": "boba", "forum_name": "手搖", "summary": "小弟最近不知怎麼的，每天都想喝手搖飲，下班買晚餐 如果沒買手搖飲來配就覺得有點空虛，以至於我一星期大概喝四五次手搖飲吧？我都點微糖微冰，我想請問一下大家你們平常喝手搖飲的頻率大概多常，如果每天喝會怎樣"}, {"keyword": "手搖飲", "id": 255945913, "title": "戒手搖飲之路", "url": "https://www.dcard.tw/f/talk/p/255945913", "created_at": "2024-06-25T03:37:38.245Z", "comment_count": 38, "like_count": 58, "forum_alias": "talk", "forum_name": "閒聊", "summary": "最近記帳後發現，自己在手搖飲的方面花太多錢了，這邊就想要戒掉手搖飲！，這邊總共想出了三種方法來幫助自己戒掉手搖飲~，一：多喝水，目前是使用一個叫做「喝水時間」的APP，協助自己養成喝水的習慣，操作起來"}, {"keyword": "手搖飲", "id": 260973222, "title": "#分享 不專業的水果飲品分享", "url": "https://www.dcard.tw/f/boba/p/260973222", "created_at": "2026-02-28T08:09:26.933Z", "comment_count": 7, "like_count": 37, "forum_alias": "boba", "forum_name": "手搖", "summary": "一直以來我都是喝純茶比較多，頂多加個鮮奶變拿鐵飲品 不太買其他種類的😝，但前陣子常聽同事說飲料搭配水果喝還不錯，也可以補充維生素（？身為牛馬上班族想想有道理😂😂，能順便吸收維他命非常好哈哈，於是前幾天"}, {"keyword": "手搖飲", "id": 257760058, "title": "手搖飲記錄（持更）🧋", "url": "https://www.dcard.tw/f/boba/p/257760058", "created_at": "2025-01-15T07:33:01.280Z", "comment_count": 10, "like_count": 23, "forum_alias": "boba", "forum_name": "手搖", "summary": "開始工作以後喝手搖的頻率越來越高，本來都喝無糖或微糖，漸漸地需要更多糖分🥲，每家糖量的標準都不太一樣，而且有的配料本身會甜，常常買到太甜或不甜嗚嗚，決定來記錄一下，-，【紅茶幫】鮮奶茶加波霸：波霸本身"}, {"keyword": "手搖飲", "id": 238190199, "title": "台中推薦的手搖飲！！", "url": "https://www.dcard.tw/f/boba/p/238190199", "created_at": "2022-02-23T04:05:36.627Z", "comment_count": 44, "like_count": 28, "forum_alias": "boba", "forum_name": "手搖", "summary": "台大學讀台中，但本人不是台中人，所以不太曉得台中有哪些厲害的手搖飲店，平常喜歡喝茶類和鮮奶類的，茶不澀.鮮奶濃郁即可"}, {"keyword": "手搖飲", "id": 259654545, "title": "#台南手搖飲評比 不可不喝的 3 家質感手搖飲推薦", "url": "https://www.dcard.tw/f/boba/p/259654545", "created_at": "2025-08-29T04:19:06.011Z", "comment_count": 2, "like_count": 12, "forum_alias": "boba", "forum_name": "手搖", "summary": "手搖飲是台灣人留在身體裡一部分的血液！，我們來到美食之都台南，也一定要幫大家找到，不管單喝還是搭配美食，都絕對適合的「百搭質感手搖」精選 3 家品質與口味都在線的手搖飲，來～跟著我們看下去～🥤💗，📍 "}, {"keyword": "手搖飲", "id": 258901347, "title": "芒果季手搖飲", "url": "https://www.dcard.tw/f/food/p/258901347", "created_at": "2025-05-24T18:23:32.180Z", "comment_count": 4, "like_count": 16, "forum_alias": "food", "forum_name": "美食", "summary": "最近芒果季來臨，期待好久的芒果季🥹🥹，目前喝到第一名是大苑子芒果冰沙，完完全全的芒果味😍，最近看到很多家手搖飲陸陸續續出芒果飲料，但很怕踩雷，上次喝別家的芒果冰沙但喝起來有化學調味🥲，想問有沒有推薦不"}, {"keyword": "手搖飲", "id": 259466849, "title": "手搖飲跟超商飲料的糖不一樣？", "url": "https://www.dcard.tw/f/talk/p/259466849", "created_at": "2025-08-03T14:03:47.175Z", "comment_count": 6, "like_count": 9, "forum_alias": "talk", "forum_name": "閒聊", "summary": "事情發生在前幾天，我喝某家手搖飲荔枝烏龍加珍珠半糖少冰沒喝完放在地上忘記清理，後來昨天又喝了超商純喫茶紅茶喝剩也放在地上，結果今天一早純喫茶紅茶長螞蟻了，但我看手搖飲完全沒有螞蟻（？為什麼呢？我看純喫"}, {"keyword": "手搖飲", "id": 235685952, "title": "手搖飲料聲量排行", "url": "https://www.dcard.tw/f/boba/p/235685952", "created_at": "2021-04-02T14:17:39.470Z", "comment_count": 30, "like_count": 332, "forum_alias": "boba", "forum_name": "手搖", "summary": "最近幾年越來越多手搖飲品牌竄出，根據GoogleTrend的聲量比較，五十嵐和清心的聲量一直都是前幾名，沒有被新品牌取代。大家每天必喝的手搖飲有在排行榜上嗎？"}, {"keyword": "手搖飲", "id": 260169291, "title": "民雄手搖飲分享🥤❤️", "url": "https://www.dcard.tw/f/boba/p/260169291", "created_at": "2025-11-01T17:12:05.186Z", "comment_count": 5, "like_count": 8, "forum_alias": "boba", "forum_name": "手搖", "summary": "小女子最近被調到民雄工作，身為社畜 每天沒有一杯手搖飲真的活不下去🥹，沒有來之前對民雄的印象就是，鵝肉？肉包？（先跟在地人道歉🙇🏼‍♀️，結果來了發現最多的是手搖飲店🤣，以下是我個人喝過推薦的，（有名連鎖的就"}, {"keyword": "手搖飲", "id": 260859807, "title": "2/14更（居然真的有人做出來了", "url": "https://www.dcard.tw/f/boba/p/260859807", "created_at": "2026-02-12T00:14:07.786Z", "comment_count": 30, "like_count": 1013, "forum_alias": "boba", "forum_name": "手搖", "summary": "更新，沒想到分享會受到大家熱情回應，B1有大家的常見問題跟回覆，看到好多人在卡iOS，B29有分享上了，我是安卓的，所以大家可以自己去看看，一直很喜歡喝手搖飲，但真的選項太多，常常忘記好喝的比例到底是"}, {"keyword": "手搖飲", "id": 260920664, "title": "手搖飲店員「2特徵」小心！前稽核員喊：看到請轉頭買別家", "url": "https://www.dcard.tw/f/persona_setn54/p/260920664", "created_at": "2026-02-22T10:15:01.061Z", "comment_count": 7, "like_count": 88, "forum_alias": "persona_setn54", "forum_name": "個人看板", "summary": "台灣人熱愛手搖飲，走到哪都可以看到人手一杯，全台飲料店數已突破2.8萬家，且市場規模持續成長。不過愛喝飲料的你要注意了，一名曾經擔任手搖飲店稽核人員的網友就曾提醒，若發現店員手部出現2個特徵「請馬上轉"}, {"keyword": "手搖飲", "id": 255280089, "title": "必喝手搖飲推薦！", "url": "https://www.dcard.tw/f/food/p/255280089", "created_at": "2024-04-16T05:33:45.684Z", "comment_count": 26, "like_count": 20, "forum_alias": "food", "forum_name": "美食", "summary": "有人也跟我一樣愛喝飲料嗎？我是一天可以喝4杯飲料，但不吃飯的哪種🤣，有時喝同家飲料也會膩，所以常常換間喝～最近有了一些心得，所以上來跟大家分享交流！，也想問問大家有沒有同感～或是有其他必推也可以跟我說"}, {"keyword": "手搖飲", "id": 239510837, "title": "手搖飲推薦💕💕💕", "url": "https://www.dcard.tw/f/food/p/239510837", "created_at": "2022-07-22T17:00:59.437Z", "comment_count": 57, "like_count": 60, "forum_alias": "food", "forum_name": "美食", "summary": "想問看看大家有沒有自己私藏的飲品清單可以分享🥰，我自己最近喜歡（平常都喝微糖），1.翰林茶館—黑熊貓珍珠奶茶🧋半糖去冰，喜歡喝奶茶的朋友，豎起大拇指推，（雖然有點貴🥲但現在憑學生證可以升級成特大杯唷）"}, {"keyword": "早午餐", "id": 260553242, "title": "桃園｜早午餐分享 🥗", "url": "https://www.dcard.tw/f/food/p/260553242", "created_at": "2025-12-27T05:58:15.929Z", "comment_count": 0, "like_count": 41, "forum_alias": "food", "forum_name": "美食", "summary": "整理桃園的早午餐集合分享，其實桃園也很多早午餐🥗，🥨 浮島溪 | Söt cafe Rivulet，📍 330桃園市桃園區民光東路312號，法式吐司好胖好罪惡 🍞，早餐只供應到11：30要早來才吃得到"}, {"keyword": "早午餐", "id": 260694341, "title": "我的早午餐", "url": "https://www.dcard.tw/f/talk/p/260694341", "created_at": "2026-01-18T05:09:50.112Z", "comment_count": 5, "like_count": 9, "forum_alias": "talk", "forum_name": "閒聊", "summary": "我用線上訂餐在里歐訂了貝果升級套餐，上面有寫含主餐、炸物、水果、飲料任選，總共是165，剛拿到家發現只有貝果跟飲料，打電話去店裡問店員說就說就只有貝果跟飲料阿，想問問到底是我誤會了嗎還是我中文不好了"}, {"keyword": "早午餐", "id": 260969826, "title": "🥗台南｜預約困難人氣早午餐", "url": "https://www.dcard.tw/f/food/p/260969826", "created_at": "2026-02-27T17:38:00.001Z", "comment_count": 0, "like_count": 17, "forum_alias": "food", "forum_name": "美食", "summary": "在成大周邊的人氣早午餐，位置不多 會建議提前預約，每個月會開放下個月的預約時段，詳情可以關注店家IG，這裡的早午餐拼盤只有一種可以選擇，‎﹆嶼の早午餐 $260，迷你生吐司外層微微烤到金黃，咬下去柔軟"}, {"keyword": "早午餐", "id": 260850252, "title": "民生早午餐 by 貓下去", "url": "https://www.dcard.tw/f/food/p/260850252", "created_at": "2026-02-10T12:05:47.023Z", "comment_count": 7, "like_count": 69, "forum_alias": "food", "forum_name": "美食", "summary": "在網路上鬧得沸沸揚揚的民生早午餐，我原本就真的蠻有興趣的，再加上有人在網路嘴秋說我不去吃就不要酸，沒有，我是真的要去吃。還從高雄特地跑上去吃，-，禮拜五中午，客滿，比想像中還多人，意外的是打開電梯，迎"}, {"keyword": "早午餐", "id": 261096161, "title": "3/15 貳樓（早午餐）", "url": "https://www.dcard.tw/f/persona_read355/p/261096161", "created_at": "2026-03-15T14:16:30.140Z", "comment_count": 2, "like_count": 91, "forum_alias": "persona_read355", "forum_name": "個人看板", "summary": "今天吃了這家 貳樓，不在餐廳街，它在巨城百貨創藝廳（最靠近「巨城附中」的那棟😂），特斯拉櫃正對面。關於「貳樓」名稱的由來（參官網說明）：———————————————————，一.候位，是「寵物友善」"}, {"keyword": "早午餐", "id": 261007080, "title": "☕️台南｜餐點超優秀的老宅早午餐", "url": "https://www.dcard.tw/f/food/p/261007080", "created_at": "2026-03-04T13:54:08.878Z", "comment_count": 0, "like_count": 16, "forum_alias": "food", "forum_name": "美食", "summary": "終於來吃收藏已久的和喫咖啡，採現場登記候位，也是一間讓我甘願等待一個多小時的早午餐，整體餐點表現出色，從餐點到細節都能感受到滿滿用心，是一間會想再回訪的老宅早午餐，‎﹆香料微辣雞腿排大餐盤 $360，"}, {"keyword": "早午餐", "id": 260630399, "title": "貓下去早午餐爭議", "url": "https://www.dcard.tw/f/talk/p/260630399", "created_at": "2026-01-08T07:40:13.105Z", "comment_count": 116, "like_count": 259, "forum_alias": "talk", "forum_name": "閒聊", "summary": "Threads上爆了，早餐盤如下$580，加三顆荷包蛋要$140，我自己是不會去吃啦，考量到他的地段我覺得這盤頂多$450加一成就很頂了，有沒有吃過的人可以分享好吃嗎"}, {"keyword": "早午餐", "id": 260636357, "title": "早午餐都誰在吃的?", "url": "https://www.dcard.tw/f/talk/p/260636357", "created_at": "2026-01-09T06:42:51.856Z", "comment_count": 40, "like_count": 37, "forum_alias": "talk", "forum_name": "閒聊", "summary": "民生社區咖啡廳的經典早餐盤定價580元，單點三顆荷包蛋為140元，生長在小康家庭，家裡沒有金山銀山，出社會了解賺錢是多麼不容易，好奇這樣的店都是怎麼樣的人會去，又或是自己不夠享受生活，捨不得花，大家平"}, {"keyword": "早午餐", "id": 261021626, "title": "【板橋早午餐】Second Floor貳樓板橋，人氣早午餐推薦，寵物友善餐廳帶萌寶貝一起吃飯好幸福 -近TPKD大樓", "url": "https://www.dcard.tw/f/food/p/261021626", "created_at": "2026-03-06T10:01:42.609Z", "comment_count": 0, "like_count": 11, "forum_alias": "food", "forum_name": "美食", "summary": "說到北部非常有名的早午餐店，貳樓絕對榜上有名。餐點選擇非常豐富，店內餐點種類很多，除了基本的早午餐之外，還有各式各樣的沙拉碗、義大利麵、三明治、漢堡、燉飯，甚至還有烤雞、脆皮豬腳 等比較有份量的主餐。"}, {"keyword": "早午餐", "id": 260630884, "title": "貓下去推出全新品牌「民生早午餐」", "url": "https://www.dcard.tw/f/food/p/260630884", "created_at": "2026-01-08T08:58:50.869Z", "comment_count": 12, "like_count": 37, "forum_alias": "food", "forum_name": "美食", "summary": "知名餐酒館「貓下去」開了新品牌「民生早午餐」就在敦北民生路口麥當勞樓上那個位置 以前是双聖的舊址，試營運期間就引發超多討論，雖然真的有點貴，不過畢竟是開在商業地段，而且餐點內容其實還算豐富，有培根、蛋"}, {"keyword": "早午餐", "id": 233811444, "title": "早午餐", "url": "https://www.dcard.tw/f/cjc/p/233811444", "created_at": "2020-06-04T16:57:39.777Z", "comment_count": 6, "like_count": 14, "forum_alias": "cjc", "forum_name": "崇仁醫護管理專科學校", "summary": "不知道你們怎麼想，我想知道你們心中的那些好吃早午餐的排行，是什麼食物呢？我個人蠻喜歡 早餐的熱狗加薯餅🤤，午餐是 那個卡拉雞腿堡 🥴"}, {"keyword": "早午餐", "id": 260667881, "title": "在地人激推古早味平價早午餐，必點招牌綜合湯、綜合麵食，料多味美", "url": "https://www.dcard.tw/f/food/p/260667881", "created_at": "2026-01-14T03:19:18.726Z", "comment_count": 0, "like_count": 16, "forum_alias": "food", "forum_name": "美食", "summary": "平價古早味早午餐，是許多老饕來到後龍必吃的美食之一，招牌綜合湯、綜合麵類、乾板條、筍絲滷肉飯是人氣餐點，湯頭鮮甜濃郁，粄條Q彈入味。距離白沙屯拱天宮與山邊媽祖宮僅15分鐘車程，前往苗栗海線參拜或路過時"}, {"keyword": "早午餐", "id": 239184039, "title": "菇菇早午餐", "url": "https://www.dcard.tw/f/food/p/239184039", "created_at": "2022-06-15T11:44:50.881Z", "comment_count": 3, "like_count": 35, "forum_alias": "food", "forum_name": "美食", "summary": "民宿+早午餐，臉書上名字超長，菇菇早午餐•菇菇雞蛋燒&居易民宿，沒有電話 只能用messenger 訂位，裝潢是古典歐式 室內燈光比較暗，︎菇菇早午餐 起司醬牛肉丸 $220，︎菇菇套餐 義式鄉村炸雞腿 "}, {"keyword": "早午餐", "id": 260777001, "title": "北車南陽街吃到一間會回訪的早午餐＋拌麵（可外送）", "url": "https://www.dcard.tw/f/persona_fanfancat99/p/260777001", "created_at": "2026-01-30T15:26:08.859Z", "comment_count": 1, "like_count": 101, "forum_alias": "persona_fanfancat99", "forum_name": "個人看板", "summary": "最近在 台北車站、南陽街 一帶找吃的，剛好要找可以坐下來吃、不用太趕的店，結果吃到一間我覺得滿有記憶點的，想來分享一下。店名是 RHINO 犀牛茶食文化，定位比較像是「早午餐＋拌麵＋飲料」的複合式餐廳"}, {"keyword": "早午餐", "id": 260885322, "title": "《新竹》｜沒看錯！真的是鹽酥雞早午餐🥪", "url": "https://www.dcard.tw/f/food/p/260885322", "created_at": "2026-02-16T06:02:33.027Z", "comment_count": 17, "like_count": 161, "forum_alias": "food", "forum_name": "美食", "summary": "經過就被外觀吸引了，就是要這種有裝潢感的早午餐，菜單選擇不多，要趕快下定決心，健康的擺盤和配色，讓我心安裡得的點了，吐司，看起來平凡，結果默默最好吃，軟軟熱熱＋微微奶油香，一不小心兩片直接消失。沙拉🥗"}, {"keyword": "早午餐", "id": 260633229, "title": "食如其名「一人一伴」剛剛好的三明治早午餐🥪", "url": "https://www.dcard.tw/f/food/p/260633229", "created_at": "2026-01-08T15:18:35.789Z", "comment_count": 0, "like_count": 65, "forum_alias": "food", "forum_name": "美食", "summary": "哩賀🙌，上週久違去台中看五月天的演唱會（有夠喜歡💙，順便解鎖存了很久的日系早午餐.ᐟ，11：30左右到剛好最後一桌直接入座，他們家不能訂位 都只能現場候位呦，🥪千層豬排玉子燒三明治 $295，就是被這"}, {"keyword": "早午餐", "id": 260773217, "title": "一個人的早午餐分享x3天 #生活打卡計畫", "url": "https://www.dcard.tw/f/persona_maumaumau/p/260773217", "created_at": "2026-01-30T05:08:27.657Z", "comment_count": 0, "like_count": 70, "forum_alias": "persona_maumaumau", "forum_name": "個人看板", "summary": "總之就是紀錄這週自己吃掉的早午餐🤩，自己吃飯很悠哉，可以隨意選喜歡的店和品項，而且我是早餐和午餐合併，所以會吃豐盛一點。這禮拜前兩天沒拍照，週一吃了好食間的吐司加套餐，週二外帶及第家的早餐回家吃。週三"}, {"k eads 斜槓機會推薦大會》\n正式開始 \n\n不管你手上有\n產品、產業、生意、機會、加盟\n甚至快推出的\n\n都歡迎留言\n1.你是做什麼產業\n2.要怎麼合作\n\n這裡不比誰厲害\n只比誰願意分享\n也歡迎合作！！", "author": "ceo_kirin", "url": "https://www.threads.net/@ceo_kirin/post/DT1KQMWkkRV", "created_at": "2026-01-22T23:00:31.000Z", "likes": 37, "replies": 63}, {"keyword": "加盟", "id": "3854495820499099994", "code": "DV964bZE6Fa", "text": "加盟開店兩年多，現在只剩迷茫..\n餐飲生手入坑 🫣🫣🫣\n\n加盟到去年為止 生意量還算穩定，雖然比起周遭店家還是小卡拉米，但最少有照預期在回本，一天能賣200-300個便當\n\n但去年中開始，總部一直找各種理由在漲食材費，半年內漲2次，品牌的分店越開越多，卻說不漲員工連工錢都不夠\n（os 用量越來越大，成本卻壓不下來？）\n\n去年底國稅局要求要開發票，因為我們是加盟品牌，就算配合行動支付也不能延期繼續使用1%，因為是整條路都被檢舉 ，我們從去年底開始使用，但價格調漲後，生意量也下來了，很有感的差距。\n\n現在已經三月了，整條路只有我們家開始開發票…周遭生意更好的同業卻不用，甚至其他區 同品牌 生意很好", "author": "sjdnekebdke", "url": "https://www.threads.net/@sjdnekebdke/post/DV964bZE6Fa", "created_at": "2026-03-17T01:42:10.000Z", "likes": 35, "replies": 29}, {"keyword": "加盟", "id": "3833963284366783152", "code": "DU0-Us-knKw", "text": "加盟路易莎8年了,突然想起當初的決定\n\n想問問大家:\n- 加盟前做了哪些評估?\n- 是什麼讓你最後決定加盟?\n- 朋友推薦?財務試算?還是看好品牌?\n\n單純好奇,沒有標準答案~", "author": "summer_cocomom", "url": "https://www.threads.net/@summer_cocomom/post/DU0-Us-knKw", "created_at": "2026-02-16T17:47:41.000Z", "likes": 12, "replies": 6}, {"keyword": "加盟", "id": "3858311239378878147", "code": "DWLeaFIEz7D", "text": "大家好，我是紅茶巴士的老闆娘。\n針對我近期在 Threads 上回覆網友留言「青鳥去曬曬太陽」的不當回應，我在此向所有被冒犯的朋友致上最深的歉意。\n我於回覆網友留言的當下，沒有深入了解該詞彙背後的社會涵意與重量，僅以個人的主觀直覺草率回應，這是我的失職與不成熟。\n紅茶巴士的初衷是想把飲品做好，讓消費者再次享受過往紅茶冰的甘醇留香。因此每一家加盟店的夥伴，每天都非常辛苦、認真地在第一線服務客人。身為一個品牌的經營者，我個人的發言不僅代表自己，也影響了每一位正在第一線辛勤工作、熱愛這個品牌的加盟夥伴，我也再次向加盟夥伴致歉。\n我將暫時停止個人社群的發言，將重心回歸我們的產品與服務。未來的發言，將更", "author": "ruby_building", "url": "https://www.threads.net/@ruby_building/post/DWLeaFIEz7D", "created_at": "2026-03-22T08:02:43.000Z", "likes": 11, "replies": 9}, {"keyword": "加盟", "id": "3838759947211870438", "code": "DVGA9VXj5Dm", "text": "想請問自創餐飲品牌的老闆們～\n開加盟出去需要注意什麼呢🤔🤔", "author": "pin__0531", "url": "https://www.threads.net/@pin__0531/post/DVGA9VXj5Dm", "created_at": "2026-02-23T08:37:47.000Z", "likes": 13, "replies": 30}, {"keyword": "加盟", "id": "3843434756399383181", "code": "DVWn4wsk0KN", "text": "找工作 或者創業 加盟 \n81年次 不想跑船了 \n詐騙勿擾", "author": "15tian", "url": "https://www.threads.net/@15tian/post/DVWn4wsk0KN", "created_at": "2026-03-01T19:25:48.000Z", "likes": 26, "replies": 53}, {"keyword": "加盟", "id": "3857385568574027481", "code": "DWIL7zAkrbZ", "text": "原來超商的加盟主\n會需要「囤咖啡數量」可能一次要一千杯\n再慢慢靠自己做活動促銷😱\n賣不完的都是加盟主自己吸收\n壓力還真大….", "author": "tsen7625", "url": "https://www.threads.net/@tsen7625/post/DWIL7zAkrbZ", "created_at": "2026-03-21T01:23:34.000Z", "likes": 1212, "replies": 90}, {"keyword": "加盟", "id": "3853419165001061975", "code": "DV6GFB0khZX", "text": "今天去看了加盟展，也在猶豫自己是不是真的要拼一次！！想問問廣大的脆友們及過來人的經驗談，小弟目前看的是飲料店", "author": "ryan800308", "url": "https://www.threads.net/@ryan800308/post/DV6GFB0khZX", "created_at": "2026-03-15T14:03:02.000Z", "likes": 0, "replies": 155}, {"keyword": "加盟", "id": "3839684901545776656", "code": "DVJTRMOERYQ", "text": "好奇問問\n餐飲業老闆們\n是怎麼開始繳營業税的😅\n我先説\n因為要開放加盟", "author": "zhonghao7302", "url": "https://www.threads.net/@zhonghao7302/post/DVJTRMOERYQ", "created_at": "2026-02-24T15:15:30.000Z", "likes": 20, "replies": 20}, {"keyword": "創業加盟", "id": "3662179115970832165", "code": "DLSrIC_S6cl", "text": "其實蠻多人都會問我加盟飲料店賺不賺錢\n我統一回答：不一定\n一間賺錢的店必須考慮以下\n人事、水電、位置（超級重要）、經營模式、房租、品牌大小⋯⋯等\n如果我一開始說會賺錢，這樣等於給他人信心。\n信心必須是自己給自己的！\n其實顧好品質 控制好人事 基本上小月打平 大月才是開始賺的時候\n很常遇到客人跟我說 咦 你怎麼每天都在 都沒休息嗎？（心理想：我跟我先生在，還有一個跟很久的正職在 就是品質保證😂）\n現在的客人嘴很利 好與不好 走業績會有答案😛\n\n成功 是99的努力+1分的運氣 \n所以是要努力才有機會成功🏆\n可以在下面留言您看法與觀點⋯\n畢竟成功也是需要吸收別人提供經驗與看法！", "author": "cingkai0820", "url": "https://www.threads.net/@cingkai0820/post/DLSrIC_S6cl", "created_at": "2025-06-24T17:23:12.000Z", "likes": 32, "replies": 8}, {"keyword": "創業加盟", "id": "3705703291886691761", "code": "DNtTYKj5uWx", "text": "有人會想要加盟鹽水雞嗎？？\n\n創業已經4年了\n\n目前有2間了☺️☺️\n\n想要擴展攤位、曝光品牌\n\n讓更多人吃到不一樣的鹽水雞🐔🐔\n\n前5攤目前不收加盟金，只求品牌曝光\n\n1.我們只綁雞肉、胡椒粉\n 💥💥（必竟，這是最重要的東西）💥💥\n2.我們讓利，讓大家賺更多錢\n3.手把手，教會雞肉去骨、調味、煮菜、選地點\n\n歡迎有興趣創業的小資族，可以討論\n小額創業，大大受惠\n\n❌❌不收加盟金、不收加盟金、不收加盟金❌❌\n\n 🌟🌟真的很重要🌟🌟", "author": "twofishboy_0918", "url": "https://www.threads.net/@twofishboy_0918/post/DNtTYKj5uWx", "created_at": "2025-08-23T18:37:58.000Z", "likes": 32, "replies": 14}, {"keyword": "創業加盟", "id": "3858192162777966169", "code": "DWLDVSZk6ZZ", "text": "K大香雞排🔍\n想開雞排店，最怕的不是沒客人，是自己什麼都不懂，設備、技術、流程通通要自己摸，真的很容易繞一大圈。\n如果你也想創業，但不知道怎麼開始，K大香雞排直接幫你把路鋪好！\n技術教到會，沒經驗也免驚\nV 招牌、菜單、包裝，總部幫你準備好\nV 不只加盟，還有總部行銷一起幫你衝業績原加盟金＄88,000，現在限時創業價只要\n$68,000", "author": "stellababy0419", "url": "https://www.threads.net/@stellababy0419/post/DWLDVSZk6ZZ", "created_at": "2026-03-22T04:06:26.000Z", "likes": 2, "replies": 0}, {"keyword": "創業加盟", "id": "3627248030778456172", "code": "DJWkt2yyPhs", "text": "望高樓_串串燒 雞蛋仔，\n期待與您攜手共進！\n#望高樓 #串串燒#雞蛋仔\n#加盟招商 #雞蛋糕\n#小本創業好項目 \n#品牌 #開店 #活動邀約\n#市集擺攤  #黑哥 #短影音 \n#夜市人生", "author": "boss710413", "url": "https://www.threads.net/@boss710413/post/DJWkt2yyPhs", "created_at": "2025-05-07T12:41:48.000Z", "likes": 49, "replies": 3}, {"keyword": "創業加盟", "id": "3852811328084455958", "code": "DV3731lEzIW", "text": "鹽水雞、鹽水雞、鹽水雞\n\nㄧ把剪刀✂️ㄧ台小攤車🚗\n\n就可以小額創業的好選擇\n\n🎉不需加盟金🎉\n🎉不需加盟金🎉\n\n本身也是加盟別人起家的，因總部給予的品質不穩定，故自身出來自創品牌，也因自身對食品的品質與堅持，這5年來也累積不少的忠實客戶☺️☺️，也想讓自己的鹽水雞品牌，讓更多人看見認識，故今年的目標想積極拓展市場跟加盟🥰🥰\n\n因為深知創業的辛苦與壓力，所以目前我們加盟是採不收加盟金☺️☺️（限前5攤）\n\n只收技術轉移費\n\n🏵️🏵️10000元🏵️🏵️\n\n手把手教到您會\n\n煮菜、去骨、調味、選址\n\n教到會爲止🐓🐓\n\n✅ 免加盟金、免權利金，沒有 \n  壓力的開始\n\n✅ 不用囤貨，賣多少雞肉拿多", "author": "twofishboy_0918", "url": "https://www.threads.net/@twofishboy_0918/post/DV3731lEzIW", "created_at": "2026-03-14T17:55:22.000Z", "likes": 15, "replies": 3}, {"keyword": "創業加盟", "id": "3854247415553929747", "code": "DV9CZqQjzIT", "text": "🌟2026春季加盟展\n看看現在市場上的創業模式\n很多品牌的加盟門檻，其實都不低\n\n逛了一圈之後\n反而更深刻體會到～\n品茉兒的創業條件真的很友善❤️\n\n有時候\n人真的要多出來走走、看看\n才會發現，原來自己早就在一個\n很多人想進來的機會裡 ✨\n\n機會一直都在\n只是看我們有沒有看見。\n\n#品茉兒多元通路公司 \n#2026開啟海外市場\n#創業機會 #女性創業", "author": "star770411", "url": "https://www.threads.net/@star770411/post/DV9CZqQjzIT", "created_at": "2026-03-16T17:28:37.000Z", "likes": 0, "replies": 0}, {"keyword": "創業加盟", "id": "3821988289394641177", "code": "DUKbhl1EgkZ", "text": "創業大家來聊\n目前走在第九年路上，一家直營，一家（小型加盟）一路上真的好不容易，也有訂單很慘淡，店內沒有任何客人的時候，每個餐飲業會碰到的事情也經歷過了，在這要跟所有創業的老闆們致敬🫡，雖然好幾次真的也要放棄，不過看著默默支持的客人，現在的穩定訂單，就這樣支撐著我到現在\n\n👇👇\n現階段想要招募更多想要創業的夥伴，不管是妳/你想要學技術，或是我的整套流程，歡迎詢問🙋，現在的餐飲規模、兩人創業不是問題，有興趣的可以來店內用餐聊聊，也可以參與其中，真的有熱情我們再來談合作\n聯絡專線：0981807230\n害羞的也可以私訊喔", "author": "blackpig716", "url": "https://www.threads.net/@blackpig716/post/DUKbhl1EgkZ", "created_at": "2026-01-31T05:15:30.000Z", "likes": 12, "replies": 0}, {"keyword": "創業加盟", "id": "3827057575943320293", "code": "DUccJa1EbLl", "text": "有人會想要加盟鹽水雞嗎？？\n\n創業已經4年了\n\n目前有2間了☺️☺️\n\n想要擴展攤位、曝光品牌\n\n讓更多人吃到不一樣的鹽水雞🐔🐔\n\n前5攤目前不收加盟金，只求品牌曝光\n\n1.我們只綁雞肉、胡椒粉\n 💥💥（必竟，這是最重要的東西）💥💥\n2.我們讓利，讓大家賺更多錢\n3.手把手，教會雞肉去骨、調味、煮菜、選地點\n\n歡迎有興趣創業的小資族，可以討論\n小額創業，大大受惠\n\n❌❌不收加盟金、不收加盟金、不收加盟金❌❌\n\n 🌟🌟真的很重要🌟🌟", "author": "twofishboy_0918", "url": "https://www.threads.net/@twofishboy_0918/post/DUccJa1EbLl", "created_at": "2026-02-07T05:07:16.000Z", "likes": 55, "replies": 17}, {"keyword": "創業加盟", "id": "3723010464164266297", "code": "DOqykqzksE5", "text": "#斜槓創業\n我這幾天真的靠著不斷的分享產品和創業方式，順利的完成了10位小批發商的簽約。感謝大家的支持和信任，我會繼續努力💪", "author": "mishal53003", "url": "https://www.threads.net/@mishal53003/post/DOqykqzksE5", "created_at": "2025-09-16T15:44:14.000Z", "likes": 1, "replies": 1}, {"keyword": "手搖飲", "id": "3844642033806332953", "code": "DVa6Y9Zj9QZ", "text": "想知道大家心目中的榜上排名🌝\n1. 50嵐\n2. 清心福全\n3. 可不可熟成茶行\n4. 老賴茶棧\n5. 龜記\n6. UG樂己\n7. 天仁茗茶\n8. 得正\n9. 自行發揮填寫", "author": "julie070294", "url": "https://www.threads.net/@julie070294/post/DVa6Y9Zj9QZ", "created_at": "2026-03-03T11:24:27.000Z", "likes": 104, "replies": 135}, {"keyword": "手搖飲", "id": "3846549781825604389", "code": "DVhsKWMkksl", "text": "好奇問一下\n\n你們喝手搖飲\n是\n\n一直喝同一杯\n\n還是\n\n每次都換口味？", "author": "siyu10.11", "url": "https://www.threads.net/@siyu10.11/post/DVhsKWMkksl", "created_at": "2026-03-06T02:34:48.000Z", "likes": 36, "replies": 108}, {"keyword": "手搖飲", "id": "3572802211032131980", "code": "DGVJK5xTOmM", "text": "公司滿常揪喝飲料🥤\n但⋯我不喝手搖杯的人\n這樣會很不合群？？\n手搖飲", "author":
