    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #F1F5F9;
      --card:      #FFFFFF;
      --border:    #E2E8F0;
      --text:      #0F172A;
      --muted:     #64748B;
      --dcard:     #2563EB;
      --threads:   #7C3AED;
      --ptt:       #EA580C;
      --facebook:  #1877F2;
      --accent:    #0EA5E9;
      --radius:    12px;
      --shadow:    0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.05);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    header h1 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -.3px;
    }
    header .date {
      font-size: 14px;
      color: var(--muted);
    }

    /* ── Layout ── */
    main { max-width: 1280px; margin: 0 auto; padding: 28px 24px; }

    /* ── Section title ── */
    .section-title {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .6px;
      color: var(--muted);
      margin-bottom: 12px;
      margin-top: 28px;
    }

    /* ── Stat cards ── */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }
    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 22px;
      box-shadow: var(--shadow);
    }
    .stat-card .label {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-bottom: 8px;
    }
    .stat-card .value {
      font-size: 34px;
      font-weight: 800;
      line-height: 1;
      color: var(--text);
    }
    .stat-card .sub {
      font-size: 12px;
      color: var(--muted);
      margin-top: 6px;
    }

    /* ── Chart grid ── */
    .chart-grid-2 {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 16px;
    }
    .chart-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px;
      box-shadow: var(--shadow);
    }
    .chart-card h2 {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 18px;
      color: var(--text);
    }
    .chart-wrap { position: relative; }

    /* ── Article list ── */
    .article-list {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .article-list-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .article-list-header span {
      font-size: 12px;
      color: var(--muted);
      font-weight: 400;
    }
    .article-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 13px 20px;
      border-bottom: 1px solid var(--border);
      text-decoration: none;
      color: inherit;
      transition: background .15s;
    }
    .article-item:last-child { border-bottom: none; }
    .article-item:hover { background: #F8FAFC; }

    .platform-badge {
      flex-shrink: 0;
      font-size: 10px;
      font-weight: 700;
      padding: 3px 7px;
      border-radius: 4px;
      letter-spacing: .3px;
      margin-top: 2px;
      color: #fff;
    }
    .badge-dcard    { background: var(--dcard); }
    .badge-threads  { background: var(--threads); }
    .badge-ptt      { background: var(--ptt); }
    .badge-facebook { background: var(--facebook); }

    .article-body { flex: 1; min-width: 0; }
    .article-title {
      font-size: 14px;
      line-height: 1.5;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .article-meta {
      font-size: 12px;
      color: var(--muted);
      margin-top: 3px;
      display: flex;
      gap: 12px;
    }

    /* ── Loading / error ── */
    #loading {
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
      font-size: 15px;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── RWD ── */
    @media (max-width: 900px) {
      .chart-grid-2 { grid-template-columns: 1fr; }
    }
    @media (max-width: 640px) {
      main { padding: 16px 14px; }
      .stat-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
      .stat-card .value { font-size: 26px; }
      header h1 { font-size: 15px; }
    }
  </style>
</head>
<body>

<header>
  <h1>🔍 加盟品牌監測 Dashboard</h1>
  <div class="date" id="today-date"></div>
</header>

<main>
  <div id="loading">
    <div class="spinner"></div>
    載入資料中…
  </div>

  <div id="content" style="display:none">

    <!-- Stats -->
    <div class="section-title">總覽</div>
    <div class="stat-grid">
      <div class="stat-card">
        <div class="label">總文章數</div>
        <div class="value" id="stat-total">–</div>
        <div class="sub">所有平台合計</div>
      </div>
      <div class="stat-card">
        <div class="label">監測平台數</div>
        <div class="value" id="stat-platforms">–</div>
        <div class="sub">Dcard · Threads · PTT · FB</div>
      </div>
      <div class="stat-card">
        <div class="label">追蹤品牌數</div>
        <div class="value" id="stat-brands">–</div>
        <div class="sub">拉亞 · 麥味登 · Q Burger 等</div>
      </div>
      <div class="stat-card">
        <div class="label">追蹤關鍵字數</div>
        <div class="value" id="stat-keywords">–</div>
        <div class="sub">加盟 · 早餐 · 創業 等</div>
      </div>
    </div>

    <!-- Charts row 1 -->
    <div class="section-title">品牌 & 平台分析</div>
    <div class="chart-grid-2">
      <div class="chart-card">
        <h2>品牌提及次數</h2>
        <div class="chart-wrap" style="height:220px">
          <canvas id="chartBrands"></canvas>
        </div>
      </div>
      <div class="chart-card">
        <h2>平台分佈</h2>
        <div class="chart-wrap" style="height:220px">
          <canvas id="chartPlatforms"></canvas>
        </div>
      </div>
    </div>

    <!-- Chart row 2 -->
    <div class="section-title">關鍵字熱度</div>
    <div class="chart-card">
      <h2>關鍵字文章數</h2>
      <div class="chart-wrap" style="height:200px">
        <canvas id="chartKeywords"></canvas>
      </div>
    </div>

    <!-- Article list -->
    <div class="section-title">最新文章</div>
    <div class="article-list">
      <div class="article-list-header">
        最新 30 篇（所有平台合併）
        <span id="list-updated"></span>
      </div>
      <div id="article-list-body"></div>
    </div>

  </div><!-- #content -->
</main>

<script>
// ── 設定 ──────────────────────────────────────────────────────────────────
const BRANDS   = ['拉亞', '麥味登', 'Q Burger', '弘爺', '晨間廚房', '美而美'];
const KEYWORDS = ['加盟', '早餐', '創業', '手搖飲', '早午餐'];
// DATA_SOURCES: replaced by inline data

// ── 日期 ───────────────────────────────────────────────────────────────────
const today = new Date();
document.getElementById('today-date').textContent =
  today.toLocaleDateString('zh-TW', { year:'numeric', month:'long', day:'numeric', weekday:'short' });

// fetchJSON: replaced by inline data

// ── 正規化：把各平台資料統一成同一格式 ──────────────────────────────────────
function normalize(raw, platform) {
  const posts = raw?.posts ?? [];
  return posts.map(p => {
    const searchText = [
      p.title   ?? '',
      p.text    ?? '',
      p.summary ?? '',
      p.excerpt ?? '',
    ].join(' ');

    return {
      platform,
      title:    (p.title || p.text || p.summary || '（無標題）').slice(0, 120),
      url:      p.url       ?? p.permalinkUrl ?? '',
      date:     p.created_at ?? p.createdAt ?? p.date ?? '',
      comments: p.comment_count ?? p.commentCount ?? p.comments ?? p.replies ?? null,
      source:   p.forum_name ?? p.board ?? p.page_name ?? p.author ?? '',
      _search:  searchText.toLowerCase(),
    };
  });
}

// ── 計算命中次數 ──────────────────────────────────────────────────────────
function countHits(posts, term) {
  return posts.filter(p => p._search.includes(term.toLowerCase())).length;
}

// ── Chart helpers ─────────────────────────────────────────────────────────
const PLATFORM_COLORS = {
  dcard:    '#2563EB',
  threads:  '#7C3AED',
  ptt:      '#EA580C',
  facebook: '#1877F2',
};
const PLATFORM_LABELS = {
  dcard: 'Dcard', threads: 'Threads', ptt: 'PTT', facebook: 'Facebook',
};

function hbar(ctx, labels, data, colors) {
  return new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [{ data, backgroundColor: colors, borderRadius: 5, borderSkipped: false }],
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { color: '#F1F5F9' }, ticks: { font: { size: 12 } } },
        y: { grid: { display: false }, ticks: { font: { size: 13 } } },
      },
    },
  });
}

function doughnut(ctx, labels, data, colors) {
  return new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels,
      datasets: [{ data, backgroundColor: colors, borderWidth: 2, borderColor: '#fff' }],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      cutout: '62%',
      plugins: {
        legend: {
          position: 'bottom',
          labels: { font: { size: 12 }, padding: 12, boxWidth: 12 },
        },
      },
    },
  });
}

// ── 文章列表 ──────────────────────────────────────────────────────────────
function formatDate(str) {
  if (!str) return '';
  try {
    const d = new Date(str);
    if (isNaN(d)) return str.slice(0, 10);
    return d.toLocaleDateString('zh-TW', { month:'numeric', day:'numeric' });
  } catch { return str.slice(0, 10); }
}

function renderList(posts) {
  const top30 = [...posts]
    .filter(p => p.date)
    .sort((a, b) => new Date(b.date) - new Date(a.date))
    .slice(0, 30);

  document.getElementById('list-updated').textContent =
    `共 ${posts.length} 篇，顯示最新 ${top30.length} 篇`;

  const container = document.getElementById('article-list-body');
  container.innerHTML = top30.map(p => {
    const badge   = `<span class="platform-badge badge-${p.platform}">${PLATFORM_LABELS[p.platform]}</span>`;
    const title   = escHtml(p.title.slice(0, 80));
    const date    = formatDate(p.date);
    const comment = p.comments != null ? `💬 ${p.comments}` : '';
    const src     = p.source ? escHtml(p.source) : '';
    const href    = p.url ? `href="${escHtml(p.url)}" target="_blank" rel="noopener"` : '';
    return `
      <a class="article-item" ${href}>
        ${badge}
        <div class="article-body">
          <div class="article-title">${title}</div>
          <div class="article-meta">
            <span>${date}</span>
            ${src     ? `<span>${src}</span>` : ''}
            ${comment ? `<span>${comment}</span>` : ''}
          </div>
        </div>
      </a>`;
  }).join('');
}

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

// ── 主流程 ────────────────────────────────────────────────────────────────
async function init() {
  // 使用 inline 資料（由 build.py 內嵌）
  const raws = [DCARD_DATA, THREADS_DATA, FACEBOOK_DATA, PTT_DATA];

  // 正規化並合併
  let allPosts = [];
  const platformCounts = {};
  const platforms = ['dcard', 'threads', 'facebook', 'ptt'];
  platforms.forEach(platformKey => {
    const data = DATA_SOURCES[platformKey];
    if (!data) return;
    const posts = normalize(data, platformKey);
    allPosts = allPosts.concat(posts);
    platformCounts[platformKey] = posts.length;
  });

  // ── Stats
  document.getElementById('stat-total').textContent     = allPosts.length.toLocaleString();
  document.getElementById('stat-platforms').textContent = Object.values(platformCounts).filter(v=>v>0).length;
  document.getElementById('stat-brands').textContent    = BRANDS.length;
  document.getElementById('stat-keywords').textContent  = KEYWORDS.length;

  // ── 品牌提及橫條圖
  const brandCounts  = BRANDS.map(b => countHits(allPosts, b));
  const brandColors  = BRANDS.map((_, i) =>
    ['#3B82F6','#8B5CF6','#EC4899','#F59E0B','#10B981','#EF4444'][i % 6]
  );
  hbar(
    document.getElementById('chartBrands').getContext('2d'),
    BRANDS, brandCounts, brandColors
  );

  // ── 平台分佈圓餅圖
  const activePlatforms = Object.keys(platformCounts).filter(k => platformCounts[k] > 0);
  doughnut(
    document.getElementById('chartPlatforms').getContext('2d'),
    activePlatforms.map(k => PLATFORM_LABELS[k]),
    activePlatforms.map(k => platformCounts[k]),
    activePlatforms.map(k => PLATFORM_COLORS[k])
  );

  // ── 關鍵字熱度橫條圖
  const kwCounts = KEYWORDS.map(k => countHits(allPosts, k));
  const kwColors = KEYWORDS.map((_, i) =>
    ['#0EA5E9','#6366F1','#F97316','#14B8A6','#F43F5E'][i % 5]
  );
  hbar(
    document.getElementById('chartKeywords').getContext('2d'),
    KEYWORDS, kwCounts, kwColors
  );

  // ── 文章列表
  renderList(allPosts);

  // 顯示
  document.getElementById('loading').style.display  = 'none';
  document.getElementById('content').style.display  = 'block';
}

init();
</script>
</body>
</html>
